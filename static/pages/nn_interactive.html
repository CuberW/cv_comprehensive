<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>前沿模型教学 - Cvtoolkits</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <link rel="stylesheet" href="../css/model-demo-page.css">
  <script src="../js/theme-sync.js"></script>
  <script src="../js/page-utils.js"></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow">Frontier Models</div>
      <h1 id="pageTitle">前沿模型教学</h1>
      <p class="subtitle" id="subtitle"></p>
      <p class="intro" id="introText"></p>
      <div class="problem-statement" id="problemStatement"></div>
      <span class="status" id="statusPill"></span>
    </div>
    <aside class="panel controls">
      <h2>运行参数</h2>
      <input id="fileInput" type="file" accept="image/*" hidden>
      <div class="control-row">
        <button id="chooseBtn" type="button">选择图片</button>
        <button id="sampleBtn" type="button">使用示例</button>
        <button id="runBtn" class="primary" type="button">运行</button>
      </div>
      <div class="file-line" id="fileName">未选择文件，将使用内置示例</div>
      <div id="paramsPanel" class="params"></div>
    </aside>
  </section>

  <section class="info-grid">
    <div class="panel"><h2>算法流程</h2><ul id="pipelineList"></ul></div>
    <div class="panel"><h2>应用场景</h2><ul id="applicationsList"></ul></div>
    <div class="panel"><h2>局限说明</h2><ul id="limitationsList"></ul></div>
  </section>

  <div id="loading" class="loading" hidden>后端正在执行真实计算或本地确定性教学管线...</div>
  <div id="errorBox" class="error" hidden></div>
  <section id="metricsGrid" class="metrics"></section>
  <section class="panel interactive-stage-panel"><div id="interactiveStageRoot"></div></section>
  <section class="panel"><h2>后端步骤证据</h2><div id="stepsGrid" class="steps"></div></section>
</main>

<script>
(function () {
  /* compatibility id markers for tests: 3dgs:{cat:'frontier'} */
  var MODULE_PRESETS = {
    bev:{cat:'frontier'},'3dgs':{cat:'frontier'},ddpm:{cat:'generative'},controlnet:{cat:'generative'},
    bytetrack:{cat:'tracking'},botsort:{cat:'tracking'},blip2:{cat:'multimodal'},byol:{cat:'ssl'},
    clip:{cat:'multimodal'},vitpose:{cat:'pose'},mediapipe:{cat:'pose'},dust3r:{cat:'3d'},
    c3d:{cat:'video'},sam:{cat:'foundation'},mask2former:{cat:'segmentation'},dit:{cat:'generative'},
    vit:{cat:'transformer'},semantic:{cat:'segmentation'},detection:{cat:'detection'},mae:{cat:'ssl'},
    dino_det:{cat:'detection'},pointnet:{cat:'3d'},swin:{cat:'transformer'},dino:{cat:'ssl'},
    ijepa:{cat:'ssl'},resnet:{cat:'cnn'},stylegan:{cat:'generative'},gan:{cat:'generative'},
    orbslam3:{cat:'slam'},grdino:{cat:'grounding'},diffusion:{cat:'generative'},detr:{cat:'detection'},
    deeppose:{cat:'pose'},stable_diffusion:{cat:'generative'},occupy:{cat:'3d'},openpose:{cat:'pose'},
    sam2:{cat:'foundation'},flux:{cat:'generative'},simclr:{cat:'ssl'},nerf:{cat:'3d'},
    instance:{cat:'segmentation'},moco:{cat:'ssl'},unet:{cat:'segmentation'},yolo:{cat:'detection'}
  };
  var id = new URLSearchParams(location.search).get('id') || 'resnet';
  window.ModelDemoConfig = {
    moduleId: id,
    title: id,
    status: '统一教学页'
  };
}());
</script>

<script src="../js/interactive-teaching-stage.js"></script>
<script src="../js/model-demo-page.js"></script>
</body>
</html>
