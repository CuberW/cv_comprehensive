<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLIP - CV 通识教育</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <link rel="stylesheet" href="../css/model-demo-page.css">
  <script src="../js/theme-sync.js"></script>
  <script src="../js/page-utils.js"></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow">图文对齐</div>
      <h1 id="pageTitle">CLIP</h1>
      <p class="subtitle" id="subtitle"></p>
      <p class="intro" id="introText"></p>
      <span class="status" id="statusPill"></span>
    </div>
    <aside class="panel controls">
      <h2>运行真实后端</h2>
      <input id="fileInput" type="file" accept="image/*" hidden>
      <div class="control-row">
        <button id="chooseBtn">选择图片</button>
        <button id="sampleBtn">使用样例</button>
        <button id="runBtn" class="primary">运行 CLIP</button>
      </div>
      <div class="file-line" id="fileName">未选择文件，将使用内置样例</div>
      <div id="paramsPanel" class="params"></div>
    </aside>
  </section>
  <section class="info-grid">
    <div class="panel"><h2>算法流程</h2><ul id="pipelineList"></ul></div>
    <div class="panel"><h2>应用场景</h2><ul id="applicationsList"></ul></div>
    <div class="panel"><h2>局限性</h2><ul id="limitationsList"></ul></div>
  </section>
  <div id="loading" class="loading" hidden>后端正在运行 CLIP，首次运行可能需要下载权重...</div>
  <div id="errorBox" class="error" hidden></div>
  <section id="metricsGrid" class="metrics"></section>
  <section class="panel"><h2>真实中间步骤</h2><div id="stepsGrid" class="steps"></div></section>
</main>
<script>
window.ModelDemoConfig = {
  moduleId: 'clip',
  title: 'CLIP',
  subtitle: '把图像和文字映射到同一个向量空间，做零样本识别。',
  intro: '本页调用 HuggingFace CLIP 预训练模型，后端真实计算图像 embedding、文本 embedding、相似度和 Top-k 结果。',
  status: '真实预训练推理',
  params: [{ name: 'custom_classes', label: '候选文本', type: 'text', value: 'dog, cat, bus, car, person, building, street, tree' }],
  pipeline: ['输入图像', '输入候选文本', '图像编码器得到 image embedding', '文本编码器得到 text embedding', '计算余弦相似度', 'softmax 得到零样本分类概率'],
  applications: ['零样本分类', '图文检索', '开放词表视觉理解', '多模态基础模型入门'],
  limitations: ['结果受候选文本写法影响', '首次运行需要下载权重', '相似度不是严格概率，只是匹配分数归一化']
};
</script>
<script src="../js/model-demo-page.js"></script>
</body>
</html>
