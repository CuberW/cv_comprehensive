<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Transformer — CV 通识教育</title>
<link rel="stylesheet" href="../css/iframe-theme.css"><script src="../js/theme-sync.js"></script><script src="../js/model-page-status.js" defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei","微软雅黑",sans-serif;color:#e2e8f0;background:#0f172a;min-height:100vh}
.page{max-width:1100px;margin:0 auto;padding:20px 24px 40px}
h1{font-size:1.6rem;font-weight:700}.subtitle{color:#94a3b8;font-size:0.9rem}
.status{display:inline-block;padding:3px 12px;border-radius:12px;font-size:0.75rem;font-weight:600;margin:6px 0;background:#065f46;color:#6ee7b7}
.panel{background:rgba(30,41,59,0.7);border:1px solid rgba(148,163,184,0.15);border-radius:16px;padding:18px 20px;margin-bottom:16px}
.panel h3{font-size:1rem;margin-bottom:12px}
.upload-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.upload-btn{padding:10px 22px;background:#8b5cf6;color:#fff;border:none;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer}
.upload-btn:hover{opacity:0.9}.upload-btn:disabled{opacity:0.45;cursor:not-allowed}
.upload-info{flex:1;min-width:180px;font-size:0.85rem;color:#94a3b8}.filename{color:#e2e8f0;font-weight:600}
.upload-section{border:2px dashed rgba(148,163,184,0.25);border-radius:14px;padding:16px 20px}
.upload-section.dragover{border-color:#8b5cf6;background:rgba(139,92,246,0.05)}
.upload-section.has-file{border-style:solid;border-color:#8b5cf6}
.btn-row{display:flex;gap:10px;margin-top:12px}
.btn-primary{padding:10px 28px;background:#8b5cf6;color:#fff;border:none;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer}
.btn-primary:hover{background:#7c3aed}
.btn-secondary{padding:10px 20px;background:rgba(148,163,184,0.15);color:#cbd5e1;border:1px solid rgba(148,163,184,0.2);border-radius:10px;font-size:0.9rem;cursor:pointer}
.metrics-bar{display:flex;flex-wrap:wrap;gap:16px;padding:12px 16px;background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.2);border-radius:12px;margin-bottom:16px}
.metric-item .metric-label{font-size:0.7rem;color:#94a3b8;text-transform:uppercase}
.metric-item .metric-value{font-size:1rem;font-weight:700;color:#a78bfa}
.steps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.step-card{background:rgba(30,41,59,0.6);border:1px solid rgba(148,163,184,0.12);border-radius:12px;overflow:hidden;transition:box-shadow 0.2s,transform 0.2s}
.step-card:hover{box-shadow:0 8px 24px rgba(0,0,0,0.3);transform:translateY(-2px)}
.step-card.step-input{border-left:3px solid #3B82F6}.step-card.step-process{border-left:3px solid #8b5cf6}.step-card.step-output{border-left:3px solid #10B981}
.step-card .img-area{background:rgba(15,23,42,0.5);min-height:140px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid rgba(148,163,184,0.1);overflow:hidden}
.step-card .img-area img{width:100%;display:block}
.step-card .info{padding:12px 14px}.step-card .info .step-title{font-weight:700;font-size:0.9rem}.step-card .info .step-desc{font-size:0.8rem;color:#94a3b8;margin-top:4px;line-height:1.5}
.loading{text-align:center;padding:32px;color:#94a3b8;display:none}.loading.visible{display:block}
.spinner{display:inline-block;width:36px;height:36px;border:3px solid rgba(148,163,184,0.2);border-top-color:#8b5cf6;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:16px 20px;color:#fca5a5;font-size:0.88rem;margin-top:16px;display:none}
.error-box.visible{display:block}.empty-hint{text-align:center;padding:36px 20px;color:#64748b;font-size:0.92rem}
.results-section{display:none}.results-section.visible{display:block}
</style>
</head>
<body>
<main class="page">
<h1>🔮 Vision Transformer</h1>
<p class="subtitle">ViT — Patch → Transformer → 全局注意力可视化</p>
<span class="status">模型就绪 (ViT-B/16)</span>
<span id="backendHint" style="display:none;margin-left:8px;font-size:0.75rem;color:#94a3b8"></span>
<p style="color:#94a3b8;font-size:0.88rem;margin-top:8px;">使用 google/vit-base-patch16-224 预训练模型，提取真实自注意力图进行可视化。</p>
<div class="panel">
<h3>📤 上传图像</h3>
<div class="upload-section" id="uploadSection">
<input type="file" id="fileInput" accept="image/*" style="display:none">
<div class="upload-row"><button class="upload-btn" id="uploadBtn">选择图片</button>
<div class="upload-info"><span class="filename" id="fileName">未选择文件</span></div></div></div>
<div class="btn-row"><button class="btn-primary" id="runBtn">▶ 运行 ViT 分析</button>
<button class="btn-secondary" id="sampleBtn">🧪 使用示例图</button></div></div>
<div class="loading" id="loading"><div class="spinner"></div><p style="margin-top:12px;">ViT 推理中 (首次加载需下载模型 ~350MB)...</p></div>
<div class="error-box" id="errorBox"></div>
<div class="empty-hint" id="emptyHint">👆 上传一张图片或使用示例图，查看 ViT 如何通过自注意力理解图像。</div>
<div class="results-section" id="resultsSection">
<div class="metrics-bar" id="metricsBar"></div>
<div class="panel" style="margin-top:16px;"><h3>🔬 ViT 分析流水线</h3><div class="steps-grid" id="stepsGrid"></div></div>
</div>
</main>
<script>
(function(){
var fileInput=document.getElementById('fileInput'),uploadBtn=document.getElementById('uploadBtn'),uploadSection=document.getElementById('uploadSection'),fileName=document.getElementById('fileName'),loading=document.getElementById('loading'),errorBox=document.getElementById('errorBox'),resultsSection=document.getElementById('resultsSection'),metricsBar=document.getElementById('metricsBar'),stepsGrid=document.getElementById('stepsGrid'),emptyHint=document.getElementById('emptyHint'),runBtn=document.getElementById('runBtn'),sampleBtn=document.getElementById('sampleBtn'),selectedFile=null,MODULE_ID='vit';
uploadBtn.addEventListener('click',function(){fileInput.click()});
fileInput.addEventListener('change',function(e){selectedFile=e.target.files[0];if(selectedFile){fileName.innerHTML='<span class="filename">'+selectedFile.name+'</span>';uploadSection.classList.add('has-file')}});
uploadSection.addEventListener('dragover',function(e){e.preventDefault();uploadSection.classList.add('dragover')});
uploadSection.addEventListener('dragleave',function(){uploadSection.classList.remove('dragover')});
uploadSection.addEventListener('drop',function(e){e.preventDefault();uploadSection.classList.remove('dragover');if(e.dataTransfer.files.length){selectedFile=e.dataTransfer.files[0];fileName.innerHTML='<span class="filename">'+selectedFile.name+'</span>';uploadSection.classList.add('has-file')}});
runBtn.addEventListener('click',runAlgorithm);
sampleBtn.addEventListener('click',function(){selectedFile=null;fileName.innerHTML='<span class="filename">示例生成图</span>';uploadSection.classList.add('has-file');runAlgorithm()});
function runAlgorithm(){
loading.classList.add('visible');errorBox.classList.remove('visible');resultsSection.classList.remove('visible');emptyHint.style.display='none';runBtn.disabled=true;sampleBtn.disabled=true;
var form=new FormData();if(selectedFile) form.append('file',selectedFile);
fetch('/api/demo/'+MODULE_ID,{method:'POST',body:form}).then(function(r){if(!r.ok) throw new Error('HTTP '+r.status);return r.json()}).then(function(data){
loading.classList.remove('visible');runBtn.disabled=false;sampleBtn.disabled=false;if(data.error){showError(data.error);return}
var m= data.metrics||{},mhtml='';Object.keys(m).forEach(function(k){var v=m[k];if(typeof v==='number')v=Math.round(v*100)/100;mhtml+='<div class="metric-item"><div class="metric-label">'+k+'</div><div class="metric-value">'+v+'</div></div>'});metricsBar.innerHTML=mhtml;
var st=data.steps||[],shtml='';st.forEach(function(s,i){var cls=(i===0)?'step-input':(i===st.length-1)?'step-output':'step-process';shtml+='<div class="step-card '+cls+'"><div class="img-area">';if(s.image_base64)shtml+='<img src="data:image/png;base64,'+s.image_base64+'" alt="'+s.name+'" loading="lazy">';else shtml+='<span style="color:#64748b">(无图像)</span>';shtml+='</div><div class="info"><div class="step-title">'+s.name+'</div>';if(s.explanation)shtml+='<div class="step-desc">'+s.explanation+'</div>';if(s.formula)shtml+='<code class="step-formula">'+s.formula+'</code>';shtml+='</div></div>'});stepsGrid.innerHTML=shtml;resultsSection.classList.add('visible')}).catch(function(err){loading.classList.remove('visible');runBtn.disabled=false;sampleBtn.disabled=false;showError('请求失败: '+err.message)})}
function showError(msg){errorBox.textContent=msg;errorBox.classList.add('visible')}})();
</script>
</body>
</html>
