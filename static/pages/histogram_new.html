<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>直方图均衡化 — Cvtoolkits</title>
<link rel="stylesheet" href="../css/iframe-theme.css"><script src="../js/theme-sync.js"></script>
<style>
.page{max-width:1180px;margin:0 auto;padding:20px 22px 42px}
.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-bottom:14px}
.hero-main,.panel{border:1px solid var(--cv-border);background:var(--cv-panel);;border-radius:18px;backdrop-filter:blur(12px)}
.hero-main{padding:18px 20px}.eyebrow{color:#4ade80;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;font-weight:800}
h1{margin:6px 0 8px;font-size:clamp(1.55rem,3vw,2.35rem)}.subtitle{margin:0;color:#a5b4fc;font-size:.94rem;line-height:1.65}
.analogy{margin-top:12px;padding:12px 14px;border-radius:14px;background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.16);color:#bbf7d0;font-size:.84rem;line-height:1.6}.analogy strong{color:#4ade80}
.workspace{display:grid;grid-template-columns:minmax(300px,380px) 1fr;gap:14px;align-items:start}
.panel{padding:16px}.panel h3{margin:0 0 10px;font-size:1rem}
.upload-zone{border:1.5px dashed rgba(148,163,184,.32);border-radius:16px;padding:14px;background:rgba(2,6,23,.3)}.upload-zone.dragover{border-color:#4ade80;background:rgba(74,222,128,.08)}
.upload-row{display:flex;gap:10px;align-items:center}
button{font:inherit;border:0;border-radius:12px;cursor:pointer}
.upload-btn,.run-btn{padding:10px 14px;color:#06121f;font-weight:900;background:linear-gradient(135deg,#4ade80,#22d3ee)}button:disabled{opacity:.48;cursor:not-allowed}
.file-meta{color:#94a3b8;font-size:.82rem}.file-meta strong{color:#e2e8f0}
.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}
.ghost-btn{padding:10px 13px;color:#cbd5e1;border:1px solid rgba(148,163,184,.2);background:rgba(148,163,184,.11)}
.hist-viz{display:flex;align-items:flex-end;gap:2px;height:60px;padding:4px 8px;border-radius:10px;background:rgba(2,6,23,.42);border:1px solid rgba(148,163,184,.12);margin:12px 0}
.hist-viz .hv-bar{flex:1;min-width:2px;border-radius:1px 1px 0 0;background:rgba(74,222,128,.5);transition:height .5s}
.hist-viz .hv-bar.high{background:#4ade80}
.loading{display:none;text-align:center;padding:40px;border-radius:14px;color:#94a3b8;background:rgba(15,23,42,.55);border:1px solid rgba(148,163,184,.12)}
.error{display:none;padding:14px;border-radius:14px;color:#fecaca;background:rgba(127,29,29,.24);border:1px solid rgba(248,113,113,.32)}
.spinner{width:30px;height:30px;margin:0 auto 10px;border-radius:50%;border:3px solid rgba(148,163,184,.22);border-top-color:#4ade80;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.results-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.results-head p{margin:0;color:#94a3b8;font-size:.84rem}
.steps-grid{display:grid;display:flex;flex-wrap:wrap;gap:12px}
.step-card{flex:1 1 220px;min-width:200px;max-width:320px;overflow:hidden;border-radius:13px;background:rgba(15,23,42,.6);border:1px solid rgba(148,163,184,.13);transition:transform .18s}.step-card:hover{transform:translateY(-3px);box-shadow:0 0 24px rgba(56,189,248,.12)}
.step-img{min-height:120px;display:grid;place-items:center;background:rgba(2,6,23,.42)}.step-img img{width:100%;display:block}
.step-body{padding:10px 12px}.step-body strong{display:block;font-size:.82rem;color:#f8fafc}.step-body p{margin:4px 0 0;color:#94a3b8;font-size:.74rem;line-height:1.5}
@media(max-width:860px){.hero,.workspace{grid-template-columns:1fr}}
</style></head><body>
<main class="page"><section class="hero"><div class="hero-main">
<div class="eyebrow">Histogram Equalization</div><h1>直方图均衡化：让暗图变亮、亮图变暗</h1>
<p class="subtitle">统计每个亮度级别有多少像素，然后把像素重新分配到更均匀的分布上——暗处被拉开，亮处被压缩，整体对比度自动增强。</p>
<div class="analogy"><strong>📊 直觉：</strong>一个班级的成绩全集中在60-70分——直方图在60-70有个高峰。均衡化就是<strong>"把分数拉开"</strong>：让每个分数段都有差不多数量的人。原来扎堆的60-70被拉伸到50-80，原来没人考的90分以上也有了几个人。图像的亮度分布变得<strong>更均匀</strong>，对比度自然提升。</div>
<div class="hist-viz" id="histViz"></div>
</div><aside class="panel"><h3>📥 上传图片</h3>
<div class="upload-zone" id="uploadZone"><input type="file" id="fileInput" accept="image/*" hidden><div class="upload-row"><button class="upload-btn" id="uploadBtn">选择图片</button><div class="file-meta"><strong id="fileName">未选择</strong><br>对比直方图均衡化前后效果</div></div></div>
<div class="actions"><button class="run-btn" id="runBtn" disabled>▶ 开始处理</button><button class="ghost-btn" id="sampleBtn">内置示例</button></div></aside></section>
<section class="workspace"><aside class="panel" style="display:none"></aside><section class="panel">
<div class="results-head"><h3>处理结果</h3><p id="resultHint">五步：原图→灰度→直方图→CDF累积函数→均衡化结果</p></div>
<div class="loading" id="loading"><div class="spinner"></div>计算中…</div><div class="error" id="errorBox"></div><div class="steps-grid" id="stepsGrid"></div></section></section></main>
<script>
(function(){var sf=null,fi=document.getElementById('fileInput'),uz=document.getElementById('uploadZone'),fn=document.getElementById('fileName'),ub=document.getElementById('uploadBtn'),rb=document.getElementById('runBtn'),sb=document.getElementById('sampleBtn'),ld=document.getElementById('loading'),eb=document.getElementById('errorBox'),sg=document.getElementById('stepsGrid'),rh=document.getElementById('resultHint');
ub.addEventListener('click',function(){fi.click()});fi.addEventListener('change',function(e){sf=e.target.files[0]||null;if(sf){fn.textContent=sf.name;rb.disabled=false}});uz.addEventListener('dragover',function(e){e.preventDefault();uz.classList.add('dragover')});uz.addEventListener('dragleave',function(){uz.classList.remove('dragover')});uz.addEventListener('drop',function(e){e.preventDefault();uz.classList.remove('dragover');sf=e.dataTransfer.files[0]||null;if(sf){fn.textContent=sf.name;rb.disabled=false}});
function sbz(b){ld.style.display=b?'block':'none';eb.style.display='none';rb.disabled=b;sb.disabled=b}
function drun(wf){sbz(true);var fd=new FormData();if(wf)fd.append('file',wf);fetch('/api/demo/histogram',{method:'POST',body:fd}).then(function(r){return r.json().catch(function(){return{}}).then(function(j){if(!r.ok)throw new Error(j.error||'HTTP '+r.status);return j})}).then(render).catch(function(e){sbz(false);eb.textContent=e.message;eb.style.display='block'});}
rb.addEventListener('click',function(){drun(sf)});sb.addEventListener('click',function(){sf=null;fi.value='';fn.textContent='内置示例';fetch('../images/demo-street.jpg').then(function(r){return r.blob()}).then(function(b){drun(new File([b],'demo.jpg'))}).catch(function(){drun(null)});});
// Draw sample histogram bars
(function(){var hv=document.getElementById('histViz'),s='';for(var i=0;i<48;i++){var h=10+Math.abs(Math.sin(i*.22)*Math.cos(i*.15))*45;s+='<span class="hv-bar'+(h>35?' high':'')+'" style="height:'+h+'px"></span>'}hv.innerHTML=s})();
function render(d){sbz(false);rh.textContent='原灰度直方图集中在窄范围→CDF累积→均衡化后直方图均匀分布→对比度增强。';
sg.innerHTML=(d.steps||[]).map(function(s,i){var titles={original:'原图',gray:'灰度化',histogram:'原始直方图（亮度和=像素数）',cdf:'CDF累积分布函数',equalized:'CLAHE均衡化结果'};var img=s.image_base64?'<img src="data:image/png;base64,'+s.image_base64+'" alt="'+esc(s.name||'')+'" loading="lazy">':'<span style="color:#64748b">—</span>';return'<article class="step-card"><div class="step-img">'+img+'</div><div class="step-body"><strong>'+esc(titles[s.id]||s.name)+'</strong><p>'+esc(s.explanation||'')+'</p>'+(s.formula?'<code class="step-formula">'+esc(s.formula)+'</code>':'')+'</div></article>'}).join('')}
function esc(s){return String(s).replace(/[&<>"\']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]})}})();
</script></body></html>
