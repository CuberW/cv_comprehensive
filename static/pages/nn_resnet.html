<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResNet + Grad-CAM - CV 通识教育</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <link rel="stylesheet" href="../css/model-demo-page.css">
  <script src="../js/theme-sync.js"></script>
  <script src="../js/page-utils.js"></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow">残差连接与可解释性</div>
      <h1 id="pageTitle">ResNet + Grad-CAM</h1>
      <p class="subtitle" id="subtitle"></p>
      <p class="intro" id="introText"></p>
      <span class="status" id="statusPill"></span>
    </div>
    <aside class="panel controls">
      <h2>运行真实后端</h2>
      <input id="fileInput" type="file" accept="image/*" hidden>
      <div class="control-row">
        <button id="chooseBtn">选择图片</button>
        <button id="sampleBtn">使用样例</button>
        <button id="runBtn" class="primary">运行 ResNet</button>
      </div>
      <div class="file-line" id="fileName">未选择文件，将使用内置样例</div>
      <div id="paramsPanel" class="params"></div>
    </aside>
  </section>
  <section class="info-grid">
    <div class="panel"><h2>算法流程</h2><ul id="pipelineList"></ul></div>
    <div class="panel"><h2>应用场景</h2><ul id="applicationsList"></ul></div>
    <div class="panel"><h2>局限性</h2><ul id="limitationsList"></ul></div>
  </section>
  <div id="loading" class="loading" hidden>后端正在运行 ResNet-50 和 Grad-CAM...</div>
  <div id="errorBox" class="error" hidden></div>
  <section id="metricsGrid" class="metrics"></section>
  <section class="panel"><h2>真实中间步骤</h2><div id="stepsGrid" class="steps"></div></section>
</main>
<script>
window.ModelDemoConfig = {
  moduleId: 'resnet',
  title: 'ResNet + Grad-CAM',
  subtitle: '残差连接让深层网络更容易训练，Grad-CAM 显示模型判断时看哪里。',
  intro: '本页调用 torchvision ResNet-50 ImageNet 预训练权重，后端真实计算 Top-5 分类和 Grad-CAM 热力图。',
  status: '真实预训练推理',
  params: [
    { name: 'target_rank', label: '解释类别', type: 'range', min: 1, max: 5, step: 1, value: 1 }
  ],
  pipeline: ['输入图像', 'ImageNet 预处理', 'ResNet 残差块前向传播', 'Top-5 分类概率', '目标类别反向传播', 'Grad-CAM 热力图叠加'],
  applications: ['图像分类', '模型可解释性', '理解残差连接', '展示网络关注区域'],
  limitations: ['类别受 ImageNet 限制', 'Grad-CAM 是解释线索不是因果证明', '首次运行可能下载权重']
};
</script>
<script src="../js/model-demo-page.js"></script>
</body>
</html>
