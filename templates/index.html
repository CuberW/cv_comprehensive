<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV 通识教育 — Cvtoolkits</title>
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

<!-- Subtle background grid -->
<div class="bg-grid"></div>

<!-- ====== Top Nav ====== -->
<nav class="top-nav">
  <div class="nav-brand">
    <span class="dot"></span> Cvtoolkits <span>· 计算机视觉通识教育</span>
  </div>
  <div class="nav-actions">
    <div class="search-box" id="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search-input" placeholder="搜索算法…" autocomplete="off">
      <button class="search-clear hidden" id="search-clear">✕</button>
    </div>
  </div>
</nav>

<!-- ====== Main Wrap ====== -->
<div class="main-wrap">

  <!-- ====== GALLERY (home) ====== -->
  <section class="gallery" id="gallery">
    <div class="gallery-hero">
      <h2>探索计算机视觉的世界</h2>
      <p class="sub">从像素级基础原语开始，逐步进入经典视觉、几何理解、深度学习与前沿模型。每个算法都从直觉出发，以可交互的流水线展开。</p>
      <div class="hero-stats">
        <div class="hero-stat"><number id="stat-total">--</number><label>算法模块</label></div>
        <div class="hero-stat"><number>5</number><label>认知阶段</label></div>
        <div class="hero-stat"><number id="stat-ready">--</number><label>已可体验</label></div>
        <div class="hero-stat"><number>0</number><label>黑盒调用</label></div>
      </div>
    </div>

    <!-- Phase Metro Lines -->
    <div class="phase-metro" id="phase-metro"></div>

    <!-- Difficulty Ladder -->
    <div class="difficulty-bar" style="margin-top:48px">
      <h3>📶 按难度筛选</h3>
      <div class="ladder-steps" id="ladder-steps">
        <div class="ladder-step" data-lv="1"><div class="bars">★</div><div class="label">入门</div><div class="count"></div></div>
        <div class="ladder-step" data-lv="2"><div class="bars">★★</div><div class="label">基础</div><div class="count"></div></div>
        <div class="ladder-step" data-lv="3"><div class="bars">★★★</div><div class="label">进阶</div><div class="count"></div></div>
        <div class="ladder-step" data-lv="4"><div class="bars">★★★★</div><div class="label">高级</div><div class="count"></div></div>
        <div class="ladder-step" data-lv="5"><div class="bars">★★★★★</div><div class="label">前沿</div><div class="count"></div></div>
      </div>
    </div>
  </section>

  <!-- ====== DETAIL OVERLAY ====== -->
  <div class="detail-overlay" id="detail-overlay">
    <div class="detail-topbar">
      <button class="btn-back" id="btn-back" title="返回首页">← 返回</button>
      <span class="detail-name" id="detail-name"></span>
      <span class="detail-en" id="detail-en"></span>
    </div>
    <!-- Pipeline Strip -->
    <div class="pipeline-strip" id="pipeline-strip"></div>
    <!-- Canvas area -->
    <div class="detail-canvas-area" id="detail-canvas-area">
      <iframe id="detail-iframe" src="" style="width:100%;height:100%;border:none"></iframe>
    </div>
    <!-- HUD Panel -->
    <div class="hud-panel" id="hud-panel">
      <div class="hud-header" id="hud-header">
        <span>🎛 控制面板</span>
        <button class="hud-toggle" id="hud-toggle">−</button>
      </div>
      <div class="hud-body" id="hud-body">
        <div class="hud-control">
          <label>参数滑块将由此模块的 JS 动态注入</label>
        </div>
      </div>
    </div>
  </div>


</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="/static/js/utils.js"></script>
<script src="/static/js/router.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
