<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DETR - CV 通识教育</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <link rel="stylesheet" href="../css/model-demo-page.css">
  <script src="../js/theme-sync.js"></script>
  <script src="../js/page-utils.js"></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow">Transformer 检测范式</div>
      <h1 id="pageTitle">DETR</h1>
      <p class="subtitle" id="subtitle"></p>
      <p class="intro" id="introText"></p>
      <span class="status" id="statusPill"></span>
    </div>
    <aside class="panel controls">
      <h2>运行真实后端</h2>
      <input id="fileInput" type="file" accept="image/*" hidden>
      <div class="control-row">
        <button id="chooseBtn">选择图片</button>
        <button id="sampleBtn">使用样例</button>
        <button id="runBtn" class="primary">运行 DETR</button>
      </div>
      <div class="file-line" id="fileName">未选择文件，将使用内置样例</div>
      <div id="paramsPanel" class="params"></div>
    </aside>
  </section>
  <section class="info-grid">
    <div class="panel"><h2>算法流程</h2><ul id="pipelineList"></ul></div>
    <div class="panel"><h2>应用场景</h2><ul id="applicationsList"></ul></div>
    <div class="panel"><h2>局限性</h2><ul id="limitationsList"></ul></div>
  </section>
  <div id="loading" class="loading" hidden>后端正在运行 DETR，首次运行可能需要下载权重...</div>
  <div id="errorBox" class="error" hidden></div>
  <section id="metricsGrid" class="metrics"></section>
  <section class="panel"><h2>真实中间步骤</h2><div id="stepsGrid" class="steps"></div></section>
</main>
<script>
window.ModelDemoConfig = {
  moduleId: 'detr',
  title: 'DETR',
  subtitle: '用 Object Query 把目标检测改写成集合预测问题。',
  intro: '本页调用 HuggingFace DETR 预训练模型，后端返回真实检测框、类别分数和 query 注意力摘要。',
  status: '真实预训练推理',
  params: [
    { name: 'threshold', label: '置信度阈值', type: 'range', min: 10, max: 90, step: 5, value: 50, scale: 100, fixed: 2 },
    { name: 'query_idx', label: 'Query编号', type: 'range', min: 0, max: 99, step: 1, value: 0 },
    { name: 'head_idx', label: '注意力头', type: 'range', min: 0, max: 7, step: 1, value: 0 }
  ],
  pipeline: ['输入图像', 'CNN backbone 提取特征', 'Transformer encoder 建立全局关系', 'Object queries 解码目标集合', '类别和框预测', '集合匹配思想替代手工候选区域'],
  applications: ['端到端目标检测', '理解 object query', '比较 CNN 检测和 Transformer 检测', '检测任务教学演示'],
  limitations: ['首次运行需要下载权重', 'CPU 推理较慢', 'COCO 类别之外的物体可能无法识别']
};
</script>
<script src="../js/model-demo-page.js"></script>
</body>
</html>
