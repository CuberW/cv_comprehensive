<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAM - CV 通识教育</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <link rel="stylesheet" href="../css/model-demo-page.css">
  <script src="../js/theme-sync.js"></script>
  <script src="../js/page-utils.js"></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow">提示分割</div>
      <h1 id="pageTitle">Segment Anything</h1>
      <p class="subtitle" id="subtitle"></p>
      <p class="intro" id="introText"></p>
      <span class="status" id="statusPill"></span>
    </div>
    <aside class="panel controls">
      <h2>运行真实后端</h2>
      <input id="fileInput" type="file" accept="image/*" hidden>
      <div class="control-row">
        <button id="chooseBtn">选择图片</button>
        <button id="sampleBtn">使用样例</button>
        <button id="runBtn" class="primary">运行 SAM</button>
      </div>
      <div class="file-line" id="fileName">未选择文件，将使用内置样例</div>
      <div id="paramsPanel" class="params"></div>
    </aside>
  </section>
  <section class="info-grid">
    <div class="panel"><h2>算法流程</h2><ul id="pipelineList"></ul></div>
    <div class="panel"><h2>应用场景</h2><ul id="applicationsList"></ul></div>
    <div class="panel"><h2>局限性</h2><ul id="limitationsList"></ul></div>
  </section>
  <div id="loading" class="loading" hidden>后端正在运行 SAM；若缺少 checkpoint，会显示下载指引...</div>
  <div id="errorBox" class="error" hidden></div>
  <section id="metricsGrid" class="metrics"></section>
  <section class="panel"><h2>真实中间步骤</h2><div id="stepsGrid" class="steps"></div></section>
</main>
<script>
window.ModelDemoConfig = {
  moduleId: 'sam',
  title: 'Segment Anything',
  subtitle: '用点或框提示，让同一个模型分割任意物体。',
  intro: '本页调用本地 SAM ViT-B checkpoint。若 checkpoint 缺失，页面会显示权重下载和配置路径，不返回假分割结果。',
  status: '真实预训练推理，需要 SAM checkpoint',
  params: [{ name: 'x', label: '提示点 x', type: 'range', min: 0, max: 768, step: 1, value: 384 }, { name: 'y', label: '提示点 y', type: 'range', min: 0, max: 768, step: 1, value: 384 }],
  pipeline: ['输入图像', 'ViT 图像编码器生成 embedding', '点/框提示编码', 'Mask Decoder 输出多个候选 mask', 'IoU 预测选择最佳 mask', '叠加到原图'],
  applications: ['交互式抠图', '数据标注辅助', '通用物体分割', '理解提示驱动视觉模型'],
  limitations: ['需要单独下载 checkpoint', '提示点质量影响结果', '大型图像 CPU 推理较慢']
};
</script>
<script src="../js/model-demo-page.js"></script>
</body>
</html>
