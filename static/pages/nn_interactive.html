<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神经网络 - Cvtoolkits</title>
<link rel="stylesheet" href="../css/iframe-theme.css">
<script src="../js/theme-sync.js"></script>
<script src="../js/page-utils.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif;background:transparent;color:var(--cv-text,#e2e8f0)}
.page{width:100%;max-width:none;margin:0;padding:16px 20px 24px}

.topbar{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--cv-border,rgba(148,163,184,.16))}
.topbar a{color:var(--cv-muted,#94a3b8);text-decoration:none;font-size:0.82rem}
.topbar h1{font-size:1.15rem;font-weight:800;color:var(--cv-text,#f8fafc)}

.badge{padding:2px 10px;border-radius:999px;font-size:0.72rem;font-weight:700}
.b1{background:rgba(59,130,246,.15);color:#60a5fa}
.b2{background:rgba(34,197,94,.12);color:#4ade80}
.b3{background:rgba(168,85,247,.15);color:#c4b5fd}
.b4{background:rgba(236,72,153,.12);color:#f9a8d4}
.b5{background:rgba(245,158,11,.12);color:#fcd34d}
.b6{background:rgba(100,116,139,.15);color:#94a3b8}
.b7{background:rgba(20,184,166,.12);color:#5eead4}

.grid2{display:grid;grid-template-columns:1fr 320px;gap:12px;margin-bottom:12px}

.panel{border:1px solid var(--cv-border,rgba(148,163,184,.16));background:var(--cv-panel,rgba(15,23,42,.72));box-shadow:var(--cv-shadow);border-radius:12px;padding:14px 16px}
.panel h3{font-size:0.9rem;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.05);color:var(--cv-text,#f8fafc)}

.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{padding:5px 10px;border-radius:999px;font-size:0.73rem;background:rgba(100,116,139,.08);border:1px solid var(--cv-border,rgba(148,163,184,.16));color:var(--cv-muted,#94a3b8)}
.chip strong{color:var(--cv-text,#f8fafc);font-weight:600}

.arch{overflow-x:auto;padding:6px 0}
.arch-row{display:flex;align-items:center;gap:0;font-size:0.7rem;margin-bottom:5px;min-width:fit-content}
.arch-block{display:grid;place-items:center;padding:6px 10px;border-radius:5px;text-align:center;line-height:1.3;font-weight:600;min-width:54px}
.arch-block .dim{font-size:0.6rem;font-weight:400;opacity:.7;margin-top:1px}
.ac{background:rgba(59,130,246,.18);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}
.ar{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.ap{background:rgba(245,158,11,.1);color:#fcd34d;border:1px solid rgba(245,158,11,.2)}
.af{background:rgba(34,197,94,.1);color:#86efac;border:1px solid rgba(34,197,94,.2)}
.ag{background:rgba(168,85,247,.12);color:#c4b5fd;border:1px solid rgba(168,85,247,.2)}
.ah{background:rgba(250,204,21,.12);color:#fde68a;border:1px solid rgba(250,204,21,.2)}
.ae{background:rgba(236,72,153,.12);color:#f9a8d4;border:1px solid rgba(236,72,153,.2)}
.at{background:rgba(20,184,166,.12);color:#5eead4;border:1px solid rgba(20,184,166,.2)}
.as{background:transparent;border:1.5px dashed rgba(59,130,246,.3);color:#60a5fa;padding:4px 12px;font-size:0.68rem}
.arrow{color:var(--cv-muted,#94a3b8);font-size:0.6rem;padding:0 3px;flex-shrink:0}
.down{color:var(--cv-muted,#94a3b8);font-size:0.55rem;text-align:center;padding:2px 0}

.upload-zone{border:2px dashed var(--cv-border,rgba(148,163,184,.32));border-radius:10px;padding:18px;text-align:center;cursor:pointer;margin-bottom:8px;transition:border-color .2s}
.upload-zone:hover{border-color:#3b82f6}
.upload-zone input{display:none}
.upload-hint{color:var(--cv-muted,#94a3b8);font-size:0.84rem}

.btn{display:block;width:100%;padding:10px;border-radius:8px;border:0;font-size:0.85rem;cursor:pointer;font-weight:700;text-align:center;margin-bottom:6px;font-family:inherit}
.brun{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff}.brun:disabled{opacity:.45;cursor:not-allowed}
.bdemo{background:rgba(100,116,139,.15);color:var(--cv-muted,#94a3b8)}

.status{margin-top:6px;padding:5px 10px;border-radius:5px;font-size:0.76rem}
.sok{background:rgba(34,197,94,.1);color:#4ade80}
.serr{background:rgba(239,68,68,.1);color:#f87171}
.sinfo{background:rgba(59,130,246,.08);color:#93c5fd}

/* Results: auto-fit grid, images shown at full width */
.results{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:12px;margin-top:8px}
.rc{background:rgba(2,6,23,.35);border:1px solid var(--cv-border,rgba(148,163,184,.13));border-radius:10px;overflow:hidden}
.rc img{width:100%;display:block;object-fit:contain;background:rgba(2,6,23,.42)}
.rc .c{padding:8px 10px 2px;font-size:0.8rem;font-weight:700;color:var(--cv-text,#f8fafc)}
.rc .e{padding:2px 10px 10px;font-size:0.74rem;color:var(--cv-muted,#94a3b8);line-height:1.5}

.explain{background:rgba(59,130,246,.04);border:1px solid var(--cv-border,rgba(148,163,184,.1));border-radius:8px;padding:11px 14px;font-size:0.82rem;color:var(--cv-muted,#94a3b8);line-height:1.7}
.explain strong{color:var(--cv-text,#f8fafc)}
.note{text-align:center;padding:20px;font-size:0.84rem;color:var(--cv-muted,#94a3b8)}

@media(max-width:780px){.grid2{grid-template-columns:1fr}.results{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="page" id="app">
  <div class="topbar">
    <span style="font-size:0.78rem;color:var(--muted)" id="crumb"></span>
    <h1 id="title"></h1>
    <span class="badge" id="badge1" style="display:none"></span>
    <span class="badge" id="badge2" style="display:none"></span>
  </div>

  <div class="grid2">
    <div class="panel" style="grid-row:span 2">
      <h3>网络结构</h3>
      <div class="chips" id="chips"></div>
      <div class="arch" id="arch"></div>
      <div class="explain" id="explain"></div>
    </div>
    <div class="panel">
      <h3 id="actionTitle">交互</h3>
      <label class="upload-zone" id="uploadZone" style="display:none">
        <input type="file" id="fileInput" accept="image/*">
        <div class="upload-hint" id="uploadHint">点击或拖入图片</div>
      </label>
      <button class="btn brun" id="runBtn" disabled>运行</button>
      <div id="status"></div>
    </div>
  </div>

  <div class="panel">
    <h3>运行结果</h3>
    <div class="results" id="results"><div class="note">运行算法查看结果</div></div>
  </div>
</div>

<script src="../js/algorithm-content.js?v=2"></script>
<script>
var p=new URLSearchParams(location.search);var id=p.get('id')||'resnet';
var cfg=(window.AlgorithmContent&&window.AlgorithmContent[id])||{};
var impl=cfg.implementation||{};
var localTeachingIds = {vit:true,detr:true,sam:true,clip:true,stable_diffusion:true,sd:true};
var isExt=impl.category==='requires_external_weights' && !localTeachingIds[id];

// Architecture renderer - builds proper visual blocks from structured data
function renderArch(blocks,skipNote){
  var h='<div class="arch-row">';
  blocks.forEach(function(b,i){
    if(b==='→')h+='<span class="arrow">→</span>';
    else if(b==='↓')h+='</div><div class="down">↓</div><div class="arch-row">';
    else if(typeof b==='string')h+='<span class="arch-block" style="min-width:70px">'+b+'</span>';
    else h+='<span class="arch-block '+b.cls+'" style="min-width:'+(b.w||60)+'px">'+b.t+'<span class="dim">'+b.d+'</span></span>';
  });
  h+='</div>';
  if(skipNote)h+='<div class="arch-row" style="justify-content:center;margin-top:4px"><span class="arch-block as">'+skipNote+'</span></div>';
  return h;
}

var DATA={
resnet:{cat:'cnn',badgeCls:'b1',badge:'ImageNet冠军',
  arch:renderArch([{t:'Input',d:'224²×3',cls:'ac'},'→',{t:'Conv7×7',d:'64,/2',cls:'ac'},'→',{t:'MaxPool',d:'/2',cls:'ap'},'→',{t:'Bottleneck×3',d:'256',cls:'ac'},'→',{t:'Bottleneck×4',d:'512',cls:'ac'},'→',{t:'Bottleneck×6',d:'1024',cls:'ac'},'→',{t:'Bottleneck×3',d:'2048',cls:'ac'},'→',{t:'AvgPool',d:'',cls:'ap'},'→',{t:'FC1000',d:'',cls:'af'}],'⤴ 残差连接：每个Bottleneck的输出 = F(x) + x'),
  chips:['残差F(x)+x 梯度直通','瓶颈1×1→3×3→1×1减参','BatchNorm稳定训练','Grad-CAM梯度加权定位'],
  explain:'没有残差连接时，深层网络梯度消失无法训练。<strong>ResNet让网络学习"残差"F(x)=H(x)-x</strong>，跳跃连接让梯度通过加法门直通浅层。50层由4组瓶颈块堆叠(3+4+6+3)，每块用1×1卷积先降维再升维来大幅减少参数。',
  upload:true,btn:'运行 ResNet-50 推理'},

unet:{cat:'cnn',badgeCls:'b2',badge:'医学影像标配',
  arch:renderArch([{t:'Enc1',d:'64',cls:'ac'},'↓',{t:'Enc2',d:'128',cls:'ac'},'↓',{t:'Enc3',d:'256',cls:'ac'},'↓',{t:'Enc4',d:'512',cls:'ac'},'↓',{t:'Bottleneck',d:'1024',cls:'ag'},'→',{t:'Dec3',d:'256',cls:'ac'},'→',{t:'Dec2',d:'128',cls:'ac'},'→',{t:'Dec1',d:'64',cls:'ac'},'→',{t:'Output',d:'1',cls:'af'}],'⤴ 长跳跃连接：解码器每层拼接同层编码器特征'),
  chips:['对称编解码结构','长跳跃连接保留位置细节','上采样+卷积替代转置卷积','小数据集医学影像分割标配'],
  explain:'U-Net的U形结构：<strong>左边编码器逐层下采样提取语义</strong>，右边解码器逐层上采样恢复分辨率。关键是<strong>跳跃连接</strong>——解码器每层拼接同层编码器的特征图再卷积，浅层位置信息不会在深层丢失。',upload:true,btn:'运行 U-Net 分割'},

fcn:{cat:'cnn',badgeCls:'b2',badge:'开山之作',
  arch:renderArch([{t:'VGG16',d:'/32',cls:'ac'},'→',{t:'1×1 Conv',d:'21ch',cls:'ac'},'→',{t:'转置卷积↑',d:'',cls:'ap'},'→',{t:'像素分类',d:'H×W×21',cls:'af'}],'跳跃融合：Pool3(1/8)+Pool4(1/16)→逐元素相加→上采样'),
  chips:['全卷积：无FC层','转置卷积可学习上采样','跳跃融合保留边缘细节','语义分割开山之作'],
  explain:'FCN把分类网络最后的全连接层全部替换为卷积层。<strong>用1×1卷积映射通道→转置卷积上采样→逐像素softmax分类</strong>。多次跳跃融合让浅层边缘信息补充深层语义，分割边界更精确。',upload:true,btn:'运行 FCN 分割'},

yolo:{cat:'cnn',badgeCls:'b5',badge:'实时检测',
  arch:renderArch([{t:'Backbone',d:'CSPDarknet',cls:'ac'},'→',{t:'Neck',d:'FPN+PAN',cls:'ac'},'→',{t:'Detect Head',d:'3尺度',cls:'ae'}],'网格→回归(x,y,w,h,obj,cls)→NMS'),
  chips:['单阶段:一次前向出结果','网格→回归 无RPN','实时30+FPS','多尺度检测头'],
  explain:'YOLO把检测变成回归：图像分S×S网格，每格预测边界框和类别。<strong>不需要RPN也不需RoI</strong>，一次前向传播直接出所有检测结果。从v1到v8持续演进，增加FPN、anchor-free、多尺度等改进。',upload:true,btn:'运行 YOLO 网格检测'},

faster_rcnn:{cat:'cnn',badgeCls:'b1',badge:'两阶段标杆',
  arch:renderArch([{t:'Backbone',d:'ResNet+FPN',cls:'ac'},'→',{t:'RPN',d:'候选框',cls:'ae'},'→',{t:'RoIAlign',d:'7×7',cls:'ap'},'→',{t:'分类头',d:'cls',cls:'af'},'→',{t:'回归头',d:'box',cls:'af'}],''),
  chips:['RPN生成候选区域','RoIAlign精确采样','两阶段:粗筛→精修','精度高但速度慢于YOLO'],
  explain:'Faster R-CNN是两阶段检测标杆。<strong>RPN在特征图每个位置预测候选框</strong>，RoIAlign把每个候选区域裁成固定尺寸特征，再分别分类+精修框。精度高但比单阶段慢。',upload:true,btn:'运行 Faster R-CNN'},

mask_rcnn:{cat:'cnn',badgeCls:'b2',badge:'实例分割',
  arch:renderArch([{t:'Backbone',d:'ResNet+FPN',cls:'ac'},'→',{t:'RPN',d:'候选框',cls:'ae'},'→',{t:'RoIAlign',d:'14×14',cls:'ap'},'→',{t:'分类+框',d:'',cls:'af'},'→',{t:'掩码分支',d:'28×28',cls:'ae'}],''),
  chips:['Faster R-CNN+并行掩码','RoIAlign避免量化误差','实例级像素分割','COCO基准模型'],

gan:{cat:'gen',badgeCls:'b4',badge:'对抗博弈',
  arch:renderArch([{t:'z~N(0,1)',d:'100维',cls:'ah'},'→',{t:'Dense',d:'4×4×64',cls:'ac'},'→',{t:'↑8×8×32',d:'',cls:'ac'},'→',{t:'↑16×16×16',d:'',cls:'ac'},'→',{t:'↑32×32×3',d:'RGB',cls:'ae'}],'判别器D: Conv→Pool→FC→Sigmoid ← real/fake'),
  chips:['G从噪声生成逼真图像','D学习区分真伪','对抗训练:零和博弈','模式坍塌是经典难题'],
  explain:'GAN是<strong>生成器与判别器的二人博弈</strong>。G学习p(real)，D学习区分p(real)和p(fake)。交替训练：D变强迫使G生成更逼真的图，G变强迫使D寻找更细微的破绽。训练不稳定和模式坍塌是经典挑战。',upload:false,btn:'运行 DCGAN 生成'},

diffusion:{cat:'gen',badgeCls:'b4',badge:'逐步去噪',
  arch:renderArch([{t:'x₀',d:'真实图',cls:'af'},'→',{t:'+ε→x₁',d:'',cls:'ah'},'→',{t:'...',d:'',cls:'ap'},'→',{t:'x_T',d:'纯噪声',cls:'ar'}],'UNet(t,text)→预测ε→逐步去噪→x₀恢复'),
  chips:['前向加噪破坏图像','反向UNet预测噪声','T=1000步迭代去噪','SD=潜空间扩散'],

ddpm:{cat:'gen',badgeCls:'b4',badge:'奠基之作',
  arch:renderArch([{t:'x₀',d:'图像',cls:'af'},'→',{t:'加噪q',d:'T=1000步',cls:'ah'},'→',{t:'x_T',d:'N(0,I)',cls:'ar'}],'UNet(t)→预测ε_θ→p(x_{t-1}|x_t)逐步去噪'),
  chips:['马尔可夫加噪链','预测噪声而非图像','T=1000步','方差schedule控制噪声强度'],
  explain:'DDPM是扩散模型的奠基作。<strong>前向过程：马尔可夫链逐步加高斯噪声</strong>，T步后变为各向同性高斯。反向过程学习去噪转移p(x_{t-1}|x_t)，训练目标是预测加入的噪声ε而非直接预测x₀。',upload:true,btn:'运行 DDPM 演示'},

  chips:['图像→patch token序列','自注意力全局建模','无卷积纯Transformer','需海量数据预训练'],
  explain:'ViT证明卷积不是必需的。<strong>把图像切成16×16的patch</strong>，每块线性投影成token，加位置编码送进标准Transformer。<strong>自注意力让每块直接看到全局</strong>。缺点是需要JFT-300M级别数据预训练，否则不如CNN。',upload:false,btn:'需GPU+ViT权重',ext:true},

swin:{cat:'transformer',badgeCls:'b3',badge:'层级化',
  arch:renderArch([{t:'Patch4×4',d:'96d',cls:'ap'},'→',{t:'W-MSA',d:'窗口内',cls:'ac'},'→',{t:'SW-MSA',d:'跨窗口',cls:'ac'},'↓',{t:'PatchMerge',d:'192d',cls:'ap'},'→',{t:'W/SW-MSA',d:'×2',cls:'ac'},'↓',{t:'PatchMerge',d:'384d',cls:'ap'},'→',{t:'W/SW-MSA',d:'×6',cls:'ac'},'↓',{t:'PatchMerge',d:'768d',cls:'ap'},'→',{t:'W/SW-MSA',d:'×2',cls:'ac'}],''),
  chips:['窗口注意力:线性复杂度','移位窗口:跨窗口通信','层级式多尺度特征','ImageNet+COCO双冠'],
  explain:'Swin Transformer解决了ViT的两个问题：<strong>计算量O(N²)→O(N)</strong>（窗口内做注意力）和<strong>缺乏多尺度特征</strong>（逐层合并patch）。移位窗口让相邻窗口之间能通信。',upload:false,btn:'需GPU+权重',ext:true},

detr:{cat:'transformer',badgeCls:'b3',badge:'端到端',
  arch:renderArch([{t:'CNN',d:'特征',cls:'ac'},'→',{t:'TransfEnc',d:'全局',cls:'ac'},'→',{t:'TransfDec',d:'×6',cls:'ac'},'→',{t:'FFN',d:'(cls,box)',cls:'af'}],'100 Object Queries→二分匹配→直接出检测结果'),
  chips:['Object Query可学习探针','匈牙利二分匹配替代NMS','端到端无anchor','收敛慢需500+轮'],
  explain:'DETR把检测重新定义为<strong>集合预测问题</strong>。100个Object Query经过Transformer解码器直接输出(类别,框)对。<strong>匈牙利算法做二分匹配</strong>替代NMS。优点是简洁端到端，缺点收敛慢。',upload:false,btn:'需GPU+权重',ext:true},

clip:{cat:'transformer',badgeCls:'b3',badge:'图文对齐',
  arch:renderArch([{t:'Image',d:'ViT/ResNet',cls:'ac'},'→',{t:'v_img',d:'512d',cls:'af'}],'cosine→对比损失')+renderArch([{t:'Text',d:'Transformer',cls:'ae'},'→',{t:'v_txt',d:'512d',cls:'af'}],''),
  chips:['双塔分别编码图文','对比学习4亿图文对','零样本分类/检索','提示工程: a photo of [cls]'],
  explain:'CLIP的核心是<strong>把图像和文本映射到同一向量空间</strong>，使匹配图文对的余弦相似度最大化。4亿图文对训练后，CLIP获得零样本能力：不需要训练过的类别，把类别名写成自然语言即可分类。',upload:false,btn:'需GPU+权重',ext:true},

sam:{cat:'transformer',badgeCls:'b2',badge:'基础模型',

var isExt=(mod.ext||(impl.category==='requires_external_weights')) && !localTeachingIds[id];
var runBtn=document.getElementById('runBtn');
if(isExt){
  document.getElementById('uploadZone').style.display='none';
  runBtn.textContent=mod.btn||'需本地权重';
  runBtn.classList.remove('brun');runBtn.classList.add('bdemo');
  runBtn.disabled=false;
  document.getElementById('actionTitle').textContent='说明';
  document.getElementById('status').innerHTML='<div class="status sinfo">需要GPU+预训练权重文件。当前页面展示网络架构与原理。部分模块可本地运行—参见CNN基础页的交互实验。</div>';
} else {
  if(mod.upload){document.getElementById('uploadZone').style.display='';}
  else {document.getElementById('uploadZone').style.display='none';runBtn.disabled=false;}
  runBtn.textContent=mod.btn||'运行';
}

var file=null;
document.getElementById('uploadZone').addEventListener('click',function(){document.getElementById('fileInput').click()});
document.getElementById('fileInput').addEventListener('change',function(){if(this.files[0]){file=this.files[0];document.getElementById('uploadHint').textContent=file.name;runBtn.disabled=false}});
document.getElementById('uploadZone').addEventListener('dragover',function(e){e.preventDefault()});
document.getElementById('uploadZone').addEventListener('drop',function(e){e.preventDefault();if(e.dataTransfer.files[0]){file=e.dataTransfer.files[0];document.getElementById('uploadHint').textContent=file.name;runBtn.disabled=false}});

runBtn.addEventListener('click',function(){
  if(isExt)return;
  if(mod.upload&&!file){document.getElementById('status').innerHTML='<div class="status serr">请先选择图片</div>';return}
  var s=document.getElementById('status');
  s.innerHTML='<div class="status sok">运行中...</div>';runBtn.disabled=true;
  var fd=new FormData();if(file)fd.append('file',file);
  var endpoint=(cfg&&cfg.endpoint)||('/api/demo/'+id);
  fetch(endpoint,{method:'POST',body:fd})
    .then(function(r){return r.json().catch(function(){return null}).then(function(j){if(r.ok)return j;throw new Error((j&&j.error)||'HTTP '+r.status)})})
    .then(function(d){
      var html='';var steps=d.steps||[];
      steps.forEach(function(s){
        var img=s.image_base64?'data:image/png;base64,'+s.image_base64:(s.image||'');
        if(img)html+='<div class="rc"><img src="'+img+'"><div class="c">'+s.name+'</div><div class="e">'+(s.explanation||'')+'</div>'+(s.formula?'<div class="e"><code>'+s.formula+'</code></div>':'')+'</div>';
      });
      document.getElementById('results').innerHTML=html||'<div class="note">完成</div>';
      var m=d.metrics||{};
      var ms=Object.keys(m).slice(0,5).map(function(k){return'<span style="font-size:0.73rem;color:var(--muted)">'+k+': <b>'+m[k]+'</b></span>'}).join(' &nbsp;·&nbsp; ');
      s.innerHTML='<div class="status sok">完成</div><div style="margin-top:6px">'+ms+'</div>';
    })
    .catch(function(e){s.innerHTML='<div class="status serr">失败: '+(e.message||e)+'</div>'})
    .finally(function(){runBtn.disabled=false});
});

      explain: 'ResNet 的核心不是“堆更深”，而是把每一层改写成学习残差 F(x)，最后输出 F(x)+x。这样即使新层学不到有效增量，信息也能通过恒等分支直接传过去，深层网络才真正可训练。',

      storyIntro: '如果把 LeNet 看成 CNN 入门，ResNet 解决的就是“网络加深后为什么反而学不动”。它把优化问题从“学完整映射”改成“学相对修正”。',
      cards: [
        { type: 'arrows', title: '残差块的真实作用', text: '主分支负责提取新特征，捷径分支负责保底传输原始信息。最后两者相加，再过激活。', labels: ['x', 'F(x)', 'F(x)+x'] },

      explain: 'U-Net 把“看懂整张图”和“保住局部边界”这两件事拆开做。左边编码器不断下采样获得大范围语义，右边解码器逐步上采样恢复分辨率，再用 skip connection 把浅层边缘细节接回来。',

  function text(value, fallback) {
    return value == null || value === '' ? (fallback || '') : String(value);
  }

  function escapeHtml(value) {
    return text(value).replace(/[&<>"]/g, function(ch) {
      return ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;'})[ch];
    });
  }

  function taskBadge(moduleId) {
    if (moduleId === 'detection' || moduleId === 'faster_rcnn' || moduleId === 'detr' || moduleId === 'dino_det' || moduleId === 'grdino') return '目标检测';
    if (moduleId === 'semantic' || moduleId === 'fcn' || moduleId === 'unet') return '语义分割';
    if (moduleId === 'instance' || moduleId === 'mask_rcnn' || moduleId === 'mask2former') return '实例分割';
    if (moduleId === 'sam' || moduleId === 'sam2') return '可提示分割';
    if (moduleId === 'gan' || moduleId === 'diffusion' || moduleId === 'ddpm' || moduleId === 'stable_diffusion' || moduleId === 'controlnet' || moduleId === 'flux' || moduleId === 'stylegan') return '生成模型';
    if (moduleId === 'clip' || moduleId === 'blip2') return '多模态';
    if (moduleId === 'nerf' || moduleId === '3dgs' || moduleId === 'bev' || moduleId === 'occupy' || moduleId === 'dust3r' || moduleId === 'orbslam3' || moduleId === 'pointnet') return '3D感知';
    if (moduleId === 'deeppose' || moduleId === 'openpose' || moduleId === 'vitpose' || moduleId === 'mediapipe') return '姿态估计';
    if (moduleId === 'bytetrack' || moduleId === 'botsort') return '多目标跟踪';
    if (moduleId === 'simclr' || moduleId === 'moco' || moduleId === 'byol' || moduleId === 'ijepa' || moduleId === 'dino' || moduleId === 'mae') return '自监督学习';
    if (moduleId === 'c3d') return '视频理解';
    if (moduleId === 'vit' || moduleId === 'swin' || moduleId === 'dit') return 'Transformer视觉';
    return '';
  }

  function implementationState(meta) {
    if (!meta) return { cls: 'nn-status-info', label: '未声明' };
    if (meta.category === 'requires_external_weights') return { cls: 'nn-status-info', label: meta.status || '需要外部权重' };
    if (meta.category === 'not_implemented' || meta.category === 'model_not_available') return { cls: 'nn-status-err', label: meta.status || '当前不可运行' };
    if (meta.real_model) return { cls: 'nn-status-ok', label: meta.status || '真实预训练模型' };
    return { cls: 'nn-status-info', label: meta.status || '本地算法实现' };
  }

  function extraControls(moduleId) {
    if (moduleId === 'detection' || moduleId === 'faster_rcnn' || moduleId === 'detr' || moduleId === 'dino_det' || moduleId === 'grdino') {
      return [{ name: 'threshold', label: '置信度阈值', type: 'range', min: .2, max: .9, step: .05, value: .5 }];
    }
    if (moduleId === 'instance' || moduleId === 'mask_rcnn' || moduleId === 'mask2former') {
      return [
        { name: 'threshold', label: '检测阈值', type: 'range', min: .2, max: .9, step: .05, value: .5 },
        { name: 'mask_threshold', label: '掩码阈值', type: 'range', min: .3, max: .8, step: .05, value: .5 }
      ];
    }
    if (moduleId === 'diffusion' || moduleId === 'stable_diffusion' || moduleId === 'controlnet' || moduleId === 'ddpm') {
      return [{ name: 'num_steps', label: '去噪步数', type: 'range', min: 10, max: 100, step: 10, value: 50 }];
    }
    return [];
  }

  function renderPipelineCards() {
    var items = clean && clean.pipeline ? clean.pipeline.slice(0, 4) : pipeline.slice(0, 4);
    if (!items.length) {
      items = ((clean && clean.chips) || showcaseMod.chips || []).slice(0, 4).map(function(item) {
        return [item, '把这个模型最关键的设计点单独拎出来理解。'];
      });
    }
    return items.map(function(item, index) {
      return '<div class="nn-pipe-card">' +
        '<span class="nn-pipe-step">' + (index + 1) + '</span>' +
        '<div class="nn-pipe-title">' + escapeHtml(item[0]) + '</div>' +
        '<div class="nn-pipe-desc">' + escapeHtml(item[1] || '') + '</div>' +
      '</div>';
    }).join('');
  }

  function renderBarCard(card) {
    return '<div class="nn-bars">' + (card.items || []).map(function(item) {
      return '<div class="nn-bar-row">' +
        '<span class="nn-bar-label">' + escapeHtml(item.label) + '</span>' +
        '<span class="nn-bar-track"><span class="nn-bar-fill" style="width:' + Number(item.value || 0) + '%;background:' + escapeHtml(item.color || '#38bdf8') + '"></span></span>' +
        '<span class="nn-bar-caption">' + escapeHtml(item.caption || '') + '</span>' +
      '</div>';
    }).join('') + '</div>';
  }

  function renderGradientCard(card) {
    return '<div class="nn-grad-list">' + (card.rows || []).map(function(row) {
      return '<div class="nn-grad-row">' +
        '<span class="nn-grad-label">' + escapeHtml(row.label) + '</span>' +
        '<span class="nn-grad-rail" style="background:' + escapeHtml(row.gradient || 'linear-gradient(90deg,#38bdf8,#66f2c2)') + '"></span>' +
        '<span class="nn-grad-caption">' + escapeHtml(row.caption || '') + '</span>' +
      '</div>';
    }).join('') + '</div>';
  }

  function renderArrowCard(card) {
    return '<div class="nn-flow-mini">' + (card.labels || []).map(function(label, index, arr) {
      return '<span>' +
        '<span class="nn-flow-node">' + escapeHtml(label) + '</span>' +
        (index < arr.length - 1 ? '<span class="nn-flow-arrow">→</span>' : '') +
      '</span>';
    }).join('') + '</div>';
  }

  function renderPixelCard(card) {
    var rows = Number(card.rows || 6);
    var cols = Number(card.cols || 10);
    var palette = card.palette || ['#1e293b', '#334155', '#475569', '#64748b', '#94a3b8', '#cbd5e1'];
    var cells = '';
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var color = palette[(r * cols + c) % palette.length];
        cells += '<span class="nn-pixel-cell" style="background:' + escapeHtml(color) + '"></span>';
      }
    }
    return '<div class="nn-pixel-grid" style="grid-template-columns:repeat(' + cols + ',1fr)">' + cells + '</div>';
  }

  function renderThresholdCard(card) {
    var position = Math.max(0, Math.min(100, Number(card.position || 50)));
    return '<div class="nn-threshold"><span class="nn-threshold-cut" style="left:calc(' + position + '% - 1px)"></span></div>';
  }

  function renderStoryCard(card) {
    var body = '';
    if (card.type === 'bars') body = renderBarCard(card);
    else if (card.type === 'gradientSet') body = renderGradientCard(card);
    else if (card.type === 'arrows') body = renderArrowCard(card);
    else if (card.type === 'pixels') body = renderPixelCard(card);
    else if (card.type === 'threshold') body = renderThresholdCard(card);
    return '<article class="nn-story-card">' +
      '<div class="nn-story-title">' + escapeHtml(card.title || '核心视角') + '</div>' +
      '<div class="nn-story-text">' + escapeHtml(card.text || '') + '</div>' +
      body +
    '</article>';
  }

  function buildStoryGrid() {
    var cards = clean && clean.cards ? clean.cards.slice(0, 4) : (Array.isArray(story.cards) ? story.cards.slice(0, 4) : []);
    if (!cards.length && principles.length) {
      cards = principles.slice(0, 4).map(function(item, index) {
        return { title: '原则 ' + (index + 1), text: item };
      });
    }
    return cards.map(renderStoryCard).join('');
  }

  function moduleFamily(moduleId) {
    if (moduleId === 'resnet' || moduleId === 'vit' || moduleId === 'swin') return 'classifier';
    if (moduleId === 'unet' || moduleId === 'fcn') return 'semantic_seg';
    if (moduleId === 'yolo' || moduleId === 'faster_rcnn' || moduleId === 'detr') return 'detection';
    if (moduleId === 'mask_rcnn') return 'instance_seg';
    if (moduleId === 'sam') return 'prompt_seg';
    if (moduleId === 'gan') return 'gan';
    if (moduleId === 'diffusion' || moduleId === 'ddpm') return 'diffusion';
    if (moduleId === 'clip') return 'multimodal';
    if (moduleId === 'simclr' || moduleId === 'moco' || moduleId === 'byol' || moduleId === 'ijepa') return 'representation';
    if (moduleId === 'nerf' || moduleId === 'pointnet' || moduleId === '3dgs' || moduleId === 'bev') return 'three_d';
    if (moduleId === 'c3d') return 'video';
    if (moduleId === 'bytetrack') return 'tracking';
    if (moduleId === 'deeppose' || moduleId === 'openpose') return 'pose';
    return 'classifier';
  }

  function teachingPack(moduleId) {
    var family = FAMILY_GUIDES[moduleFamily(moduleId)] || {};
    var override = MODULE_GUIDES[moduleId] || {};
    return {
      objective: override.objective || family.objective || '',
      formulae: override.formulae || family.formulae || [],
      observe: override.observe || family.observe || [],
      pitfalls: override.pitfalls || family.pitfalls || [],
      metrics: override.metrics || family.metrics || [],
      preview: override.preview || []
    };
  }

  var pack = teachingPack(showcaseId);

  function renderFormulaCards() {
    var cards = (pack.formulae || []).slice(0, 4);
    if (!cards.length) {
      return '<div class="nn-note">当前模块暂未补充公式卡片。</div>';
    }
    return cards.map(function(card) {
      return '<article class="nn-formula-card">' +
        '<div class="nn-formula-name">' + escapeHtml(card.name || '公式') + '</div>' +
        '<div class="nn-formula-expr">' + escapeHtml(card.expr || '') + '</div>' +
        '<div class="nn-formula-plain">' + escapeHtml(card.plain || '') + '</div>' +
      '</article>';
    }).join('');
  }

  function renderGuideList(items) {
    items = (items || []).slice(0, 4);
    if (!items.length) {
      return '<div class="nn-note">当前模块暂未补充讲解要点。</div>';
    }
    return '<div class="nn-guide-list">' + items.map(function(item, index) {
      return '<div class="nn-guide-item"><span class="nn-guide-bullet">' + (index + 1) + '</span><span>' + escapeHtml(item) + '</span></div>';
    }).join('') + '</div>';
  }

  function previewSteps() {
    var fromPack = (pack.preview || []).slice(0, 4).map(function(item, index, arr) {
      return { kind: index === 0 ? 'input' : (index === arr.length - 1 ? 'output' : 'process'), name: '预期阶段 ' + (index + 1), explanation: item };
    });
    if (fromPack.length) return fromPack;
    var source = clean && clean.pipeline ? clean.pipeline : pipeline;
    return (source || []).slice(0, 4).map(function(item, index, arr) {
      return {
        kind: index === 0 ? 'input' : (index === arr.length - 1 ? 'output' : 'process'),
        name: item[0] || ('阶段 ' + (index + 1)),
        explanation: item[1] || '运行后可把这一阶段和真实输出对照起来看。'
      };
    });
  }

  function buildControls() {
    return extraControls(id).map(function(control) {
      if (control.type === 'range') {
        return '<div class="nn-control" data-control="' + escapeHtml(control.name) + '">' +
          '<div class="nn-control-head"><label for="ctrl_' + escapeHtml(control.name) + '">' + escapeHtml(control.label) + '</label>' +
          '<span class="nn-control-value" id="val_' + escapeHtml(control.name) + '">' + escapeHtml(control.value) + '</span></div>' +
          '<input id="ctrl_' + escapeHtml(control.name) + '" name="' + escapeHtml(control.name) + '" type="range" min="' + escapeHtml(control.min) + '" max="' + escapeHtml(control.max) + '" step="' + escapeHtml(control.step) + '" value="' + escapeHtml(control.value) + '">' +
        '</div>';
      }
      return '';
    }).join('');
  }

  function setStatus(kind, lines) {
    var statusEl = document.getElementById('nnStatus');
    if (!statusEl) return;
    var cls = kind === 'error' ? 'nn-status-err' : (kind === 'ok' ? 'nn-status-ok' : 'nn-status-info');
    statusEl.innerHTML = (lines || []).map(function(line) {
      return '<div class="nn-status-line ' + cls + '">' + line + '</div>';
    }).join('');
  }

  function renderMetrics(metrics) {
    var entries = Object.keys(metrics || {}).slice(0, 8);
    var html = entries.map(function(key) {
      return '<div class="nn-meta-item"><div class="nn-meta-label">' + escapeHtml(key) + '</div><div class="nn-meta-value">' + escapeHtml(metrics[key]) + '</div></div>';
    }).join('');
    if (!html) {
      html = (pack.metrics || []).slice(0, 4).map(function(item, index) {
        return '<div class="nn-meta-item"><div class="nn-meta-label">关注指标 ' + (index + 1) + '</div><div class="nn-meta-value">' + escapeHtml(item) + '</div></div>';
      }).join('') || '<div class="nn-note">运行后会在这里显示数值指标。</div>';
    }
    document.getElementById('nnMetrics').innerHTML = html;
  }

  function renderResults(steps) {
    var source = (steps && steps.length) ? steps : previewSteps();
    var html = (source || []).map(function(step, index, arr) {
      var stage = index === 0 ? 'input' : (index === arr.length - 1 ? 'output' : 'process');
      var img = step.image_base64 ? ('data:image/png;base64,' + step.image_base64) : (step.image || '');
      return '<article class="nn-step-card ' + stage + '">' +
        '<div class="nn-step-media">' + (img ? '<img src="' + img + '" alt="' + escapeHtml(step.name || '') + '">' : '<div class="nn-note"><span class="nn-preview-badge">' + ((steps && steps.length) ? '无图像返回' : '运行前预览') + '</span><div style="margin-top:10px">此处会对应网络中的一个关键阶段。</div></div>') + '</div>' +
        '<div class="nn-step-info">' +
          '<div class="nn-step-meta"><span>Step ' + String(index + 1).padStart(2, '0') + '</span><span>' + (stage === 'input' ? 'Input' : stage === 'output' ? 'Output' : 'Process') + '</span></div>' +
          '<div class="nn-step-title">' + escapeHtml(step.name || ('步骤 ' + (index + 1))) + '</div>' +
          '<div class="nn-step-desc">' + escapeHtml(step.explanation || '') + '</div>' +
          (step.formula ? '<div class="nn-step-formula">' + escapeHtml(step.formula) + '</div>' : '') +
          (step.data ? '<pre class="nn-step-data">' + escapeHtml(JSON.stringify(step.data, null, 2).slice(0, 900)) + '</pre>' : '') +
        '</div>' +
      '</article>';
    }).join('');
    document.getElementById('nnResults').innerHTML = html || '<div class="nn-note">当前实现没有返回中间步骤。</div>';
  }

  function currentFacts() {
    return [
      { label: 'phase', value: cfg.phase || '深度学习 / 前沿视觉' },
      { label: 'backend', value: impl.backend || '未声明' },
      { label: 'model', value: impl.model || '教学展示' },
      { label: 'inference', value: impl.local_inference === false ? '需外部资源' : '可直接在当前项目调用' }
    ];
  }

  injectStyle();
  root.className = 'page nn-showcase';
  root.innerHTML = '' +
    '<header class="page-header nn-hero">' +
      '<div class="nn-crumb" id="nnCrumb"></div>' +
      '<div class="nn-top">' +
        '<section class="hero-copy">' +
          '<div class="nn-eyebrow">Neural Network Studio</div>' +
          '<h1 id="nnTitle"></h1>' +
          '<p class="nn-subtitle" id="nnSubtitle"></p>' +
          '<div class="nn-pill-row">' +
            '<span class="status" id="nnImplPill"></span>' +
            '<span class="nn-pill" id="nnBadge1" hidden></span>' +
            '<span class="nn-task-pill" id="nnBadge2" hidden></span>' +
          '</div>' +
          '<div class="nn-chip-grid" id="nnChipGrid"></div>' +
        '</section>' +
        '<aside class="panel nn-meta">' +
          '<div class="nn-section-head"><h2>实现状态</h2><span id="nnPhase"></span></div>' +
          '<div class="nn-meta-grid" id="nnFacts"></div>' +
        '</aside>' +
      '</div>' +
    '</header>' +
    '<section class="nn-grid">' +
      '<article class="panel nn-structure">' +
        '<div class="nn-section-head"><h2>结构总览</h2><span>先把模型主干和任务流程走一遍。</span></div>' +
        '<div class="arch" id="nnArch"></div>' +
        '<div class="nn-pipeline" id="nnPipeline"></div>' +
        '<div class="nn-explain" id="nnExplain"></div>' +
      '</article>' +
      '<aside class="panel nn-runtime">' +
        '<div class="nn-section-head"><h2>交互运行</h2><span id="nnRunHint"></span></div>' +
        '<label class="nn-upload" id="nnUpload" hidden>' +
          '<input type="file" id="nnFileInput" accept="image/*">' +
          '<div class="nn-upload-hint"><span id="nnUploadPrompt">点击或拖入图片</span><span class="nn-upload-name" id="nnUploadName">未选择文件</span></div>' +
        '</label>' +
        '<div class="nn-controls" id="nnControls"></div>' +
        '<button class="nn-run-btn" id="nnRunBtn"></button>' +
        '<div class="nn-status" id="nnStatus"></div>' +
        '<p class="nn-run-note" id="nnRunNote"></p>' +
      '</aside>' +
    '</section>' +
    '<section class="nn-grid">' +
      '<article class="panel nn-formula">' +
        '<div class="nn-section-head"><h2>训练目标与公式</h2><span>先看这个模型到底在优化什么，再看它怎么做结构设计。</span></div>' +
        '<div class="nn-objective" id="nnObjective"></div>' +
        '<div class="nn-formula-grid" id="nnFormulas"></div>' +
      '</article>' +
      '<article class="panel nn-reading">' +
        '<div class="nn-section-head"><h2>结果应该怎么看</h2><span>把 LeNet 那种“看结构也看输出含义”的讲解方式补到每个神经网络页面。</span></div>' +
        '<div class="nn-guide-stack">' +
          '<section class="nn-guide-block"><h3>先看什么</h3><div id="nnObserve"></div></section>' +
          '<section class="nn-guide-block"><h3>常见误区</h3><div id="nnPitfalls"></div></section>' +
        '</div>' +
      '</article>' +
    '</section>' +
    '<section class="panel nn-story">' +
      '<div class="nn-section-head"><h2>理解这个模型</h2><span>用和 LeNet 同一档的教学粒度解释关键设计。</span></div>' +
      '<p class="nn-story-intro" id="nnStoryIntro"></p>' +
      '<div class="nn-story-grid" id="nnStoryGrid"></div>' +
    '</section>' +
    '<section class="panel nn-results">' +
      '<div class="nn-section-head"><h2>运行结果</h2><span id="nnResultHint">运行前先看预期阶段，运行后再对照真实中间结果。</span></div>' +
      '<div class="nn-metrics" id="nnMetrics"></div>' +
      '<div class="nn-results-grid" id="nnResults"><div class="nn-note">正在加载预期阶段</div></div>' +
    '</section>';

  document.getElementById('nnCrumb').textContent = (cfg.phase || '深度学习') + ' / ' + (cfg.title || id);
  document.getElementById('nnTitle').textContent = cfg.title || id;
  document.getElementById('nnSubtitle').textContent = (clean && clean.explain) || cfg.tagline || cfg.english || '把网络结构、训练目标和运行结果放在一个统一工作台里理解。';
  document.getElementById('nnPhase').textContent = cfg.phase || '深度学习 / 前沿视觉';
  document.getElementById('nnArch').innerHTML = showcaseMod.arch || mod.arch || '';
  document.getElementById('nnPipeline').innerHTML = renderPipelineCards();
  document.getElementById('nnExplain').innerHTML = (clean && clean.explain) || showcaseMod.explain || cfg.tagline || '';
  document.getElementById('nnObjective').innerHTML = '<strong>这一页不只是展示 UI。</strong>' + escapeHtml(pack.objective || '这一类模型的目标是把结构、训练目标和输出解释连起来理解。');
  document.getElementById('nnFormulas').innerHTML = renderFormulaCards();
  document.getElementById('nnObserve').innerHTML = renderGuideList(pack.observe);
  document.getElementById('nnPitfalls').innerHTML = renderGuideList(pack.pitfalls);
  document.getElementById('nnStoryIntro').textContent = (clean && clean.storyIntro) || story.intro || '这一栏不是结果面板，而是把模型真正重要的设计思想拆成几个局部切片。';
  document.getElementById('nnStoryGrid').innerHTML = buildStoryGrid() || '<div class="nn-note">当前模块暂未补充额外的概念拆解卡片。</div>';
  document.getElementById('nnChipGrid').innerHTML = ((clean && clean.chips) || showcaseMod.chips || []).slice(0, 4).map(function(item, index) {
    return '<div class="nn-chip"><strong>重点 ' + (index + 1) + '</strong>' + escapeHtml(item) + '</div>';
  }).join('') || '<div class="nn-chip"><strong>模块说明</strong>' + escapeHtml(cfg.tagline || '暂无概览信息') + '</div>';
  document.getElementById('nnFacts').innerHTML = currentFacts().map(function(item) {
    return '<div class="nn-meta-item"><div class="nn-meta-label">' + escapeHtml(item.label) + '</div><div class="nn-meta-value">' + escapeHtml(item.value) + '</div></div>';
  }).join('');

  var state = implementationState(impl);
  var implPill = document.getElementById('nnImplPill');
  implPill.textContent = state.label;
  implPill.className = 'status ' + state.cls;

  var badge1 = document.getElementById('nnBadge1');
  if (showcaseMod.badge) {
    badge1.hidden = false;
    badge1.textContent = showcaseMod.badge;
  }

  var badge2 = document.getElementById('nnBadge2');
  var task = taskBadge(id);
  if (task) {
    badge2.hidden = false;
    badge2.textContent = task;
  }

  var uploadEl = document.getElementById('nnUpload');
  var fileInput = document.getElementById('nnFileInput');
  var uploadName = document.getElementById('nnUploadName');
  var runBtn = document.getElementById('nnRunBtn');
  var controlsWrap = document.getElementById('nnControls');

  controlsWrap.innerHTML = buildControls();
  Array.prototype.slice.call(controlsWrap.querySelectorAll('input[type=range]')).forEach(function(input) {
    var valueEl = document.getElementById('val_' + input.name);
    var sync = function() {
      valueEl.textContent = Number(input.value) % 1 === 0 ? input.value : Number(input.value).toFixed(2);
    };
    input.addEventListener('input', sync);
    sync();
  });

  function syncRunButton() {
    if (isUnavailable) {
      runBtn.disabled = true;
      runBtn.classList.add('muted');
      runBtn.textContent = showcaseMod.btn || '当前不可运行';
      return;
    }
    if (requiresUpload && !selectedFile) {
      runBtn.disabled = true;
      runBtn.classList.remove('muted');
      runBtn.textContent = showcaseMod.btn || '请先上传图片';
      return;
    }
    runBtn.disabled = false;
    runBtn.classList.remove('muted');
    runBtn.textContent = showcaseMod.btn || '运行';
  }

  if (requiresUpload) {
    uploadEl.hidden = false;
    uploadEl.addEventListener('click', function() { fileInput.click(); });
    uploadEl.addEventListener('dragover', function(event) {
      event.preventDefault();
      uploadEl.classList.add('active');
    });
    uploadEl.addEventListener('dragleave', function() {
      uploadEl.classList.remove('active');
    });
    uploadEl.addEventListener('drop', function(event) {
      event.preventDefault();
      uploadEl.classList.remove('active');
      if (event.dataTransfer.files && event.dataTransfer.files[0]) {
        selectedFile = event.dataTransfer.files[0];
        uploadName.textContent = selectedFile.name;
        syncRunButton();
      }
    });
    fileInput.addEventListener('change', function() {
      if (fileInput.files && fileInput.files[0]) {
        selectedFile = fileInput.files[0];
        uploadName.textContent = selectedFile.name;
        syncRunButton();
      }
    });
  }

  document.getElementById('nnRunHint').textContent = requiresUpload ? '上传图片后，调用当前模块的真实实现或本地回退实现。' : '当前模块可以直接运行，不需要额外上传输入图像。';
  document.getElementById('nnRunNote').textContent = impl.note || '该工作台会保留结构讲解，再把运行输出按步骤展开。';

  if (isUnavailable) {
    setStatus('info', [impl.note || '当前模块需要外部权重或远程资源，所以这里只展示结构与原理。']);
  } else {
    setStatus('info', [requiresUpload ? '先上传一张图片，再运行该模型。' : '可以直接点击运行，查看当前模型的分步输出。']);
  }
  renderMetrics({});
  renderResults([]);
  syncRunButton();

  runBtn.addEventListener('click', function() {
    if (isUnavailable || runBtn.disabled) return;
    var form = new FormData();
    if (selectedFile) form.append('file', selectedFile);
    Array.prototype.slice.call(controlsWrap.querySelectorAll('input,select')).forEach(function(input) {
      form.append(input.name, input.value);
    });

    runBtn.disabled = true;
    setStatus('info', ['正在调用 ' + (cfg.title || id) + ' 的实现...', '返回结果后会按步骤重新铺开。']);

    fetch('/api/demo/' + id, { method: 'POST', body: form })
      .then(function(resp) {
        return resp.json().catch(function() { return null; }).then(function(payload) {
          if (resp.ok) return payload;
          throw new Error((payload && payload.error) || ('HTTP ' + resp.status));
        });
      })
      .then(function(payload) {
        renderMetrics(payload.metrics || {});
        renderResults(payload.steps || []);
        document.getElementById('nnResultHint').textContent = '已完成一次运行。现在可以把结构总览和分步结果对照起来看。';
        setStatus('ok', ['运行完成。', '指标和中间结果已经同步更新到下方结果区。']);
      })
      .catch(function(err) {
        setStatus('error', ['运行失败：' + (err.message || err)]);
      })
      .finally(function() {
        syncRunButton();
      });
  });
})();
</script>
</body>
</html>
