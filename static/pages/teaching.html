<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>算法讲解 - Cvtoolkits</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/teaching-page.css">
<script src="../js/theme-sync.js"></script>
</head>
<body>
<main class="teach-page">
  <section class="teach-hero">
    <div class="teach-title-panel">
      <div class="teach-badges">
        <span class="teach-badge" data-phase></span>
        <span class="teach-badge" data-status></span>
        <span class="teach-badge" data-difficulty></span>
      </div>
      <h1 class="teach-title" data-title></h1>
      <p class="teach-subtitle"><span data-english></span> · <span data-tagline></span></p>
      <div class="teach-core" id="coreGrid"></div>
    </div>

    <aside class="teach-io-panel">
      <h2 class="teach-panel-title">交互演示</h2>
      <label class="teach-upload" id="upload">
        <input id="fileInput" type="file" accept="image/*">
        <span><strong>选择或拖入图片</strong><span id="filename">未选择文件</span></span>
      </label>
      <div class="teach-controls" id="controls"></div>
      <div class="teach-actions">
        <button class="teach-button" id="runButton" type="button" disabled>运行算法</button>
        <button class="teach-button" id="demoButton" type="button">使用示例图</button>
        <span class="teach-status" id="status">等待输入。</span>
      </div>
    </aside>
  </section>

  <section class="teach-section">
    <div class="teach-section-head">
      <h2>原理说明</h2>
      <p>先建立直觉，再看公式和中间图。</p>
    </div>
    <div class="teach-principle-grid">
      <div class="teach-copy" id="principles"></div>
      <div class="teach-formula" data-formula></div>
    </div>
  </section>

  <section class="teach-section">
    <div class="teach-section-head">
      <h2>算法流水线</h2>
      <p>对应 ARCHITECTURE.md 第六部分的学习路径。</p>
    </div>
    <div class="teach-pipeline" id="pipeline"></div>
  </section>

  <section class="teach-section">
    <div class="teach-section-head">
      <h2>运行结果</h2>
      <div class="teach-metrics" id="metrics"></div>
    </div>
    <div class="teach-result-grid" id="results"></div>
  </section>
</main>
<script src="../js/algorithm-content.js"></script>
<script src="../js/teaching-page.js"></script>
</body>
</html>
