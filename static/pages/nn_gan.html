<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAN - CV 通识教育</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <link rel="stylesheet" href="../css/model-demo-page.css">
  <script src="../js/theme-sync.js"></script>
  <script src="../js/page-utils.js"></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow">对抗生成</div>
      <h1 id="pageTitle">GAN</h1>
      <p class="subtitle" id="subtitle"></p>
      <p class="intro" id="introText"></p>
      <span class="status" id="statusPill"></span>
    </div>
    <aside class="panel controls">
      <h2>运行真实后端</h2>
      <div class="control-row">
        <button id="sampleBtn">重置样例</button>
        <button id="runBtn" class="primary">训练 toy GAN</button>
      </div>
      <div class="file-line" id="fileName">GAN 使用内置二维数据分布</div>
      <div id="paramsPanel" class="params"></div>
    </aside>
  </section>
  <section class="info-grid">
    <div class="panel"><h2>算法流程</h2><ul id="pipelineList"></ul></div>
    <div class="panel"><h2>应用场景</h2><ul id="applicationsList"></ul></div>
    <div class="panel"><h2>局限性</h2><ul id="limitationsList"></ul></div>
  </section>
  <div id="loading" class="loading" hidden>后端正在进行 NumPy GAN 对抗训练...</div>
  <div id="errorBox" class="error" hidden></div>
  <section id="metricsGrid" class="metrics"></section>
  <section class="panel"><h2>真实中间步骤</h2><div id="stepsGrid" class="steps"></div></section>
</main>
<script>
window.ModelDemoConfig = {
  moduleId: 'gan',
  title: 'GAN',
  subtitle: '生成器造假，判别器打假，在对抗中逼近真实数据分布。',
  intro: '本页不是预训练图像生成器，而是在后端用 NumPy 真实训练一个小型 GAN，展示分布、损失和判别器决策面。',
  status: '真实本地训练机制',
  params: [{ name: 'iterations', label: '训练迭代', type: 'range', min: 80, max: 400, step: 20, value: 260 }],
  pipeline: ['采样真实数据', '随机噪声进入生成器', '判别器区分真/假', '计算 D loss 和 G loss', '反向传播更新参数', '观察生成分布靠近真实分布'],
  applications: ['理解生成对抗思想', '生成模型入门', '解释模式坍塌和训练不稳定', '连接 StyleGAN 等后续模型'],
  limitations: ['这是 toy GAN，不是高清图像生成', 'GAN 训练可能震荡', '真实图像 GAN 需要大量数据和训练资源']
};
</script>
<script src="../js/model-demo-page.js"></script>
</body>
</html>
