<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vision Transformer - CV 通识教育</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <link rel="stylesheet" href="../css/model-demo-page.css">
  <script src="../js/theme-sync.js"></script>
  <script src="../js/page-utils.js"></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow">Transformer 统一视觉</div>
      <h1 id="pageTitle">Vision Transformer</h1>
      <p class="subtitle" id="subtitle"></p>
      <p class="intro" id="introText"></p>
      <span class="status" id="statusPill"></span>
    </div>
    <aside class="panel controls">
      <h2>运行真实后端</h2>
      <input id="fileInput" type="file" accept="image/*" hidden>
      <div class="control-row">
        <button id="chooseBtn">选择图片</button>
        <button id="sampleBtn">使用样例</button>
        <button id="runBtn" class="primary">运行 ViT</button>
      </div>
      <div class="file-line" id="fileName">未选择文件，将使用内置样例</div>
      <div id="paramsPanel" class="params"></div>
    </aside>
  </section>
  <section class="info-grid">
    <div class="panel"><h2>算法流程</h2><ul id="pipelineList"></ul></div>
    <div class="panel"><h2>应用场景</h2><ul id="applicationsList"></ul></div>
    <div class="panel"><h2>局限性</h2><ul id="limitationsList"></ul></div>
  </section>
  <div id="loading" class="loading" hidden>后端正在运行真实模型，首次运行可能需要下载或加载权重...</div>
  <div id="errorBox" class="error" hidden></div>
  <section id="metricsGrid" class="metrics"></section>
  <section class="panel">
    <h2>真实中间步骤</h2>
    <div id="stepsGrid" class="steps"></div>
  </section>
</main>
<script>
window.ModelDemoConfig = {
  moduleId: 'vit',
  title: 'Vision Transformer',
  subtitle: '把图像切成 Patch，再像处理单词一样送入 Transformer。',
  intro: '本页调用 HuggingFace ViT 预训练分类模型，后端返回真实分类概率、Patch 网格、位置编码相似度和注意力图。',
  status: '真实预训练推理',
  params: [
    { name: 'layer', label: '注意力层', type: 'range', min: 1, max: 12, step: 1, value: 12 },
    { name: 'head_idx', label: '注意力头', type: 'range', min: 1, max: 12, step: 1, value: 1 },
    { name: 'selected_patch', label: 'Patch编号', type: 'range', min: 0, max: 195, step: 1, value: 0 }
  ],
  pipeline: ['输入图像', '切成 16x16 Patch', 'Patch 线性投影为 token', '加入位置编码', '多层 self-attention', 'CLS token 输出分类'],
  applications: ['图像分类', '视觉 Transformer 入门', '解释 Patch token 和注意力', '理解 CNN 与 Transformer 的差异'],
  limitations: ['首次运行需要下载权重', '注意力图只能作为解释线索', '分类类别受 ImageNet 预训练数据限制']
};
</script>
<script src="../js/model-demo-page.js"></script>
</body>
</html>
