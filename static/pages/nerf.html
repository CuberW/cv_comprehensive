<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeRF - CV 通识教育</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <link rel="stylesheet" href="../css/model-demo-page.css">
  <script src="../js/theme-sync.js"></script>
  <script src="../js/page-utils.js"></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow">隐式 3D</div>
      <h1 id="pageTitle">NeRF</h1>
      <p class="subtitle" id="subtitle"></p>
      <p class="intro" id="introText"></p>
      <span class="status" id="statusPill"></span>
    </div>
    <aside class="panel controls">
      <h2>运行真实后端</h2>
      <div class="control-row">
        <button id="sampleBtn">使用默认场景</button>
        <button id="runBtn" class="primary">渲染 NeRF</button>
      </div>
      <div class="file-line" id="fileName">NeRF 使用内置三维辐射场</div>
      <div id="paramsPanel" class="params"></div>
    </aside>
  </section>
  <section class="info-grid">
    <div class="panel"><h2>算法流程</h2><ul id="pipelineList"></ul></div>
    <div class="panel"><h2>应用场景</h2><ul id="applicationsList"></ul></div>
    <div class="panel"><h2>局限性</h2><ul id="limitationsList"></ul></div>
  </section>
  <div id="loading" class="loading" hidden>后端正在做真实射线采样和体渲染...</div>
  <div id="errorBox" class="error" hidden></div>
  <section id="metricsGrid" class="metrics"></section>
  <section class="panel"><h2>真实中间步骤</h2><div id="stepsGrid" class="steps"></div></section>
</main>
<script>
window.ModelDemoConfig = {
  moduleId: 'nerf',
  title: 'NeRF',
  subtitle: '沿相机射线采样 3D 点，再把颜色和密度体渲染成图像。',
  intro: '本页使用本地 NumPy 辐射场做真实 ray marching 和 volume rendering，展示 NeRF 的核心计算机制。',
  status: '真实本地机制实现',
  params: [
    { name: 'azimuth', label: '相机角度', type: 'range', min: -180, max: 180, step: 10, value: 0, suffix: '°' },
    { name: 'resolution', label: '分辨率', type: 'range', min: 64, max: 128, step: 16, value: 96 },
    { name: 'samples_per_ray', label: '采样点数', type: 'range', min: 32, max: 128, step: 16, value: 80 }
  ],
  pipeline: ['生成相机射线', '沿射线采样 3D 点', '查询每个点的颜色和密度', '按 alpha compositing 累积颜色', '得到深度图和新视角渲染'],
  applications: ['新视角合成', '三维重建教学', '理解体渲染', '连接传统多视图几何和神经表示'],
  limitations: ['这里是机制演示，不是训练好的真实场景', '完整 NeRF 训练需要多视角数据和较长优化时间', '分辨率越高计算越慢']
};
</script>
<script src="../js/model-demo-page.js"></script>
</body>
</html>
