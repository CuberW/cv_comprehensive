<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV 通识教育 — Cvtoolkits</title>
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

<!-- Subtle background grid -->
<div class="bg-grid"></div>

<!-- ====== Top Nav ====== -->
<nav class="top-nav">
  <div class="nav-brand">
    <span class="dot"></span> Cvtoolkits <span>· 计算机视觉通识教育</span>
    <a href="https://github.com/CuberW/cv" target="_blank" class="nav-gh" title="GitHub" style="margin-right:2px">
  <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
</a>
  </div>
  <div class="nav-actions">
    <div class="theme-toggle" id="theme-toggle" title="日间/夜间模式">
      <span class="theme-label">🌙</span>
      <span class="theme-switch"><span class="theme-knob"></span></span>
      <span class="theme-label">☀️</span>
    </div>
    <div class="search-box" id="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search-input" placeholder="搜索算法…" autocomplete="off">
      <button class="search-clear hidden" id="search-clear">✕</button>
    </div>
  </div>
</nav>

<!-- ====== Main Wrap ====== -->
<div class="main-wrap">

  <!-- ====== GALLERY (home) ====== -->
  <section class="gallery" id="gallery">
    <div class="gallery-hero">
      <div class="hero-text">
        <h2>探索计算机视觉的世界</h2>
        <p class="sub">从像素到特征，从几何到深度学习，从基础模型到前沿感知——<strong>77 个算法</strong>，五个认知阶段，零黑盒调用。每个算法都从直觉出发，以可交互的流水线展开。</p>
      </div>
      <div class="hero-stats">
        <div class="hero-stat"><number id="stat-total">--</number><label>算法模块</label></div>
        <div class="hero-stat"><number>5</number><label>认知阶段</label></div>
        <div class="hero-stat"><number id="stat-ready">--</number><label>已可体验</label></div>
        <div class="hero-stat"><number>0</number><label>黑盒调用</label></div>
      </div>
    </div>

    <!-- Quick Links -->
    <div class="quick-links">
      <div class="quick-card network-card" id="btn-network">
        <div class="quick-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="5" r="3"/><circle cx="19" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><line x1="8" y1="5" x2="16" y2="5"/><line x1="5" y1="8" x2="5" y2="16"/><line x1="19" y1="8" x2="19" y2="16"/><line x1="16" y1="19" x2="8" y2="19"/><line x1="8" y1="5" x2="16" y2="19"/><line x1="16" y1="5" x2="8" y2="19"/></svg>
        </div>
        <div><div class="quick-name">算法关系网络</div><div class="quick-desc">77 个算法的依赖、改进、启发关系全景图</div></div>
      </div>
    </div>

    <!-- Phase Metro Lines -->
    <div class="phase-metro" id="phase-metro"></div>
  </section>

  <!-- ====== DETAIL OVERLAY ====== -->
  <div class="detail-overlay" id="detail-overlay">
    <div class="detail-topbar">
      <button class="btn-back" id="btn-back" title="返回首页">← 返回</button>
      <span class="detail-name" id="detail-name"></span>
      <span class="detail-en" id="detail-en"></span>
    </div>
    <!-- Pipeline Strip -->
    <div class="pipeline-strip" id="pipeline-strip"></div>
    <!-- Canvas area -->
    <div class="detail-canvas-area" id="detail-canvas-area">
      <iframe id="detail-iframe" src="" style="width:100%;height:100%;border:none"></iframe>
    </div>
  </div>


</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="/static/js/utils.js"></script>
<script src="/static/js/router.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
