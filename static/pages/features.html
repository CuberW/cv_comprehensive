<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特征检测与匹配 - Cvtoolkits</title>
<link rel="stylesheet" href="../css/style.css">
<style>
:root {
    --feature-bg: #f6fbff;
    --feature-line: rgba(148, 163, 184, 0.32);
    --feature-text: #0f172a;
    --feature-muted: #64748b;
    --feature-accent: #0ea5e9;
}

*, *::before, *::after { box-sizing: border-box; }

body {
    margin: 0;
    min-height: 100vh;
    overflow: hidden;
    background: var(--feature-bg);
    color: var(--feature-text);
    font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
}

.feature-shell {
    height: 100vh;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
}

.feature-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 16px 22px;
    background: rgba(255, 255, 255, 0.92);
    border-bottom: 1px solid var(--feature-line);
    box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
    z-index: 5;
}

.feature-title {
    min-width: 170px;
}

.feature-title h1 {
    margin: 0;
    font-size: 1.2rem;
    line-height: 1.25;
    letter-spacing: 0;
}

.feature-title p {
    margin: 4px 0 0;
    font-size: 0.82rem;
    color: var(--feature-muted);
}

.feature-tabs {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex: 1;
}

.feature-tab {
    min-height: 38px;
    padding: 0 16px;
    border: 1px solid #dbe5ef;
    border-radius: 8px;
    background: #ffffff;
    color: #334155;
    font: 700 0.92rem/1 "Microsoft YaHei", "微软雅黑", sans-serif;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
}

.feature-tab:hover {
    border-color: rgba(14, 165, 233, 0.42);
    color: #0369a1;
}

.feature-tab.active {
    background: #e0f2fe;
    border-color: rgba(14, 165, 233, 0.55);
    color: #0369a1;
    box-shadow: inset 0 0 0 1px rgba(14, 165, 233, 0.12);
}

.feature-frame-wrap {
    min-height: 0;
    background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.26), transparent 34%),
        linear-gradient(135deg, #f8fbff 0%, #eef6ff 100%);
}

.feature-frame {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    opacity: 1;
    transition: opacity 0.18s ease;
}

.feature-frame.loading {
    opacity: 0.48;
}

@media (max-width: 760px) {
    .feature-topbar {
        align-items: stretch;
        flex-direction: column;
        padding: 14px;
    }

    .feature-title {
        min-width: 0;
    }

    .feature-tabs {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .feature-tab {
        padding: 0 8px;
        font-size: 0.82rem;
    }
}
</style>
</head>
<body>
<main class="feature-shell">
    <header class="feature-topbar">
        <div class="feature-title">
            <h1>特征检测与匹配</h1>
            <p>角点、SIFT 与双图匹配</p>
        </div>
        <nav class="feature-tabs" aria-label="特征模块切换">
            <button class="feature-tab active" type="button" data-page="corner">角点检测</button>
            <button class="feature-tab" type="button" data-page="sift">SIFT 特征点</button>
            <button class="feature-tab" type="button" data-page="match">图像匹配</button>
        </nav>
    </header>
    <section class="feature-frame-wrap">
        <iframe id="featureFrame" class="feature-frame" src="corner.html" title="特征模块内容"></iframe>
    </section>
</main>

<script>
(function() {
    var pages = {
        corner: { title: "角点检测", src: "corner.html" },
        sift: { title: "SIFT 特征点", src: "sift.html" },
        match: { title: "图像匹配", src: "match.html" }
    };
    var frame = document.getElementById("featureFrame");
    var buttons = Array.prototype.slice.call(document.querySelectorAll(".feature-tab"));

    function currentTab() {
        var params = new URLSearchParams(window.location.search);
        var tab = params.get("tab") || "corner";
        return pages[tab] ? tab : "corner";
    }

    function setTab(tab, push) {
        if (!pages[tab]) tab = "corner";
        buttons.forEach(function(btn) {
            btn.classList.toggle("active", btn.dataset.page === tab);
        });
        document.title = pages[tab].title + " - 特征检测与匹配 - Cvtoolkits";
        var nextSrc = pages[tab].src;
        var current = frame.getAttribute("src") || "";
        if (current.split("?")[0] !== nextSrc) {
            frame.classList.add("loading");
            frame.onload = function() { frame.classList.remove("loading"); };
            frame.src = nextSrc + "?v=" + Date.now();
        }
        if (push) {
            var url = new URL(window.location.href);
            url.searchParams.set("tab", tab);
            history.pushState(null, "", url.pathname + url.search + url.hash);
        }
    }

    buttons.forEach(function(btn) {
        btn.addEventListener("click", function() {
            setTab(btn.dataset.page, true);
        });
    });

    window.addEventListener("popstate", function() {
        setTab(currentTab(), false);
    });

    setTab(currentTab(), false);
})();
</script>
</body>
</html>
