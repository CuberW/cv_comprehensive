<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灰度转换 — Cvtoolkits</title>
<link rel="stylesheet" href="../css/style.css">
<style>
    .page { max-width: 960px; margin: 0 auto; padding: 20px 16px 32px; }
    .page-title { font-size: 1.5rem; margin: 0 0 4px; color: var(--text); }
    .page-subtitle { color: var(--muted); font-size: 0.95rem; margin: 0 0 20px; }

    .upload-section { padding: 20px 24px; margin-bottom: 16px; position: relative; overflow: hidden; }
    .upload-section { padding: 20px 24px; margin-bottom: 16px; position: relative; overflow: hidden; }
    .upload-section h3 { margin: 0 0 12px; }
    .actions-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }

    .image-frame img { max-height: 420px; }

    .histo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }
    .histo-card { padding: 16px 20px 14px; }
    .histo-card h3 { margin: 0 0 10px; font-size: 1rem; }
    .histo-card .histogram-canvas { margin-top: 0; }

    @media (max-width: 640px) {
        .page { padding: 12px 10px 24px; }
        .upload-section { padding: 16px; }
        .image-frame img { max-height: 250px; }
        .histo-grid { grid-template-columns: 1fr; }
    }
</style>
<link rel="stylesheet" href="../css/iframe-theme.css">
<script src="../js/theme-sync.js"></script>
</head>
<body>
<main class="page">

    <h1 class="page-title">灰度转换</h1>
    <p class="page-subtitle">将彩色图像转换为灰度图，基于亮度加权算法，可实时预览和下载结果</p>
    <section class="upload-section glass">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner-box">
                <svg class="spinner-svg" viewBox="0 0 64 64">
                    <circle class="spinner-track" cx="32" cy="32" r="26" fill="none"
                            stroke="rgba(14,165,233,0.15)" stroke-width="4"/>
                    <circle class="spinner-arc" cx="32" cy="32" r="26" fill="none"
                            stroke="#0ea5e9" stroke-width="4" stroke-linecap="round"
                            stroke-dasharray="40 200"/>
                    <polyline class="spinner-check" points="18,32 28,42 46,22" fill="none"
                              stroke="#4ade80" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
                              stroke-dasharray="48" stroke-dashoffset="48"/>
                </svg>
                <span class="loading-text" id="loadingText">处理中...</span>
            </div>
        </div>

        <h3>上传图片</h3>
        <form id="uploadForm" method="POST" enctype="multipart/form-data">
            <div class="upload-box">
                <input class="file-input" id="fileInput" type="file" name="file" accept="image/*" required>
                <label class="file-picker" for="fileInput">
                    <span class="file-picker-btn">选择文件</span>
                    <span class="file-picker-name" id="fileNameText">未选择文件</span>
                </label>
            </div>
            <div class="actions-row">
                <button class="btn btn-primary" type="submit" id="convertBtn">开始转换</button>
            </div>
        </form>
    </section>

    <section class="preview-grid">
        <div class="preview-box glass">
            <h3>原始图片</h3>
            <div class="image-frame">
                <img id="previewOriginal" alt="原始图片" style="display:none;">
                <div class="empty-state" id="originalEmpty">
                    <span id="originalEmptyText">上传图片后开始处理</span>
                </div>
            </div>
            <div class="card-tags" id="originalInfoBar" style="display:none;"></div>
        </div>

        <div class="result-box glass">
            <h3 id="resultTitle">灰度转换 结果</h3>
            <div class="image-frame">
                <img id="previewResult" alt="处理结果" style="display:none;">
                <div class="empty-state" id="resultEmpty">
                    <span id="resultEmptyText">处理结果将在这里显示</span>
                </div>
            </div>
            <div class="card-tags" id="resultStatsBar" style="display:none;"></div>
            <a class="download-link" id="downloadLink" href="" download style="display:none;">
                <button class="btn btn-primary" type="button">保存图片</button>
            </a>
        </div>
    </section>

    <section class="histo-grid" id="histoGrid" style="display:none;">
        <div class="histo-card glass" id="rgbCard">
            <h3>RGB 通道分布</h3>
            <canvas id="rgbHistogramCanvas" class="histogram-canvas" width="512" height="160"></canvas>
            <div class="histogram-legend" id="rgbLegend">
                <span class="legend-item" data-channel="0"><span class="legend-dot" style="background:#ef4444;"></span>R</span>
                <span class="legend-item" data-channel="1"><span class="legend-dot" style="background:#22c55e;"></span>G</span>
                <span class="legend-item" data-channel="2"><span class="legend-dot" style="background:#3b82f6;"></span>B</span>
            </div>
        </div>

        <div class="histo-card glass" id="resultCard">
            <h3>结果分布</h3>
            <canvas id="histogramCanvas" class="histogram-canvas" width="512" height="160"></canvas>
        </div>
    </section>

    <section class="histo-grid" id="histoGrid" style="display:none;">
        <div class="histo-card glass" id="rgbCard">
            <h3>RGB 通道分布</h3>
            <canvas id="rgbHistogramCanvas" class="histogram-canvas" width="512" height="160"></canvas>
            <div class="histogram-legend" id="rgbLegend">
                <span class="legend-item" data-channel="0"><span class="legend-dot" style="background:#ef4444;"></span>R</span>
                <span class="legend-item" data-channel="1"><span class="legend-dot" style="background:#22c55e;"></span>G</span>
                <span class="legend-item" data-channel="2"><span class="legend-dot" style="background:#3b82f6;"></span>B</span>
            </div>
        </div>

        <div class="histo-card glass" id="resultCard">
            <h3>结果分布</h3>
            <canvas id="histogramCanvas" class="histogram-canvas" width="512" height="160"></canvas>
        </div>
    </section>

    <section class="history-section glass" id="historySection">
        <h3>处理历史</h3>
        <div id="historyList" class="history-list"><div class="history-empty">灰度转换 暂无处理记录</div></div>
    </section>
</main>

<script>
(function() {
    var fileInput = document.getElementById('fileInput');
    var fileNameText = document.getElementById('fileNameText');
    var uploadForm = document.getElementById('uploadForm');
    var previewOriginal = document.getElementById('previewOriginal');
    var originalEmpty = document.getElementById('originalEmpty');
    var previewResult = document.getElementById('previewResult');
    var resultEmpty = document.getElementById('resultEmpty');
    var resultTitle = document.getElementById('resultTitle');
    var downloadLink = document.getElementById('downloadLink');
    var originalInfoBar = document.getElementById('originalInfoBar');
    var resultStatsBar = document.getElementById('resultStatsBar');
    var histogramCanvas = document.getElementById('histogramCanvas');
    var rgbHistogramCanvas = document.getElementById('rgbHistogramCanvas');
    var rgbLegend = document.getElementById('rgbLegend');
    var histoGrid = document.getElementById('histoGrid');
    var histoGrid = document.getElementById('histoGrid');
    var loadingOverlay = document.getElementById('loadingOverlay');
    var spinnerBox = loadingOverlay ? loadingOverlay.querySelector('.spinner-box') : null;
    var loadingText = document.getElementById('loadingText');

    function renderChips(container, data, labels) {
        if (!container) return;
        if (!data) { container.style.display = 'none'; return; }
        container.style.display = 'flex';
        container.innerHTML = '';
        var keys = Object.keys(data);
        for (var i = 0; i < keys.length; i++) {
            var key = keys[i], value = data[key];
            if (value === null || value === undefined) continue;
            var span = document.createElement('span');
            span.className = 'info-chip';
            var label = labels ? (labels[key] || '') : '';
            span.innerHTML = label ? (label + ': <strong>' + value + '</strong>') : ('<strong>' + value + '</strong>');
            container.appendChild(span);
        }
    }

    function clearChips(container) { if (container) container.style.display = 'none'; }
    function clearChips(container) { if (container) container.style.display = 'none'; }

    function _fmtChannels(v) {
        if (v === 3) return 'RGB';
        if (v === 4) return 'RGBA';
        return '灰度';
    }

    function _setupCanvas(canvas, cssW, cssH) {
        var dpr = window.devicePixelRatio || 1;
        canvas.width = cssW * dpr;
        canvas.height = cssH * dpr;
        canvas.style.width = cssW + 'px';
        canvas.style.height = cssH + 'px';
        var ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        return { ctx: ctx, w: cssW, h: cssH };
    }

    function drawHistogram(data) {
        if (!histogramCanvas) return;
        if (!data || !data.length) { histogramCanvas.style.display = 'none'; return; }
        histogramCanvas.style.display = 'block';
        var cssW = histogramCanvas.clientWidth || 512;
        var cssH = histogramCanvas.clientHeight || 160;
        var s = _setupCanvas(histogramCanvas, cssW, cssH);
        s.ctx.clearRect(0, 0, s.w, s.h);
        var maxVal = Math.max.apply(null, data) || 1;
        var barW = s.w / data.length;
        for (var i = 0; i < data.length; i++) {
            var barH = data[i] / maxVal * s.h;
            s.ctx.fillStyle = 'rgba(14,165,233,0.7)';
            s.ctx.fillRect(i * barW, s.h - barH, Math.max(barW, 1), barH);
        }
    }

    var _rgbChannelData = null, _rgbHighlight = -1, _rgbCssW = 512, _rgbCssH = 160, _rgbCtx = null;
    var _rgbChannelData = null, _rgbHighlight = -1, _rgbCssW = 512, _rgbCssH = 160, _rgbCtx = null;

    function _rgbRedraw() {
        if (!_rgbCtx || !_rgbChannelData) return;
        _rgbCtx.clearRect(0, 0, _rgbCssW, _rgbCssH);
        var barW = _rgbCssW / 256;
        var colors = [
            { full: 'rgba(239,68,68,0.58)', faint: 'rgba(239,68,68,0.12)' },
            { full: 'rgba(34,197,94,0.58)', faint: 'rgba(34,197,94,0.12)' },
            { full: 'rgba(59,130,246,0.58)', faint: 'rgba(59,130,246,0.12)' }
        ];
        for (var c = 0; c < _rgbChannelData.length; c++) {
            var ch = _rgbChannelData[c];
            var alpha = (_rgbHighlight === -1 || _rgbHighlight === c) ? colors[c].full : colors[c].faint;
            for (var i = 0; i < 256; i++) {
                var barH = ch.bins[i] / ch.max * _rgbCssH;
                _rgbCtx.fillStyle = alpha;
                _rgbCtx.fillRect(i * barW, _rgbCssH - barH, Math.max(barW, 1), barH);
            }
        }
    }

    function drawRgbHistogram(originalUrl) {
        if (!rgbHistogramCanvas || !originalUrl) return;
        _rgbHighlight = -1;
        var legendItems = rgbLegend ? rgbLegend.querySelectorAll('.legend-item') : [];
        legendItems.forEach(function (item) { item.classList.remove('active'); });

        _rgbCssW = rgbHistogramCanvas.clientWidth || 512;
        _rgbCssH = rgbHistogramCanvas.clientHeight || 160;
        var s = _setupCanvas(rgbHistogramCanvas, _rgbCssW, _rgbCssH);
        _rgbCtx = s.ctx; _rgbCssW = s.w; _rgbCssH = s.h;
        _rgbCtx = s.ctx; _rgbCssW = s.w; _rgbCssH = s.h;

        var img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function () {
            var tmp = document.createElement('canvas');
            tmp.width = Math.min(img.naturalWidth, 256);
            tmp.height = Math.min(img.naturalHeight, Math.round(256 * img.naturalHeight / img.naturalWidth));
            var tctx = tmp.getContext('2d');
            tctx.drawImage(img, 0, 0, tmp.width, tmp.height);
            var imageData = tctx.getImageData(0, 0, tmp.width, tmp.height);
            var pixels = imageData.data;
            var channels = [
                { bins: new Array(256).fill(0), max: 1 },
                { bins: new Array(256).fill(0), max: 1 },
                { bins: new Array(256).fill(0), max: 1 }
            ];
            for (var j = 0; j < pixels.length; j += 4) {
                channels[0].bins[pixels[j]]++;
                channels[1].bins[pixels[j + 1]]++;
                channels[2].bins[pixels[j + 2]]++;
            }
            channels[0].max = Math.max.apply(null, channels[0].bins) || 1;
            channels[1].max = Math.max.apply(null, channels[1].bins) || 1;
            channels[2].max = Math.max.apply(null, channels[2].bins) || 1;
            _rgbChannelData = channels;
            _rgbRedraw();
        };
        img.onerror = function () {};
        img.onerror = function () {};
        img.src = originalUrl;
    }

    function showLoading() {
        if (!loadingOverlay || !spinnerBox) return;
        spinnerBox.classList.remove('done', 'error');
        loadingText.textContent = '处理中...';
        loadingOverlay.classList.add('active');
    }

    function showLoadingDone() {
        if (!loadingOverlay || !spinnerBox) return;
        spinnerBox.classList.add('done');
        loadingText.textContent = '处理完成';
        setTimeout(hideLoading, 1800);
    }

    function showLoadingError() {
        if (!loadingOverlay || !spinnerBox) return;
        spinnerBox.classList.add('error');
        loadingText.textContent = '处理失败';
        setTimeout(hideLoading, 2500);
    }

    function hideLoading() {
        if (!loadingOverlay || !spinnerBox) return;
        loadingOverlay.classList.remove('active');
        spinnerBox.classList.remove('done', 'error');
    }

    function showPreview(originalUrl, resultUrl, originalInfo, resultInfo, stats, histogram) {
        var loaded = 0;
        function onLoad() { loaded++; if (loaded >= 2) { previewOriginal.style.display = 'block'; previewResult.style.display = 'block'; } }
        previewOriginal.style.display = 'none';
        previewResult.style.display = 'none';
        previewOriginal.onload = onLoad;
        previewResult.onload = onLoad;
        previewOriginal.src = originalUrl;
        previewResult.src = resultUrl;
        if (previewOriginal.complete) onLoad();
        if (previewResult.complete) onLoad();
        originalEmpty.style.display = 'none';
        resultEmpty.style.display = 'none';

        downloadLink.href = resultUrl;
        downloadLink.style.display = 'inline-flex';

        if (originalInfo) {
            renderChips(originalInfoBar, {
                dimensions: originalInfo.width + ' × ' + originalInfo.height,
                channels: _fmtChannels(originalInfo.channels),
                file_size: originalInfo.file_size,
                format: originalInfo.format
            }, { dimensions: '尺寸', channels: '通道', file_size: '文件大小', format: '格式' });
        } else {
            clearChips(originalInfoBar);
        }

        if (resultInfo) {
            var rData = { dimensions: resultInfo.width + ' × ' + resultInfo.height, channels: _fmtChannels(resultInfo.channels) };
            var rLabels = { dimensions: '尺寸', channels: '类型' };
            if (stats) {
                rData.min = stats.min; rLabels.min = 'Min';
                rData.max = stats.max; rLabels.max = 'Max';
                rData.mean = stats.mean; rLabels.mean = 'Mean';
                rData.std = stats.std; rLabels.std = 'Std';
            }
            renderChips(resultStatsBar, rData, rLabels);
        } else {
            clearChips(resultStatsBar);
        }

        if (histoGrid) histoGrid.style.display = 'grid';
        if (histoGrid) histoGrid.style.display = 'grid';
        drawHistogram(histogram);
        drawRgbHistogram(originalUrl);
    }

    function clearPreview() {
        previewOriginal.onload = null;
        previewResult.onload = null;
        previewOriginal.src = '';
        previewResult.src = '';
        previewOriginal.style.display = 'none';
        previewResult.style.display = 'none';
        originalEmpty.style.display = 'block';
        resultEmpty.style.display = 'block';
        downloadLink.href = '';
        downloadLink.style.display = 'none';
        clearChips(originalInfoBar);
        clearChips(resultStatsBar);
        if (histoGrid) histoGrid.style.display = 'none';
        if (histogramCanvas) { histogramCanvas.style.display = 'none'; }
        if (histoGrid) histoGrid.style.display = 'none';
        if (histogramCanvas) { histogramCanvas.style.display = 'none'; }
        cachedResult = null;
    }

    function updateFileNameText() {
        if (!fileNameText || !fileInput) return;
        fileNameText.textContent = fileInput.files && fileInput.files.length
            ? fileInput.files[0].name
            : '未选择文件';
    }

    function sameUrl(a, b) {
        if (!a || !b) return false;
        try {
            return new URL(a, window.location.origin).href === new URL(b, window.location.origin).href;
        } catch (err) {
            return a === b;
        }
    }

    fileInput.addEventListener('change', updateFileNameText);
    updateFileNameText();

    uploadForm.addEventListener('submit', function (ev) {
        ev.preventDefault();
        if (!fileInput.files.length) return;

        var formData = new FormData(uploadForm);
        showLoading();

        fetch('/gray/', {
            method: 'POST',
            body: formData,
            headers: { 'Accept': 'application/json' }
        })
        .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        })
        .then(function (json) {
            showPreview(json.original_image, json.result_image,
                        json.original_info, json.result_info, json.stats, json.histogram);
            cachedResult = {
                id: json.entry ? json.entry.id : null,
                originalUrl: json.original_image,
                resultUrl: json.result_image,
                originalInfo: json.original_info,
                resultInfo: json.result_info,
                stats: json.stats,
                histogram: json.histogram
            };
            historyData = json.history || [];
            renderHistory();
            showLoadingDone();
        })
        .catch(function () {
            showLoadingError();
        });
    });

    // RGB histogram interaction
    // RGB histogram interaction
    if (rgbHistogramCanvas) {
        rgbHistogramCanvas.addEventListener('mousemove', function (ev) {
            if (!_rgbChannelData) return;
            var rect = rgbHistogramCanvas.getBoundingClientRect();
            var x = ev.clientX - rect.left;
            var cssW = rect.width || 512;
            var bin = Math.floor(x / cssW * 256);
            if (bin < 0 || bin >= 256) return;
            var top = -1, topVal = -1;
            for (var c = 0; c < _rgbChannelData.length; c++) {
                if (_rgbChannelData[c].bins[bin] > topVal) { topVal = _rgbChannelData[c].bins[bin]; top = c; }
            }
            if (top !== _rgbHighlight) {
                _rgbHighlight = top;
                _rgbRedraw();
                var items = rgbLegend ? rgbLegend.querySelectorAll('.legend-item') : [];
                items.forEach(function (item) {
                    item.classList.toggle('active', parseInt(item.dataset.channel) === top);
                });
            }
        });
        rgbHistogramCanvas.addEventListener('mouseleave', function () {
            if (_rgbHighlight !== -1) { _rgbHighlight = -1; _rgbRedraw();
                var items = rgbLegend ? rgbLegend.querySelectorAll('.legend-item') : [];
                items.forEach(function (item) { item.classList.remove('active'); });
            }
        });
    }

    if (rgbLegend) {
        var legendItems = rgbLegend.querySelectorAll('.legend-item');
        legendItems.forEach(function (item) {
            item.addEventListener('mouseenter', function () {
                var ch = parseInt(this.dataset.channel);
                if (ch !== _rgbHighlight) { _rgbHighlight = ch; _rgbRedraw();
                    legendItems.forEach(function (li) { li.classList.toggle('active', parseInt(li.dataset.channel) === ch); });
                }
            });
            item.addEventListener('mouseleave', function () {
                _rgbHighlight = -1; _rgbRedraw();
                legendItems.forEach(function (li) { li.classList.remove('active'); });
            });
        });
    }

    var historyList = document.getElementById('historyList');
    var historyData = [];
    var cachedResult = null;

    function fetchHistory() {
        fetch('/api/history', { headers: { 'Accept': 'application/json' }, cache: 'no-store' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(d) {
                if (d !== null && d !== undefined) {
                    historyData = d.history || [];
                    renderHistory();
                }
            })
            .catch(function() {});
    }

    function renderHistory() {
        if (!historyList) return;
        var entries = historyData.filter(function(e) {
            return e.module_key === 'gray';
        });
        if (!entries.length) {
            historyList.innerHTML = '<div class="history-empty">灰度转换 暂无处理记录</div>';
            return;
        }

        var fnameCount = {};
        entries.forEach(function(e) {
            var fn = e.original_filename || e.original_image.split('/').pop();
            fnameCount[fn] = (fnameCount[fn] || 0) + 1;
        });

        var fnameSeen = {};
        var html = '';
        for (var i = 0; i < entries.length && i < 20; i++) {
            var e = entries[i];
            var fn = e.original_filename || e.original_image.split('/').pop();
            fnameSeen[fn] = (fnameSeen[fn] || 0) + 1;
            var label = e.module_title + '_' + fn;
            if (fnameCount[fn] > 1 && fnameSeen[fn] > 1) {
                label += '_' + fnameSeen[fn];
            }
            var d = new Date(e.timestamp);
            html += '<div class="history-item" data-id="' + e.id + '">';
            html += '<span class="history-module">' + label + '</span>';
            html += '<span class="history-time">' + d.toLocaleString('zh-CN') + '</span>';
            html += '<a class="history-view-btn" href="' + e.result_image + '" target="_blank" rel="noopener noreferrer">查看</a>';
            html += '<a class="history-load-btn" href="#" data-id="' + e.id + '">载入预览</a>';
            html += '<button class="history-del-btn" data-id="' + e.id + '" title="删除此记录">&times;</button>';
            html += '</div>';
        }
        historyList.innerHTML = html;

        historyList.querySelectorAll('.history-load-btn').forEach(function(btn) {
            btn.addEventListener('click', function(ev) {
                ev.preventDefault();
                var id = parseInt(this.dataset.id);
                var entry = historyData.find(function(e) { return e.id === id; });
                if (entry) {
                    showPreview(entry.original_image, entry.result_image,
                        entry.original_info, entry.result_info, entry.stats, entry.histogram);
                    cachedResult = {
                        id: entry.id,
                        originalUrl: entry.original_image,
                        resultUrl: entry.result_image,
                        originalInfo: entry.original_info,
                        resultInfo: entry.result_info,
                        stats: entry.stats,
                        histogram: entry.histogram
                    };
                }
            });
        });

        historyList.querySelectorAll('.history-del-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var id = parseInt(this.dataset.id);
                var targetEntry = historyData.find(function(e) { return e.id === id; });
                fetch('/api/history/' + id, { method: 'DELETE' })
                    .then(function(res) {
                        if (res.ok) {
                            if ((cachedResult && cachedResult.id === id) ||
                                sameUrl(previewResult ? previewResult.src : '', targetEntry ? targetEntry.result_image : null) ||
                                sameUrl(cachedResult ? cachedResult.resultUrl : '', targetEntry ? targetEntry.result_image : null)) {
                                clearPreview();
                            }
                            historyData = historyData.filter(function(e) { return e.id !== id; });
                            renderHistory();
                        }
                    });
            });
        });
    }

    fetchHistory();
})();
</script>
</body>
</html>
