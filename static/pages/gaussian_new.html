<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>高斯模糊 — Cvtoolkits</title>
<link rel="stylesheet" href="../css/iframe-theme.css"><script src="../js/theme-sync.js"></script>
<style>
.page{max-width:1180px;margin:0 auto;padding:20px 22px 42px}
.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-bottom:14px}
.hero-main,.panel{border:1px solid var(--cv-border);background:var(--cv-panel);;border-radius:18px;backdrop-filter:blur(12px)}
.hero-main{padding:18px 20px}.eyebrow{color:#f472b6;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;font-weight:800}
h1{margin:6px 0 8px;font-size:clamp(1.55rem,3vw,2.35rem)}.subtitle{margin:0;color:#a5b4fc;font-size:.94rem;line-height:1.65}
.analogy{margin-top:12px;padding:12px 14px;border-radius:14px;background:rgba(244,114,182,.06);border:1px solid rgba(244,114,182,.16);color:#fce7f3;font-size:.84rem;line-height:1.6}.analogy strong{color:#f472b6}
.workspace{display:grid;grid-template-columns:minmax(300px,380px) 1fr;gap:14px;align-items:start}
.panel{padding:16px}.panel h3{margin:0 0 10px;font-size:1rem}
.upload-zone{border:1.5px dashed rgba(148,163,184,.32);border-radius:16px;padding:14px;background:rgba(2,6,23,.3)}.upload-zone.dragover{border-color:#f472b6;background:rgba(244,114,182,.08)}
.upload-row{display:flex;gap:10px;align-items:center}
button{font:inherit;border:0;border-radius:12px;cursor:pointer}
.upload-btn,.run-btn{padding:10px 14px;color:#06121f;font-weight:900;background:linear-gradient(135deg,#f472b6,#ec4899)}button:disabled{opacity:.48;cursor:not-allowed}
.file-meta{color:#94a3b8;font-size:.82rem}.file-meta strong{color:#e2e8f0}
.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}
.ghost-btn{padding:10px 13px;color:#cbd5e1;border:1px solid rgba(148,163,184,.2);background:rgba(148,163,184,.11)}
.params{margin-top:12px}.param label{display:flex;justify-content:space-between;color:#cbd5e1;font-size:.82rem;margin-bottom:5px}.param b{color:#f472b6}input[type=range]{width:100%;accent-color:#f472b6}
.kernel-viz{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;width:130px;height:130px;margin:12px auto}
.kernel-viz span{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border-radius:4px;color:#fce7f3;transition:all .3s}
.loading{display:none;text-align:center;padding:40px;border-radius:14px;color:#94a3b8;background:rgba(15,23,42,.55);border:1px solid rgba(148,163,184,.12)}
.error{display:none;padding:14px;border-radius:14px;color:#fecaca;background:rgba(127,29,29,.24);border:1px solid rgba(248,113,113,.32)}
.spinner{width:30px;height:30px;margin:0 auto 10px;border-radius:50%;border:3px solid rgba(148,163,184,.22);border-top-color:#f472b6;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.results-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.results-head p{margin:0;color:#94a3b8;font-size:.84rem}
.steps-grid{display:grid;display:flex;flex-wrap:wrap;gap:12px}
.step-card{flex:1 1 220px;min-width:200px;max-width:320px;overflow:hidden;border-radius:13px;background:rgba(15,23,42,.6);border:1px solid rgba(148,163,184,.13)}.step-card:hover{transform:translateY(-3px);box-shadow:0 0 24px rgba(56,189,248,.12)}
.step-img{min-height:120px;display:grid;place-items:center;background:rgba(2,6,23,.42)}.step-img img{width:100%;display:block}
.step-body{padding:10px 12px}.step-body strong{display:block;font-size:.82rem;color:#f8fafc}.step-body p{margin:4px 0 0;color:#94a3b8;font-size:.74rem;line-height:1.5}
@media(max-width:860px){.hero,.workspace{grid-template-columns:1fr}}
</style></head><body>
<main class="page"><section class="hero"><div class="hero-main">
<div class="eyebrow">Gaussian Blur</div><h1>高斯模糊：温柔的加权平均</h1>
<p class="subtitle">用一个钟形曲线（高斯函数）给邻域像素分配权重——离中心越近的像素权重越大，越远的越不重要。σ 控制"模糊半径"。</p>
<div class="analogy"><strong>🔔 直觉：</strong>你把一滴墨水掉在湿纸上——墨水从中心向外扩散，中心最浓、边缘最淡。高斯模糊就是这个过程：中心像素保留最多自己的颜色，周围像素按"距离"逐渐降低影响力。σ 越大，墨水扩散得越远，画面越模糊。和均值模糊不同，高斯模糊<strong>不会产生生硬的方块感</strong>。</div>
<div class="kernel-viz" id="kernelViz"></div>
</div><aside class="panel"><h3>📥 上传图片</h3>
<div class="upload-zone" id="uploadZone"><input type="file" id="fileInput" accept="image/*"><div class="upload-row"><div class="file-meta"><strong id="fileName">未选择</strong><br>高斯核权重加权平均平滑降噪</div></div></div>
<div class="params"><div class="param"><label>σ（模糊强度） <b id="sigmaVal">1.5</b></label><input type="range" id="sigma" min="5" max="50" value="15" step="1"></div></div>
<div class="actions"><button class="run-btn" id="runBtn">▶ 开始处理</button><button class="ghost-btn" id="sampleBtn">内置示例</button></div></aside></section>
<section class="workspace"><aside class="panel" style="display:none"></aside><section class="panel">
<div class="results-head"><h3>处理结果</h3><p id="resultHint">原图→灰度→高斯模糊(σ可调)</p></div>
<div class="loading" id="loading"><div class="spinner"></div>高斯核卷积中…</div><div class="error" id="errorBox"></div><div class="steps-grid" id="stepsGrid"></div></section></section></main>
<script>
var sf=null;
var fi=document.getElementById('fileInput');
var fn=document.getElementById('fileName');
var rb=document.getElementById('runBtn');
var sb=document.getElementById('sampleBtn');
var ld=document.getElementById('loading');
var eb=document.getElementById('errorBox');
var sg=document.getElementById('stepsGrid');
var rh=document.getElementById('resultHint');
var sgm=document.getElementById('sigma');
var sv=document.getElementById('sigmaVal');
var uz=document.getElementById('uploadZone');

fi.addEventListener('change',function(e){
  sf=e.target.files[0]||null;
  if(sf){fn.textContent=sf.name;rb.disabled=false}
});

uz.addEventListener('dragover',function(e){e.preventDefault();uz.classList.add('dragover')});
uz.addEventListener('dragleave',function(){uz.classList.remove('dragover')});
uz.addEventListener('drop',function(e){
  e.preventDefault();
  uz.classList.remove('dragover');
  sf=e.dataTransfer.files[0]||null;
  if(sf){fn.textContent=sf.name;rb.disabled=false}
});

sgm.addEventListener('input',function(){
  sv.textContent=(this.value/10).toFixed(1);
  drawKernel(this.value/10)
});

function drawKernel(s){
  var kv=document.getElementById('kernelViz'),k=Math.max(3,Math.ceil(s*3)|1),c=(k-1)/2,h='';
  for(var y=-c;y<=c;y++)for(var x=-c;x<=c;x++){
    var w=Math.exp(-(x*x+y*y)/(2*s*s)),a=(w/.16).toFixed(2);
    h+='<span style="background:rgba(244,114,182,'+Math.min(1,a)+')">'+(a>0.5?Math.round(w*100)/100:'')+'</span>'
  }
  kv.style.gridTemplateColumns='repeat('+k+',1fr)';kv.innerHTML=h
}
drawKernel(1.5);

function sbz(b){ld.style.display=b?'block':'none';eb.style.display='none';rb.disabled=b;sb.disabled=b}

function drun(wf){
  if(!wf){eb.textContent='请先选择图片文件';eb.style.display='block';return}
  sbz(true);
  var fd=new FormData();
  fd.append('file',wf);
  fd.append('sigma',(sgm.value/10).toFixed(1));
  fetch('/api/demo/gaussian',{method:'POST',body:fd})
    .then(function(r){return r.json().catch(function(){return{}}).then(function(j){if(!r.ok)throw new Error(j.error||'HTTP '+r.status);return j})})
    .then(render)
    .catch(function(e){sbz(false);eb.textContent=e.message;eb.style.display='block'});
}

rb.addEventListener('click',function(){drun(sf)});

sb.addEventListener('click',function(){
  sf=null;fi.value='';fn.textContent='内置示例';
  fetch('../images/demo-street.jpg')
    .then(function(r){return r.blob()})
    .then(function(b){drun(new File([b],'demo.jpg'))})
    .catch(function(){drun(null)});
});

function render(d){
  sbz(false);
  var s=(sgm.value/10).toFixed(1);
  rh.textContent='σ='+s+'的高斯核对每个像素周围加权平均。中心权重最大，越远越小——模糊得很自然。';
  sg.innerHTML=(d.steps||[]).map(function(s,i){
    var titles={original:'原图',gray:'灰度化（高斯核在亮度通道上卷积）',gaussian:'高斯模糊 σ='+((sgm.value/10).toFixed(1))};
    var img=s.image_base64?'<img src="data:image/png;base64,'+s.image_base64+'" alt="'+esc(s.name||'')+'" loading="lazy">':'<span style="color:#64748b">—</span>';
    return'<article class="step-card"><div class="step-img">'+img+'</div><div class="step-body"><strong>'+esc(titles[s.id]||s.name)+'</strong><p>'+esc(s.explanation||'')+'</p>'+(s.formula?'<code class="step-formula">'+esc(s.formula)+'</code>':'')+'</div></article>'
  }).join('')
}
function esc(s){return String(s).replace(/[&<>"\']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]})}
</script></body></html>
