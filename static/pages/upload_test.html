<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Upload Test</title></head><body>
<h2>Upload Test</h2>
<input type="file" id="f"><br><br>
<button id="b">Upload to Gaussian API</button>
<pre id="out"></pre>
<script>
var file=null;
document.getElementById('f').addEventListener('change',function(e){
  file=e.target.files[0];
  document.getElementById('out').textContent='Selected: '+(file?file.name:'none');
});
document.getElementById('b').addEventListener('click',function(){
  if(!file){document.getElementById('out').textContent='No file selected!';return;}
  var fd=new FormData();
  fd.append('file',file);
  fd.append('sigma','1.5');
  document.getElementById('out').textContent='Uploading...';
  fetch('/api/demo/gaussian',{method:'POST',body:fd})
    .then(function(r){return r.json().then(function(j){return{ok:r.ok,status:r.status,json:j}})})
    .then(function(r){
      if(r.ok)document.getElementById('out').textContent='SUCCESS! Steps: '+r.json.steps.length;
      else document.getElementById('out').textContent='FAIL: '+r.status+' '+JSON.stringify(r.json);
    })
    .catch(function(e){document.getElementById('out').textContent='NETWORK ERROR: '+e.message});
});
</script>
</body></html>
