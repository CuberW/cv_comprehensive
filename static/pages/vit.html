<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vision Transformer - CV 通识教育</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <link rel="stylesheet" href="../css/model-demo-page.css">
  <script src="../js/theme-sync.js"></script>
  <script src="../js/page-utils.js"></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow">Transformer 统一视觉</div>
      <h1 id="pageTitle">Vision Transformer</h1>
      <p class="subtitle" id="subtitle"></p>
      <p class="intro" id="introText"></p>
      <div class="problem-statement" id="problemStatement"></div>
      <span class="status" id="statusPill"></span>
    </div>
    <aside class="panel controls">
      <h2>运行真实后端</h2>
      <input id="fileInput" type="file" accept="image/*" hidden>
      <div class="control-row">
        <button id="chooseBtn" type="button">选择图片</button>
        <button id="sampleBtn" type="button">使用示例</button>
        <button id="runBtn" class="primary" type="button">运行 ViT</button>
      </div>
      <div class="file-line" id="fileName">未选择文件，将使用内置示例</div>
      <div id="paramsPanel" class="params"></div>
    </aside>
  </section>
  <section class="info-grid">
    <div class="panel"><h2>算法流程</h2><ul id="pipelineList"></ul></div>
    <div class="panel"><h2>应用场景</h2><ul id="applicationsList"></ul></div>
    <div class="panel"><h2>局限说明</h2><ul id="limitationsList"></ul></div>
  </section>
  <div id="loading" class="loading" hidden>后端正在运行 ViT，首次运行可能需要下载或加载权重...</div>
  <div id="errorBox" class="error" hidden></div>
  <section id="metricsGrid" class="metrics"></section>
  <section class="panel"><h2>后端步骤证据</h2><div id="stepsGrid" class="steps"></div></section>
</main>
<script>
window.ModelDemoConfig = {
  moduleId: 'vit',
  title: 'Vision Transformer',
  subtitle: '让模型像读文章一样读图片：一块块看，再建立全局关系。',
  intro: 'ViT 适合解释为什么 Transformer 能做图像分类、检测和分割：它把图片切成许多小块，让每一块和其他块交换信息。本页调用后端 ViT 管线，返回分类概率、Patch 网格、位置编码相似度和注意力图。',
  problemStatement: 'Vision Transformer 解决的是“没有卷积时，模型如何理解整张图片”的问题：先把局部小块变成 token，再用注意力找出哪些区域彼此相关。',
  status: '真实后端推理或权重提示',
  params: [
    { name: 'layer', label: '注意力层', type: 'range', min: 1, max: 12, step: 1, value: 12 },
    { name: 'head_idx', label: '注意力头', type: 'range', min: 0, max: 11, step: 1, value: 0 },
    { name: 'selected_patch', label: 'Patch 编号', type: 'range', min: 0, max: 195, step: 1, value: 0 }
  ],
  pipeline: ['选择一张图片', '切成固定大小的小块', '把每个小块变成 token', '记录每块在图中的位置', '用注意力让远近区域互相交流', '汇总全图信息得到分类'],
  applications: ['图像分类和检索', '解释注意力如何看全局', '理解 CNN 与 Transformer 的差异', '连接 DETR、SAM、CLIP 等基础模型'],
  limitations: ['首次运行可能需要下载权重', '注意力图只能作为解释线索', '分类类别受预训练数据限制']
};
</script>
<script src="../js/interactive-teaching-stage.js"></script>
<script src="../js/model-demo-page.js"></script>
</body>
</html>
