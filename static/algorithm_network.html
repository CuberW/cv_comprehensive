// Column metadata
const COLS = [
  {idx:0, phase:'phase1', label:'阶段一', sub:'基础原语', color:PCOL.phase1},
  {idx:1, phase:'phase2', label:'阶段二', sub:'经典CV核心', color:PCOL.phase2},
  {idx:2, phase:'phase3', label:'阶段三', sub:'中级视觉', color:PCOL.phase3},
  {idx:3, phase:'phase4', label:'阶段四', sub:'深度学习时代', color:PCOL.phase4},
  {idx:4, phase:'phase5', label:'阶段五-A', sub:'ViT家族 · 检测新范式', color:PCOL.phase5},
  {idx:5, phase:'phase5', label:'阶段五-B', sub:'分割 · 多模态 · 生成式', color:PCOL.phase5},
  {idx:6, phase:'phase5', label:'阶段五-C', sub:'3D视觉 · 自监督 · 跟踪 · 姿态', color:PCOL.phase5},
];

// ═══════════════ LAYOUT ENGINE ═══════════════
const nodeMap = {};
NODES.forEach(n => { nodeMap[n.id] = n; });

const pos = {}; // id → {x, y}

const COLMARGIN = 24;    // horizontal gap between columns
const TOP = 100;          // top padding (for header)
const BOTTOM = 40;        // bottom padding
const ROW_GAP = 52;       // vertical gap between nodes in same column
const COL_WIDTH = 170;    // width of each column (for background band)
const PHASE5_COL_WIDTH = 190; // wider for Phase 5

// Compute layout: each column gets its x-center, nodes stacked vertically
function computeLayout(){
  // Build column→nodes mapping
  const colNodes = [[],[],[],[],[],[],[]];
  NODES.forEach(n => { colNodes[colMap[n.id]].push(n); });

  // Compute x positions for each column
  let cx = 120; // start x for first column
  const colX = [];
  colNodes.forEach((nodes, ci) => {
    const cw = ci >= 4 ? PHASE5_COL_WIDTH : COL_WIDTH;
    colX[ci] = cx + cw/2;
    cx += cw + COLMARGIN;
  });
  const totalW = cx - COLMARGIN; // total diagram width

  // Compute max nodes in any column for height
  let maxNodes = 0;
  colNodes.forEach(cn => { if (cn.length > maxNodes) maxNodes = cn.length; });
  const totalH = TOP + maxNodes * ROW_GAP + BOTTOM;

  // Position nodes within each column
  colNodes.forEach((cn, ci) => {
    const startY = TOP + (maxNodes - cn.length) * ROW_GAP / 2; // center vertically
    cn.forEach((n, ri) => {
      pos[n.id] = { x: colX[ci], y: startY + ri * ROW_GAP + ROW_GAP/2 };
    });
  });

  return { totalW, totalH, colX };
}

let layout = computeLayout();

// ═══════════════ CANVAS ═══════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tip = document.getElementById('tip');
const dpr = Math.min(window.devicePixelRatio||1, 2);

let vW, vH; // viewport dimensions

function resizeCanvas(){
  vW = window.innerWidth;
  vH = window.innerHeight;
  canvas.width = vW * dpr;
  canvas.height = vH * dpr;
  canvas.style.width = vW + 'px';
  canvas.style.height = vH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// View transform
let vx = 0, vy = 0, zm = 1;
let dragging = false, dragId = null;
let panning = false, pSX=0, pSY=0, pVX=0, pVY=0;
let showLabels = true;

// Compute initial view to fit diagram
function fitToScreen(){
  const l = layout;
  const scaleX = (vW - 40) / l.totalW;
  const scaleY = (vH - 40) / l.totalH;
  zm = Math.min(scaleX, scaleY, 1.0);
  // Center the diagram
  vx = (vW / zm - l.totalW) / 2;
  vy = (vH / zm - l.totalH) / 2;
}
fitToScreen();

// ═══════════════ RENDER ═══════════════
function s2w(sx, sy){ return { x: sx/zm - vx, y: sy/zm - vy }; }
function w2s(wx, wy){ return { x: (wx+vx)*zm, y: (wy+vy)*zm }; }

function render(){
  ctx.clearRect(0, 0, vW, vH);

  ctx.save();
  ctx.translate(vx * zm, vy * zm);
  ctx.scale(zm, zm);

  const l = layout;

  // ── Column background bands ──
  const colNodes = [[],[],[],[],[],[],[]];
  NODES.forEach(n => { colNodes[colMap[n.id]].push(n); });
  const maxNodes = Math.max(...colNodes.map(cn=>cn.length));
  const bandH = TOP + maxNodes * ROW_GAP + BOTTOM;

  colNodes.forEach((cn, ci) => {
    const cw = ci >= 4 ? PHASE5_COL_WIDTH : COL_WIDTH;
    const bx = l.colX[ci] - cw/2 + 10;

    // Rounded rect background
    const r = 8;
    ctx.beginPath();
    ctx.moveTo(bx+r, 20); ctx.lineTo(bx+cw-20-r, 20);
    ctx.arcTo(bx+cw-20, 20, bx+cw-20, 20+r, r);
    ctx.lineTo(bx+cw-20, bandH-r);
    ctx.arcTo(bx+cw-20, bandH, bx+cw-20-r, bandH, r);
    ctx.lineTo(bx+r, bandH);
    ctx.arcTo(bx, bandH, bx, bandH-r, r);
    ctx.lineTo(bx, 20+r);
    ctx.arcTo(bx, 20, bx+r, 20, r);
    ctx.closePath();

    const col = COLS[ci];
    ctx.fillStyle = col.color + '0d';
    ctx.fill();
    ctx.strokeStyle = col.color + '30';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Column header
    ctx.fillStyle = col.color;
    ctx.font = 'bold 13px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(col.label, l.colX[ci], 48);
    ctx.fillStyle = '#9ca3af';
    ctx.font = '11px system-ui';
    ctx.fillText(col.sub, l.colX[ci], 66);
  });

  // ── Draw edges ──
  EDGES.forEach(e => {
    const fp = pos[e.f], tp = pos[e.t];
    if (!fp || !tp) return;

    const fc = colMap[e.f], tc = colMap[e.t];
    const isForward = tc > fc;
    const isSameCol = fc === tc;

    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = ECO[e.ty] || '#666';
    ctx.lineWidth = (e.ty==='improves'||e.ty==='based_on') ? 1.8 : 1;
    ctx.setLineDash(EDS[e.ty] || []);
    ctx.beginPath();

    if (isSameCol) {
      // Same column: draw an arc going out and back
      const midX = fp.x + 30;
      const midY = (fp.y + tp.y) / 2;
      ctx.moveTo(fp.x, fp.y);
      ctx.quadraticCurveTo(midX, fp.y, midX, midY);
      ctx.quadraticCurveTo(midX, tp.y, tp.x, tp.y);
    } else if (isForward) {
      // Forward edge: smooth bezier
      const dx = tp.x - fp.x;
      const cp1x = fp.x + dx * 0.4;
      const cp2x = fp.x + dx * 0.6;
      ctx.moveTo(fp.x, fp.y);
      ctx.bezierCurveTo(cp1x, fp.y, cp2x, tp.y, tp.x, tp.y);
    } else {
      // Backward edge (rare): arc upward
      const midX = (fp.x + tp.x) / 2;
      const midY = Math.min(fp.y, tp.y) - 25;
      ctx.moveTo(fp.x, fp.y);
      ctx.quadraticCurveTo(midX, midY, tp.x, tp.y);
    }

    ctx.stroke();
    ctx.setLineDash([]);

    // Arrowhead on forward/same-col edges
    if (isForward || isSameCol) {
      let ax, ay, ang;
      if (isForward) {
        const dx = tp.x - fp.x;
        // Point on bezier near target
        const t = 0.92;
        const mt = 1-t;
        const cp1x = fp.x + dx*0.4, cp2x = fp.x + dx*0.6;
        ax = mt*mt*mt*fp.x + 3*mt*mt*t*cp1x + 3*mt*t*t*cp2x + t*t*t*tp.x;
        ay = mt*mt*mt*fp.y + 3*mt*mt*t*fp.y + 3*mt*t*t*tp.y + t*t*t*tp.y;
        // Derivative at t
        const dax = 3*mt*mt*(cp1x-fp.x) + 6*mt*t*(cp2x-cp1x) + 3*t*t*(tp.x-cp2x);
        const day = 3*mt*mt*(fp.y-fp.y) + 6*mt*t*(tp.y-fp.y) + 3*t*t*(tp.y-tp.y);
        // Actually let's simplify: use direction toward target near the end
        ang = Math.atan2(tp.y - ay, tp.x - ax);
      } else {
        ax = tp.x; ay = tp.y;
        ang = Math.atan2(tp.y - fp.y, tp.x - fp.x);
      }
      const al = 6;
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(ax-al*Math.cos(ang-0.5), ay-al*Math.sin(ang-0.5));
      ctx.lineTo(ax-al*Math.cos(ang+0.5), ay-al*Math.sin(ang+0.5));
      ctx.closePath();
      ctx.fillStyle = ECO[e.ty] || '#666';
      ctx.fill();
    }

    // Edge label (only when zoomed in)
    if (showLabels && zm > 0.45) {
      const mx = (fp.x+tp.x)/2, my = (fp.y+tp.y)/2;
      ctx.globalAlpha = 0.5;
      ctx.font = '8px system-ui';
      ctx.fillStyle = ECO[e.ty] || '#666';
      ctx.textAlign = 'center';
      ctx.fillText(e.lb, mx, my - 4);
    }
  });

  // ── Draw nodes ──
  NODES.forEach(n => {
    const p = pos[n.id];
    if (!p) return;
    const color = PCOL[n.p];
    const r = 8;

    // Shadow
    ctx.beginPath();
    ctx.arc(p.x, p.y+1, r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fill();

    // Node circle
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();

    // White border
    ctx.strokeStyle = '#fff3';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Drag highlight
    if (dragId === n.id) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, r+4, 0, Math.PI*2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }

    // Label
    if (showLabels && zm > 0.35) {
      const fs = Math.min(13, Math.max(9, 11/zm));
      ctx.font = `bold ${fs}px system-ui`;
      ctx.fillStyle = '#e5e7eb';
      ctx.textAlign = 'center';
      ctx.fillText(n.n, p.x, p.y - r - 6);
    }
  });

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ═══════════════ INTERACTION ═══════════════
function findNode(sx, sy){
  const w = s2w(sx, sy);
  // Search in reverse to pick topmost (last drawn)
  for (let i = NODES.length-1; i >= 0; i--) {
    const n = NODES[i], p = pos[n.id];
    if (!p) continue;
    const dx = w.x-p.x, dy = w.y-p.y;
    if (dx*dx+dy*dy < 15*15) return n;
  }
  return null;
}

function getRelations(node){
  const rels = [];
  EDGES.forEach(e => {
    if (e.f === node.id) rels.push({dir:'→', other:nodeMap[e.t], ty:e.ty, lb:e.lb});
    if (e.t === node.id) rels.push({dir:'←', other:nodeMap[e.f], ty:e.ty, lb:e.lb});
  });
  return rels;
}

function showTip(sx, sy, node, rels){
  const color = PCOL[node.p];
  let rh = '';
  rels.slice(0,10).forEach(r => {
    rh += `<div>${r.dir} <b>${r.other.n}</b> <span style="color:${ECO[r.ty]}">${TEM[r.ty]}${TCN[r.ty]}</span> · ${r.lb}</div>`;
  });
  if (rels.length>10) rh += `<div style="color:#6b7280">…还有 ${rels.length-10} 条关系</div>`;

  tip.innerHTML = `<span class="tag" style="background:${color}">${node.p==='phase5'?'阶段五·前沿论文':COLS.find(c=>c.phase===node.p)?.label+'·'+COLS.find(c=>c.phase===node.p)?.sub||node.p}</span>
    <h3>${node.n}</h3>
    <div class="en">${node.en}</div>
    <div class="dsc">${node.d}</div>
    <div class="yr">📅 ${node.y}</div>
    ${rh?'<div class="rels">'+rh+'</div>':''}`;
  tip.className = 'on';

  let tx=sx+16, ty=sy+16;
  if (tx+420>vW) tx=sx-420;
  if (ty+300>vH) ty=sy-310;
  tip.style.left=tx+'px'; tip.style.top=ty+'px';
}
function hideTip(){ tip.className=''; }

canvas.addEventListener('mousedown', e => {
  const node = findNode(e.clientX, e.clientY);
  if (node) {
    dragging=true; dragId=node.id;
    canvas.style.cursor='grabbing';
  } else {
    panning=true; pSX=e.clientX; pSY=e.clientY; pVX=vx; pVY=vy;
    canvas.style.cursor='grabbing';
  }
});
canvas.addEventListener('mousemove', e => {
  if (dragging && dragId) {
    const w = s2w(e.clientX, e.clientY);
    pos[dragId].x=w.x; pos[dragId].y=w.y;
    hideTip();
  } else if (panning) {
    vx = pVX + (e.clientX-pSX)/zm;
    vy = pVY + (e.clientY-pSY)/zm;
    hideTip();
  } else {
    const node = findNode(e.clientX, e.clientY);
    if (node) {
      canvas.style.cursor='pointer';
      showTip(e.clientX, e.clientY, node, getRelations(node));
    } else {
      canvas.style.cursor='grab';
      hideTip();
    }
  }
});
canvas.addEventListener('mouseup', ()=>{ dragging=false; dragId=null; panning=false; canvas.style.cursor='grab'; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zf = e.deltaY<0 ? 1.07 : 0.93;
  const nz = Math.max(0.2, Math.min(2.5, zm*zf));
  vx = e.clientX/nz - (e.clientX/zm - vx);
  vy = e.clientY/nz - (e.clientY/zm - vy);
  zm = nz;
}, {passive:false});

// Touch
canvas.addEventListener('touchstart', e => {
  if (e.touches.length===1){
    const n=findNode(e.touches[0].clientX, e.touches[0].clientY);
    if(n){ dragging=true; dragId=n.id; e.preventDefault(); }
    else { panning=true; pSX=e.touches[0].clientX; pSY=e.touches[0].clientY; pVX=vx; pVY=vy; }
  }
});
canvas.addEventListener('touchmove', e => {
  if(dragging&&dragId){ e.preventDefault(); const w=s2w(e.touches[0].clientX, e.touches[0].clientY); pos[dragId].x=w.x; pos[dragId].y=w.y; }
  else if(panning){ vx=pVX+(e.touches[0].clientX-pSX)/zm; vy=pVY+(e.touches[0].clientY-pSY)/zm; }
});
canvas.addEventListener('touchend', ()=>{ dragging=false; dragId=null; panning=false; });

// Controls
window.rst = function(){ fitToScreen(); };
window.tgl = function(){ showLabels=!showLabels; };

// Also refit on resize
window.addEventListener('resize', ()=>{
  resizeCanvas();
  fitToScreen();
});

// ═══════════════ MAIN LOOP ═══════════════
function loop(){
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
