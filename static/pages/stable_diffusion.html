<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stable Diffusion - CV 通识教育</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <link rel="stylesheet" href="../css/model-demo-page.css">
  <script src="../js/theme-sync.js"></script>
  <script src="../js/page-utils.js"></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow">生成模型 / 文本条件扩散</div>
      <h1 id="pageTitle">Stable Diffusion</h1>
      <p class="subtitle" id="subtitle"></p>
      <p class="intro" id="introText"></p>
      <div class="problem-statement" id="problemStatement"></div>
      <span class="status" id="statusPill"></span>
    </div>
    <aside class="panel controls">
      <h2>运行真实后端</h2>
      <div class="control-row">
        <button id="sampleBtn" type="button">重置提示词</button>
        <button id="runBtn" class="primary" type="button">生成图像</button>
      </div>
      <div class="file-line" id="fileName">Stable Diffusion 使用文本提示词和模型缓存</div>
      <div id="paramsPanel" class="params"></div>
    </aside>
  </section>
  <section class="info-grid">
    <div class="panel"><h2>算法流程</h2><ul id="pipelineList"></ul></div>
    <div class="panel"><h2>应用场景</h2><ul id="applicationsList"></ul></div>
    <div class="panel"><h2>局限说明</h2><ul id="limitationsList"></ul></div>
  </section>
  <div id="loading" class="loading" hidden>后端正在运行 Stable Diffusion；首次加载可能需要下载或读取较大的权重...</div>
  <div id="errorBox" class="error" hidden></div>
  <section id="metricsGrid" class="metrics"></section>
  <section class="panel"><h2>后端步骤证据</h2><div id="stepsGrid" class="steps"></div></section>
</main>
<script>
window.ModelDemoConfig = {
  moduleId: 'stable_diffusion',
  title: 'Stable Diffusion',
  subtitle: '输入一句描述，让模型从噪声中逐步生成符合描述的图像。',
  intro: 'Stable Diffusion 适合解释文生图产品背后的直观流程：文字先变成条件，噪声图在条件引导下逐步变清晰。本页会调用后端 Stable Diffusion 管线；若本机没有权重，会显示明确下载路径和配置提示，不用前端假图冒充推理。',
  problemStatement: 'Stable Diffusion 解决的是“如何按文字要求生成图像”的问题。它在压缩后的潜空间里反复去噪，并用文本条件控制图像内容。',
  status: '真实模型推理或清晰权重提示',
  params: [
    { name: 'prompt', label: '提示词', type: 'text', value: 'a cat sitting on a chair' },
    { name: 'num_steps', label: '推理步数', type: 'range', min: 10, max: 30, step: 5, value: 20 },
    { name: 'guidance', label: 'CFG 强度', type: 'range', min: 10, max: 150, step: 5, value: 75, scale: 10, fixed: 1 }
  ],
  pipeline: ['输入文字提示词', '把文字编码成条件向量', '从随机潜变量噪声开始', 'U-Net 预测每一步该去掉的噪声', '用 CFG 强化提示词方向', 'VAE 解码得到最终图像'],
  applications: ['文本生成图像', '图像创意草图和概念设计', '解释潜空间扩散', '理解提示词和 CFG 的作用'],
  limitations: ['权重体积较大，不应塞进仓库', 'CPU 推理很慢', '输出受模型版本、提示词和随机种子影响']
};
</script>
<script src="../js/interactive-teaching-stage.js"></script>
<script src="../js/model-demo-page.js"></script>
</body>
</html>
