<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>算法原理文档 - Cvtoolkits</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <style>
    :root{--doc-sidebar:clamp(240px,24vw,330px)}
    body{min-height:100vh}
    .doc-page{width:min(var(--cv-page-max),100%);margin:0 auto;padding:var(--cv-page-pad-top) var(--cv-page-gutter) var(--cv-page-pad-bottom)}
    .doc-hero{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:18px;align-items:end;margin-bottom:14px;padding:20px;border:1px solid var(--cv-border);border-radius:8px;background:var(--cv-page-header-bg);box-shadow:var(--cv-shadow)}
    .doc-kicker{font-size:.78rem;font-weight:800;letter-spacing:.08em;color:var(--cv-accent);margin-bottom:6px}
    .doc-hero h1{font-size:clamp(1.55rem,2.4vw,2.35rem);line-height:1.12;margin:0;color:var(--cv-title);letter-spacing:0}
    .doc-hero p{max-width:820px;margin:8px 0 0;color:var(--cv-muted);font-size:.96rem}
    .doc-status{display:grid;gap:5px;justify-items:end;color:var(--cv-faint);font-size:.82rem}
    .doc-status strong{color:var(--cv-accent);font-size:1.45rem;line-height:1}
    .phase-tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:0 0 14px}
    .phase-tab{min-width:0;border:1px solid var(--cv-border);border-radius:8px;background:var(--cv-panel);color:var(--cv-muted);padding:11px 12px;text-align:left;font:inherit;cursor:pointer;box-shadow:0 12px 28px rgba(0,0,0,.12)}
    .phase-tab span{display:block;color:var(--cv-text);font-weight:800;font-size:.92rem;line-height:1.25;overflow-wrap:anywhere}
    .phase-tab small{display:block;margin-top:3px;color:var(--cv-faint);font-size:.76rem}
    .phase-tab.active{border-color:color-mix(in srgb,var(--cv-accent) 48%,transparent);background:color-mix(in srgb,var(--cv-accent) 12%,var(--cv-panel));color:var(--cv-text)}
    .doc-shell{display:grid;grid-template-columns:var(--doc-sidebar) minmax(0,1fr);gap:18px;align-items:start}
    .doc-toc{position:sticky;top:18px;max-height:calc(100vh - 36px);overflow:auto;border:1px solid var(--cv-border);border-radius:8px;background:var(--cv-panel);box-shadow:0 18px 42px rgba(0,0,0,.18);backdrop-filter:blur(18px)}
    .doc-toc-head{display:grid;gap:8px;padding:14px;border-bottom:1px solid var(--cv-border)}
    .doc-toc-head strong{font-size:.95rem;color:var(--cv-text)}
    .doc-search{width:100%;height:36px;border:1px solid var(--cv-border);border-radius:7px;background:var(--cv-control-bg);color:var(--cv-text);padding:0 10px;font:inherit;font-size:.88rem;outline:none}
    .doc-search:focus{border-color:var(--cv-accent)}
    .toc-tree{display:grid;gap:8px;padding:10px}
    .toc-phase{display:grid;gap:6px}
    .toc-phase-title{width:100%;border:1px solid transparent;border-radius:7px;background:transparent;color:var(--cv-text);font:inherit;font-size:.88rem;font-weight:800;text-align:left;padding:8px;cursor:pointer}
    .toc-phase-title.active,.toc-phase-title:hover{border-color:color-mix(in srgb,var(--cv-accent) 32%,transparent);background:color-mix(in srgb,var(--cv-accent) 10%,transparent)}
    .toc-topic{display:grid;gap:4px;padding-left:8px;border-left:1px solid var(--cv-border)}
    .toc-topic strong{font-size:.78rem;color:var(--cv-faint);font-weight:800;padding:2px 0 2px 6px}
    .toc-topic a{display:block;border:1px solid transparent;border-radius:7px;padding:6px 8px;color:var(--cv-muted);text-decoration:none;font-size:.83rem;line-height:1.25;overflow-wrap:anywhere}
    .toc-topic a:hover,.toc-topic a.active{border-color:color-mix(in srgb,var(--cv-accent) 32%,transparent);background:color-mix(in srgb,var(--cv-accent) 10%,transparent);color:var(--cv-text)}
    .toc-phase.hidden,.toc-topic.hidden,.toc-topic a.hidden{display:none}
    .doc-content{min-width:0;border:1px solid var(--cv-border);border-radius:8px;background:var(--cv-panel-2);box-shadow:var(--cv-shadow);padding:clamp(18px,2.2vw,32px)}
    .doc-empty{padding:30px;color:var(--cv-muted);text-align:center}
    .markdown-body{color:var(--cv-text);font-size:1rem;line-height:1.78}
    .markdown-body h1{font-size:1.6rem;line-height:1.18;margin:0 0 16px;color:var(--cv-title)}
    .markdown-body h2{scroll-margin-top:24px;font-size:1.55rem;line-height:1.22;margin:0 0 12px;color:var(--cv-title);padding-bottom:8px;border-bottom:1px solid var(--cv-border)}
    .markdown-body h3{scroll-margin-top:24px;font-size:1.2rem;margin:28px 0 8px;color:var(--cv-title)}
    .markdown-body h4{scroll-margin-top:24px;font-size:1.06rem;margin:28px 0 10px;color:var(--cv-title);padding:9px 11px;border:1px solid var(--cv-border);border-radius:8px;background:var(--cv-soft-surface)}
    .markdown-body p{margin:0 0 12px;color:var(--cv-muted)}
    .markdown-body ul,.markdown-body ol{margin:0 0 14px;padding-left:22px;color:var(--cv-muted)}
    .markdown-body li{margin:4px 0}
    .markdown-body strong{color:var(--cv-text)}
    .markdown-body a{color:var(--cv-accent);text-decoration:none}
    .markdown-body a:hover{text-decoration:underline}
    .markdown-body code{font-family:"Cascadia Code","Fira Code",Consolas,monospace;font-size:.86em;background:var(--cv-code-bg);border:1px solid var(--cv-border);border-radius:5px;padding:1px 5px;color:var(--cv-text)}
    .markdown-body pre{overflow:auto;margin:0 0 16px;padding:14px;border:1px solid var(--cv-border);border-radius:8px;background:var(--cv-code-bg)}
    .markdown-body pre code{background:transparent;border:0;padding:0}
    .markdown-body blockquote{margin:0 0 14px;padding:10px 14px;border-left:3px solid var(--cv-accent);background:var(--cv-soft-surface);color:var(--cv-muted);border-radius:0 8px 8px 0}
    .markdown-body table{width:100%;border-collapse:collapse;margin:0 0 16px;display:block;overflow:auto}
    .markdown-body th,.markdown-body td{border:1px solid var(--cv-border);padding:8px 10px;text-align:left;vertical-align:top}
    .markdown-body th{background:var(--cv-soft-surface);color:var(--cv-text)}
    .markdown-body .mermaid{display:grid;place-items:center;margin:14px 0 18px;padding:14px;border:1px solid var(--cv-border);border-radius:8px;background:var(--cv-media-bg);overflow:auto}
    .markdown-body mjx-container{overflow-x:auto;overflow-y:hidden;max-width:100%;padding:2px 0}
    @media (max-width: 980px){
      .doc-hero{grid-template-columns:1fr}
      .doc-status{justify-items:start}
      .phase-tabs{grid-template-columns:1fr 1fr}
      .doc-shell{grid-template-columns:1fr}
      .doc-toc{position:relative;top:auto;max-height:360px}
    }
    @media (max-width: 560px){.phase-tabs{grid-template-columns:1fr}}
    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{scroll-behavior:auto!important;transition:none!important;animation:none!important}
    }
  </style>
</head>
<body>
  <main class="doc-page">
    <header class="doc-hero">
      <div>
        <div class="doc-kicker">算法学习路径</div>
        <h1>算法原理详解</h1>
        <p>按主页四阶段组织已实现算法：从像素原语到经典几何，再到深度学习和前沿基础模型。每章都有问题、直觉、流程、图示、公式和项目实现对应关系。</p>
      </div>
      <div class="doc-status" aria-live="polite">
        <strong id="chapterCount">--</strong>
        <span id="loadState">正在加载文档</span>
      </div>
    </header>
    <nav class="phase-tabs" id="phaseTabs" aria-label="阶段切换"></nav>
    <section class="doc-shell">
      <aside class="doc-toc" aria-label="算法原理目录">
        <div class="doc-toc-head">
          <strong>分阶段目录</strong>
          <input class="doc-search" id="docSearch" type="search" placeholder="搜索算法或主题">
        </div>
        <nav class="toc-tree" id="tocList"></nav>
      </aside>
      <article class="doc-content">
        <div class="doc-empty" id="docEmpty">正在准备文档...</div>
        <div class="markdown-body" id="markdownBody"></div>
      </article>
    </section>
  </main>
  <script src="../js/page-utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js"></script>
  <script src="../js/theme-sync.js"></script>
  <script>
    (function(){
      'use strict';
      var body = document.getElementById('markdownBody');
      var empty = document.getElementById('docEmpty');
      var toc = document.getElementById('tocList');
      var phaseTabs = document.getElementById('phaseTabs');
      var search = document.getElementById('docSearch');
      var chapterCount = document.getElementById('chapterCount');
      var loadState = document.getElementById('loadState');
      var esc = window.escapeHtml || window.esc || function(value){
        return String(value == null ? '' : value).replace(/[&<>"']/g, function(ch){
          return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
        });
      };
      var state = { phases: [], activePhase: '', activeAnchor: '' };

      function rewriteMarkdownAnchors(md){
        return String(md || '').replace(/^(#{1,6})\s+(.+?)\s+\{#([^}]+)\}\s*$/gm, function(_, marks, title, id){
          var level = marks.length;
          return '<h' + level + ' id="' + esc(id) + '">' + esc(title) + '</h' + level + '>';
        });
      }

      function protectMath(md){
        var store = [];
        var text = String(md || '').replace(/\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\)/g, function(match){
          var token = '@@MATH_' + store.length + '@@';
          store.push(match);
          return token;
        });
        return { text: text, store: store };
      }

      function restoreMath(html, store){
        return store.reduce(function(result, value, index){
          return result.replaceAll('@@MATH_' + index + '@@', esc(value));
        }, html);
      }

      function parseDocument(md){
        var lines = String(md || '').split(/\r?\n/);
        var phases = [];
        var current = null;
        lines.forEach(function(line){
          var phaseMatch = line.match(/^##\s+(.+?)\s+\{#(phase-[^}]+)\}\s*$/);
          if (phaseMatch) {
            current = { id: phaseMatch[2], title: phaseMatch[1], lines: [line], topics: [] };
            phases.push(current);
            return;
          }
          if (!current) return;
          current.lines.push(line);
          var topicMatch = line.match(/^###\s+(.+?)\s+\{#(topic-[^}]+)\}\s*$/);
          if (topicMatch) {
            current.topics.push({ id: topicMatch[2], title: topicMatch[1], algos: [] });
            return;
          }
          var algoMatch = line.match(/^####\s+(.+?)\s+\{#(algo-[^}]+)\}\s*$/);
          if (algoMatch) {
            if (!current.topics.length) current.topics.push({ id: current.id + '-other', title: '其他算法', algos: [] });
            current.topics[current.topics.length - 1].algos.push({ id: algoMatch[2], title: algoMatch[1] });
          }
        });
        phases.forEach(function(phase){
          phase.markdown = phase.lines.join('\n');
          phase.count = phase.topics.reduce(function(sum, topic){ return sum + topic.algos.length; }, 0);
        });
        return phases;
      }

      function phaseForAnchor(anchor){
        if (!anchor) return '';
        var found = state.phases.find(function(phase){
          return phase.id === anchor || phase.topics.some(function(topic){
            return topic.id === anchor || topic.algos.some(function(algo){ return algo.id === anchor; });
          });
        });
        return found ? found.id : '';
      }

      function renderTabs(){
        phaseTabs.innerHTML = state.phases.map(function(phase){
          return '<button type="button" class="phase-tab" data-phase="' + esc(phase.id) + '"><span>' + esc(phase.title) + '</span><small>' + phase.count + ' 个算法章节</small></button>';
        }).join('');
      }

      function renderToc(){
        toc.innerHTML = state.phases.map(function(phase){
          var topics = phase.topics.map(function(topic){
            var links = topic.algos.map(function(algo){
              return '<a href="#' + esc(algo.id) + '" data-phase="' + esc(phase.id) + '" data-anchor="' + esc(algo.id) + '">' + esc(algo.title) + '</a>';
            }).join('');
            return '<div class="toc-topic" data-topic="' + esc(topic.id) + '"><strong>' + esc(topic.title) + '</strong>' + links + '</div>';
          }).join('');
          return '<section class="toc-phase" data-phase="' + esc(phase.id) + '"><button type="button" class="toc-phase-title" data-phase-switch="' + esc(phase.id) + '">' + esc(phase.title) + '</button>' + topics + '</section>';
        }).join('');
      }

      function renderMarkdown(md){
        if (!window.marked || !window.DOMPurify) throw new Error('Markdown 渲染器不可用');
        marked.setOptions({ gfm: true, breaks: false, headerIds: false, mangle: false });
        var protectedMath = protectMath(rewriteMarkdownAnchors(md));
        var html = marked.parse(protectedMath.text);
        html = DOMPurify.sanitize(html, { ADD_TAGS: ['mjx-container'], ADD_ATTR: ['id', 'target'] });
        body.innerHTML = restoreMath(html, protectedMath.store);
        body.querySelectorAll('pre code.language-mermaid').forEach(function(code, index){
          var host = document.createElement('div');
          host.className = 'mermaid';
          host.id = 'mermaid-' + state.activePhase + '-' + index;
          host.textContent = code.textContent;
          code.closest('pre').replaceWith(host);
        });
        renderDiagrams();
        renderMath(body);
      }

      function renderDiagrams(){
        if (!window.mermaid) return;
        try {
          mermaid.initialize({
            startOnLoad: false,
            securityLevel: 'loose',
            theme: document.documentElement.getAttribute('data-theme') === 'light' ? 'neutral' : 'dark'
          });
          mermaid.run({ nodes: body.querySelectorAll('.mermaid') });
        } catch (err) {
          console.warn('[principles] Mermaid 渲染失败', err);
        }
      }

      function renderMath(root){
        if (!window.ensureMathJax) return;
        window.ensureMathJax().then(function(MathJax){
          if (!MathJax || !MathJax.typesetPromise) return;
          if (MathJax.typesetClear) MathJax.typesetClear([root]);
          return MathJax.typesetPromise([root]);
        }).catch(function(err){
          console.warn('[principles] 公式渲染失败', err);
        });
      }

      function setActiveUi(anchor){
        phaseTabs.querySelectorAll('[data-phase]').forEach(function(btn){
          btn.classList.toggle('active', btn.dataset.phase === state.activePhase);
        });
        toc.querySelectorAll('[data-phase-switch]').forEach(function(btn){
          btn.classList.toggle('active', btn.dataset.phaseSwitch === state.activePhase);
        });
        toc.querySelectorAll('.toc-phase').forEach(function(section){
          section.classList.toggle('active', section.dataset.phase === state.activePhase);
        });
        toc.querySelectorAll('a[data-anchor]').forEach(function(a){
          a.classList.toggle('active', a.dataset.anchor === anchor);
        });
      }

      function activatePhase(phaseId, anchor, options){
        var phase = state.phases.find(function(item){ return item.id === phaseId; }) || state.phases[0];
        if (!phase) return;
        state.activePhase = phase.id;
        state.activeAnchor = anchor || phase.id;
        renderMarkdown(phase.markdown);
        setActiveUi(anchor || phase.id);
        if (options && options.updateHash) {
          history.replaceState(null, '', '#' + encodeURIComponent(anchor || phase.id));
        }
        if (anchor) {
          setTimeout(function(){
            var target = document.getElementById(anchor);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            setActiveUi(anchor);
          }, 100);
        } else {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      }

      function openHash(){
        var anchor = decodeURIComponent((location.hash || '').replace(/^#/, ''));
        var phaseId = phaseForAnchor(anchor) || state.activePhase || (state.phases[0] && state.phases[0].id);
        activatePhase(phaseId, anchor || phaseId);
      }

      function applySearch(){
        var q = search.value.toLowerCase().trim();
        toc.querySelectorAll('.toc-phase').forEach(function(phaseNode){
          var phaseHit = phaseNode.textContent.toLowerCase().indexOf(q) >= 0;
          phaseNode.querySelectorAll('.toc-topic').forEach(function(topicNode){
            var topicHit = topicNode.textContent.toLowerCase().indexOf(q) >= 0;
            topicNode.classList.toggle('hidden', q && !topicHit);
            topicNode.querySelectorAll('a').forEach(function(a){
              a.classList.toggle('hidden', q && a.textContent.toLowerCase().indexOf(q) < 0 && !topicHit);
            });
          });
          phaseNode.classList.toggle('hidden', q && !phaseHit);
        });
      }

      phaseTabs.addEventListener('click', function(ev){
        var btn = ev.target.closest('[data-phase]');
        if (!btn) return;
        activatePhase(btn.dataset.phase, btn.dataset.phase, { updateHash: true });
      });

      toc.addEventListener('click', function(ev){
        var switcher = ev.target.closest('[data-phase-switch]');
        if (switcher) {
          activatePhase(switcher.dataset.phaseSwitch, switcher.dataset.phaseSwitch, { updateHash: true });
          return;
        }
        var link = ev.target.closest('a[data-anchor]');
        if (!link) return;
        ev.preventDefault();
        activatePhase(link.dataset.phase, link.dataset.anchor, { updateHash: true });
      });

      search.addEventListener('input', applySearch);
      window.addEventListener('hashchange', openHash);

      fetch('/api/docs/algorithm-principles', { cache: 'no-cache' })
        .then(function(resp){
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          return resp.text();
        })
        .then(function(md){
          state.phases = parseDocument(md);
          if (!state.phases.length) throw new Error('文档缺少阶段标题');
          var total = state.phases.reduce(function(sum, phase){ return sum + phase.count; }, 0);
          chapterCount.textContent = total;
          renderTabs();
          renderToc();
          empty.style.display = 'none';
          loadState.textContent = '文档已加载';
          openHash();
        })
        .catch(function(err){
          empty.textContent = '文档加载失败：' + err.message;
          loadState.textContent = '加载失败';
        });
    })();
  </script>
</body>
</html>
