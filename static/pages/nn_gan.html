<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAN - CV 通识教育</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <link rel="stylesheet" href="../css/model-demo-page.css">
  <script src="../js/theme-sync.js"></script>
  <script src="../js/page-utils.js"></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow">生成模型 / 对抗训练</div>
      <h1 id="pageTitle">GAN</h1>
      <p class="subtitle" id="subtitle"></p>
      <p class="intro" id="introText"></p>
      <div class="problem-statement" id="problemStatement"></div>
      <span class="status" id="statusPill"></span>
    </div>
    <aside class="panel controls">
      <h2>运行真实后端</h2>
      <div class="control-row">
        <button id="sampleBtn" type="button">重置示例</button>
        <button id="runBtn" class="primary" type="button">训练 toy GAN</button>
      </div>
      <div class="file-line" id="fileName">GAN 使用内置二维数据分布</div>
      <div id="paramsPanel" class="params"></div>
    </aside>
  </section>
  <section class="info-grid">
    <div class="panel"><h2>算法流程</h2><ul id="pipelineList"></ul></div>
    <div class="panel"><h2>应用场景</h2><ul id="applicationsList"></ul></div>
    <div class="panel"><h2>局限说明</h2><ul id="limitationsList"></ul></div>
  </section>
  <div id="loading" class="loading" hidden>后端正在进行 NumPy GAN 对抗训练...</div>
  <div id="errorBox" class="error" hidden></div>
  <section id="metricsGrid" class="metrics"></section>
  <section class="panel"><h2>后端步骤证据</h2><div id="stepsGrid" class="steps"></div></section>
</main>
<script>
window.ModelDemoConfig = {
  moduleId: 'gan',
  title: 'GAN',
  subtitle: '从随机数出发，学习造出“像训练数据”的新样本。',
  intro: 'GAN 适合解释头像生成、风格合成、数据增强背后的核心问题：机器并不是复制某一张图，而是在学习一类数据大概长什么样。本页后端会真实训练一个小型 NumPy GAN，用二维点云直观看到生成分布如何靠近真实分布。',
  problemStatement: 'GAN 解决的是“如何造出新的、但看起来属于同一类的数据”的问题。生成器负责造样本，判别器负责挑错，二者互相推动。',
  status: '真实本地训练机制',
  params: [{ name: 'iterations', label: '训练迭代', type: 'range', min: 80, max: 400, step: 20, value: 260 }],
  pipeline: ['先展示真实数据分布', '生成器从随机噪声造样本', '判别器判断样本像不像真的', '两边根据输赢调整参数', '播放训练中的分布变化', '检查最终是否覆盖真实模式'],
  applications: ['生成式 AI 入门', '理解头像/纹理/风格生成', '解释模式坍塌为什么会发生', '连接 StyleGAN 等高质量生成模型'],
  limitations: ['这是 toy GAN，不是高清图像生成器', 'GAN 训练可能震荡', '真实图像 GAN 需要大量数据和训练资源']
};
</script>
<script src="../js/interactive-teaching-stage.js"></script>
<script src="../js/model-demo-page.js"></script>
</body>
</html>
