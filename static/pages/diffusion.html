<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扩散模型 - CV 通识教育</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <link rel="stylesheet" href="../css/model-demo-page.css">
  <script src="../js/theme-sync.js"></script>
  <script src="../js/page-utils.js"></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow">去噪生成</div>
      <h1 id="pageTitle">扩散模型</h1>
      <p class="subtitle" id="subtitle"></p>
      <p class="intro" id="introText"></p>
      <span class="status" id="statusPill"></span>
    </div>
    <aside class="panel controls">
      <h2>运行真实后端</h2>
      <input id="fileInput" type="file" accept="image/*" hidden>
      <div class="control-row">
        <button id="chooseBtn">选择图片</button>
        <button id="sampleBtn">使用样例</button>
        <button id="runBtn" class="primary">运行扩散过程</button>
      </div>
      <div class="file-line" id="fileName">未选择文件，将使用内置样例</div>
      <div id="paramsPanel" class="params"></div>
    </aside>
  </section>
  <section class="info-grid">
    <div class="panel"><h2>算法流程</h2><ul id="pipelineList"></ul></div>
    <div class="panel"><h2>应用场景</h2><ul id="applicationsList"></ul></div>
    <div class="panel"><h2>局限性</h2><ul id="limitationsList"></ul></div>
  </section>
  <div id="loading" class="loading" hidden>后端正在计算 DDPM 前向加噪和反向还原公式...</div>
  <div id="errorBox" class="error" hidden></div>
  <section id="metricsGrid" class="metrics"></section>
  <section class="panel"><h2>真实中间步骤</h2><div id="stepsGrid" class="steps"></div></section>
</main>
<script>
window.ModelDemoConfig = {
  moduleId: 'diffusion',
  title: '扩散模型',
  subtitle: '先把图像逐步加噪，再学习如何一步步去噪还原。',
  intro: '本页展示真实 DDPM 数学机制：后端计算噪声日程、前向加噪、噪声项、oracle 反向还原和误差图。',
  status: '真实本地机制实现',
  params: [{ name: 'num_steps', label: '时间步数', type: 'range', min: 8, max: 80, step: 4, value: 40 }],
  pipeline: ['输入图像 x0', '采样高斯噪声 epsilon', '按 alpha_bar 日程逐步加噪', '得到接近纯噪声的 x_t', '用噪声预测公式还原 x0_hat', '观察时间轴和误差图'],
  applications: ['理解 DDPM / Stable Diffusion 基础', '解释去噪生成', '图像恢复与生成模型科普', '比较 GAN 与扩散模型'],
  limitations: ['这里不是 Stable Diffusion 采样', 'oracle 还原使用已知噪声', '真实生成需要训练神经网络预测噪声']
};
</script>
<script src="../js/model-demo-page.js"></script>
</body>
</html>
