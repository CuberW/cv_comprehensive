<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实时卷积滤镜 - Cvtoolkits</title>
<link rel="stylesheet" href="../css/style.css">
<style>
    * { box-sizing: border-box; }
    
    .page { max-width: 980px; margin: 0 auto; padding: 20px 16px 32px; }
    .page h1 { font-size: 1.4rem; margin: 0 0 4px; }
    .subtitle { color: var(--muted); font-size: 0.92rem; margin: 0 0 18px; }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
    }
    .card h3 { margin: 0 0 10px; font-size: 0.95rem; text-align: center; }
    .canvas-shell {
        width: 100%;
        max-width: 100%;
        overflow: auto;
        border-radius: 8px;
        background: #1a1a2e;
    }
    canvas.display-canvas {
        width: 100%;
        border-radius: 8px;
        background: #1a1a2e;
        display: block;
        aspect-ratio: 4 / 3;
        object-fit: contain;
    }
    canvas.display-canvas.fit-size {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 420px;
        aspect-ratio: auto;
        object-fit: contain;
    }
    .canvas-shell {
        display: flex;
        justify-content: center;
        align-items: flex-start;
    }
    .upload-row { margin-top: 10px; }
    .upload-row .file-picker { border-radius: 8px; padding: 10px; }
    .mode-group { margin-top: 12px; }
    .mode-title { color: var(--muted); font-size: 0.84rem; margin-bottom: 6px; }
    .mode-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .mode-btn,
    .compare-btn {
        padding: 7px 12px;
        border-radius: 8px;
        border: 1px solid rgba(15,23,42,0.15);
        background: rgba(255,255,255,0.72);
        cursor: pointer;
        font-size: 0.82rem;
        transition: all 0.2s;
    }
    .mode-btn.active,
    .compare-btn.active { background: #0f766e; color: #fff; border-color: #0f766e; }
    .compare-group { margin-top: 12px; }
    .compare-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .compare-note {
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.76rem;
        line-height: 1.45;
    }
    .camera-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; justify-content: center; }
    .status-row { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.8rem; color: var(--muted); }
    .filter-panel { margin-top: 16px; }
    .filter-kernel-layout { display: grid; grid-template-columns: minmax(0, 1fr) 230px; gap: 18px; align-items: start; }
    .filter-panel h3 { margin: 0 0 10px; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .filter-btn {
        padding: 7px 13px;
        border-radius: 8px;
        border: 1px solid rgba(15,23,42,0.15);
        background: rgba(255,255,255,0.72);
        cursor: pointer;
        font-size: 0.82rem;
        transition: all 0.2s;
    }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .dilation-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .dilation-row label { font-size: 0.84rem; color: var(--muted); }
    .dilation-row input[type=range] { width: 120px; }
    .kernel-panel { border-left: 1px solid rgba(15,23,42,0.08); padding-left: 18px; }
    .kernel-name { color: var(--muted); font-size: 0.82rem; margin-bottom: 8px; }
    .kernel-matrix { display: grid; grid-template-columns: repeat(3, 44px); gap: 5px; }
    .kernel-cell {
        height: 34px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(15,23,42,0.12);
        border-radius: 6px;
        background: rgba(255,255,255,0.74);
        color: #172033;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 0.76rem;
        font-variant-numeric: tabular-nums;
    }
    .dilation-structure {
        display: none;
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid rgba(15,23,42,0.08);
    }
    .dilation-structure h4 {
        margin: 0 0 8px;
        color: #172033;
        font-size: 0.86rem;
    }
    .dilation-grid {
        display: grid;
        width: fit-content;
        gap: 5px;
        padding: 10px;
        border: 1px solid rgba(15,23,42,0.12);
        border-radius: 8px;
        background: #fff;
    }
    .dilation-dot {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        border: 1px solid #94a3b8;
        background: transparent;
    }
    .dilation-dot.active {
        border-color: #0f766e;
        background: #0f766e;
    }
    .dilation-note {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.76rem;
        line-height: 1.45;
    }
    .conv3d-panel { margin-top: 16px; padding: 0; overflow: hidden; }
    .conv3d-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px 10px;
        border-bottom: 1px solid rgba(15,23,42,0.08);
    }
    .conv3d-head h3 { margin: 0; text-align: left; }
    .conv3d-status { color: var(--muted); font-size: 0.82rem; text-align: right; }
    .conv3d-viewport {
        height: 430px;
        min-height: 320px;
        background: var(--app-gradient);
        position: relative;
    }
    .conv3d-viewport canvas { display: block; }
    .conv3d-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding: 10px 16px 14px;
        border-top: 1px solid rgba(15,23,42,0.08);
    }
    .conv3d-counter { color: var(--muted); font-size: 0.82rem; margin-left: auto; }
    @media (max-width: 768px) {
        .main-grid, .filter-kernel-layout { grid-template-columns: 1fr; }
        .kernel-panel { border-left: none; padding-left: 0; border-top: 1px solid rgba(15,23,42,0.08); padding-top: 12px; }
        .conv3d-head { align-items: flex-start; flex-direction: column; }
        .conv3d-status { text-align: left; }
        .conv3d-viewport { height: 360px; }
        .conv3d-counter { width: 100%; margin-left: 0; }
    }
</style>
<link rel="stylesheet" href="../css/iframe-theme.css">
<script src="../js/theme-sync.js"></script>

</head>
<body>
<main class="page">
    <h1>实时卷积滤镜</h1>
    <p class="subtitle">真实 RGB 图片或摄像头画面实时经过不同卷积核处理；下方 3D 区展示多通道卷积在彩色图像上的应用过程。</p>

    <div class="main-grid">
        <div class="card">
            <h3>原始画面</h3>
            <div class="canvas-shell">
                <canvas class="display-canvas" id="originalCanvas" width="320" height="240"></canvas>
            </div>
            <div class="upload-row">
                <input class="file-input" id="imageUpload" type="file" accept="image/*">
                <label class="file-picker" for="imageUpload">
                    <span class="file-picker-btn">选择文件</span>
                    <span class="file-picker-name" id="uploadFileName">未选择文件</span>
                </label>
            </div>
            <div class="camera-controls">
                <button class="btn btn-primary" id="cameraToggle">开启摄像头</button>
                <button class="btn btn-secondary" id="screenshotBtn">截图保存</button>
                <button class="btn btn-secondary" id="clearImageBtn" type="button">清除图片</button>
            </div>
            <div class="status-row"><span id="cameraStatus">摄像头未开启</span><span id="fpsCounter"></span></div>
        </div>
        <div class="card">
            <h3>处理结果 - <span id="filterName">原图</span></h3>
            <div class="canvas-shell">
                <canvas class="display-canvas" id="processedCanvas" width="320" height="240"></canvas>
            </div>
        </div>
    </div>

    <div class="card filter-panel">
        <div class="filter-kernel-layout">
            <div>
                <h3>滤镜选择</h3>
                <div class="filter-row" id="filterRow">
                    <button class="filter-btn active" data-filter="identity">原图</button>
                    <button class="filter-btn" data-filter="edge_detect">边缘检测</button>
                    <button class="filter-btn" data-filter="sharpen">锐化</button>
                    <button class="filter-btn" data-filter="blur">高斯模糊</button>
                    <button class="filter-btn" data-filter="emboss">浮雕</button>
                    <button class="filter-btn" data-filter="laplacian">拉普拉斯</button>
                    <button class="filter-btn" data-filter="dilated">空洞卷积</button>
                </div>
                <div class="dilation-row" id="dilationRow" style="display:none;">
                    <label>膨胀率 <span id="dilationLabel">2</span></label>
                    <input type="range" id="dilationRate" min="2" max="4" value="2" step="1">
                </div>
                <div class="mode-group">
                    <div class="mode-title">处理方式</div>
                    <div class="mode-row" id="modeRow">
                        <button class="mode-btn active" data-mode="grayscale">灰度响应</button>
                        <button class="mode-btn" data-mode="color">彩色通道卷积</button>
                        <button class="mode-btn" data-mode="overlay">边缘叠加</button>
                    </div>
                </div>
                <div class="compare-group">
                    <div class="mode-title">3D 多卷积核对比</div>
                    <div class="compare-row" id="compareKernelRow">
                        <button class="compare-btn" data-filter="identity" type="button">原图</button>
                        <button class="compare-btn active" data-filter="edge_detect" type="button">边缘检测</button>
                        <button class="compare-btn active" data-filter="sharpen" type="button">锐化</button>
                        <button class="compare-btn active" data-filter="blur" type="button">高斯模糊</button>
                        <button class="compare-btn" data-filter="emboss" type="button">浮雕</button>
                        <button class="compare-btn" data-filter="laplacian" type="button">拉普拉斯</button>
                        <button class="compare-btn" data-filter="dilated" type="button">空洞卷积</button>
                    </div>
                    <div class="compare-note">勾选多个预设核后，3D 右侧会并排展示多个输出平面，最多同时显示 4 个；上方处理结果仍由“滤镜选择”决定。</div>
                </div>
            </div>
            <div class="kernel-panel">
                <h3>卷积核</h3>
                <div class="kernel-name" id="kernelName">原图 / Identity</div>
                <div class="kernel-matrix" id="kernelMatrix"></div>
                <div class="dilation-structure" id="dilationStructure">
                    <h4>空洞结构</h4>
                    <div class="dilation-grid" id="dilationGrid"></div>
                    <div class="dilation-note" id="dilationNote">实心点参与采样，空心点为空洞。</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card conv3d-panel">
        <div class="conv3d-head">
            <h3>真实 RGB 图片多通道卷积 3D 可视化</h3>
            <div class="conv3d-status" id="conv3dStatus">上传图片或开启摄像头后生成真实图像 3D 快照</div>
        </div>
        <div class="conv3d-viewport" id="conv3dViewport"></div>
        <div class="conv3d-toolbar">
            <button class="btn btn-secondary" id="conv3dPlayBtn" type="button">播放</button>
            <button class="btn btn-secondary" id="conv3dStepBtn" type="button">单步</button>
            <button class="btn btn-secondary" id="conv3dResetBtn" type="button">重置</button>
            <button class="btn btn-secondary" id="conv3dSnapshotBtn" type="button">生成当前帧快照</button>
            <span class="conv3d-counter" id="conv3dCounter">0 / 0</span>
        </div>
    </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
    var video = document.createElement('video');
    video.setAttribute('playsinline', '');
    video.setAttribute('autoplay', '');

    var originalCanvas = document.getElementById('originalCanvas');
    var processedCanvas = document.getElementById('processedCanvas');
    var origCtx = originalCanvas.getContext('2d');
    var procCtx = processedCanvas.getContext('2d');
    var imageUpload = document.getElementById('imageUpload');
    var uploadFileName = document.getElementById('uploadFileName');
    var cameraStatus = document.getElementById('cameraStatus');
    var fpsCounter = document.getElementById('fpsCounter');
    var conv3dViewport = document.getElementById('conv3dViewport');
    var conv3dStatus = document.getElementById('conv3dStatus');
    var conv3dCounter = document.getElementById('conv3dCounter');
    var conv3dPlayBtn = document.getElementById('conv3dPlayBtn');
    var conv3dStepBtn = document.getElementById('conv3dStepBtn');
    var conv3dResetBtn = document.getElementById('conv3dResetBtn');
    var conv3dSnapshotBtn = document.getElementById('conv3dSnapshotBtn');
    var compareKernelRow = document.getElementById('compareKernelRow');

    var currentFilter = 'identity';
    var currentDilation = 2;
    var currentProcessingMode = 'grayscale';
    var conv3dCompareFilters = ['edge_detect', 'sharpen', 'blur'];
    var sourceMode = 'camera';
    var uploadedImage = null;
    var uploadedImageName = '';
    var uploadRequestId = 0;
    var DEFAULT_CANVAS_WIDTH = 320;
    var DEFAULT_CANVAS_HEIGHT = 240;
    var stream = null;
    var processing = false;
    var fpsFrames = 0;
    var fpsTime = performance.now();
    var conv3d = {
        ready: false,
        playing: false,
        step: 0,
        total: 0,
        width: 0,
        height: 0,
        source: null,
        outputs: [],
        compareFilters: [],
        renderer: null,
        scene: null,
        camera: null,
        controls: null,
        world: null,
        frameGroup: null,
        animationTime: performance.now(),
        planeW: 4.8,
        planeH: 3.6
    };
    var CONV3D_OUTPUT_COLORS = [0xf59e0b, 0x10b981, 0x8b5cf6, 0xef4444, 0x06b6d4, 0xf97316, 0x64748b];

    var KERNELS = {
        identity: [[0,0,0],[0,1,0],[0,0,0]],
        edge_detect: [[-1,-1,-1],[-1,8,-1],[-1,-1,-1]],
        sharpen: [[0,-1,0],[-1,5,-1],[0,-1,0]],
        blur: [[1/16,2/16,1/16],[2/16,4/16,2/16],[1/16,2/16,1/16]],
        emboss: [[-2,-1,0],[-1,1,1],[0,1,2]],
        laplacian: [[0,1,0],[1,-4,1],[0,1,0]],
        dilated: [[-1,-1,-1],[-1,8,-1],[-1,-1,-1]]
    };
    var FILTER_NAMES = {
        identity: '原图 / Identity',
        edge_detect: '边缘检测 / Edge Detect',
        sharpen: '锐化 / Sharpen',
        blur: '高斯模糊 / Gaussian Blur',
        emboss: '浮雕 / Emboss',
        laplacian: '拉普拉斯 / Laplacian',
        dilated: '空洞卷积 / Dilated Edge'
    };
    var FILTER_SHORT_NAMES = {
        identity: '原图',
        edge_detect: '边缘检测',
        sharpen: '锐化',
        blur: '高斯模糊',
        emboss: '浮雕',
        laplacian: '拉普拉斯',
        dilated: '空洞卷积'
    };

    function formatKernelValue(v) {
        if (Math.abs(v) < 0.001) return '0';
        if (Math.abs(v - Math.round(v)) < 0.001) return String(Math.round(v));
        return v.toFixed(3).replace(/0+$/, '').replace(/\.$/, '');
    }

    function renderKernel() {
        var kernel = KERNELS[currentFilter] || KERNELS.identity;
        document.getElementById('kernelName').textContent = FILTER_NAMES[currentFilter] || currentFilter;
        var matrix = document.getElementById('kernelMatrix');
        matrix.innerHTML = '';
        kernel.forEach(function(row) {
            row.forEach(function(v) {
                var cell = document.createElement('div');
                cell.className = 'kernel-cell';
                cell.textContent = formatKernelValue(v);
                matrix.appendChild(cell);
            });
        });
        renderDilationStructure();
    }

    function renderDilationStructure() {
        var wrap = document.getElementById('dilationStructure');
        var grid = document.getElementById('dilationGrid');
        var note = document.getElementById('dilationNote');
        if (!wrap || !grid) return;
        if (currentFilter !== 'dilated' && getSelectedCompareFilters().indexOf('dilated') === -1) {
            wrap.style.display = 'none';
            grid.innerHTML = '';
            return;
        }
        var size = (3 - 1) * currentDilation + 1;
        wrap.style.display = 'block';
        grid.style.gridTemplateColumns = 'repeat(' + size + ', 13px)';
        grid.innerHTML = '';
        for (var y = 0; y < size; y++) {
            for (var x = 0; x < size; x++) {
                var dot = document.createElement('span');
                var active = y % currentDilation === 0 && x % currentDilation === 0;
                dot.className = 'dilation-dot' + (active ? ' active' : '');
                dot.title = active ? '参与采样' : '空洞';
                grid.appendChild(dot);
            }
        }
        if (note) {
            note.textContent = '膨胀率 ' + currentDilation + '：3×3 核展开为 ' + size + '×' + size + ' 感受野。';
        }
    }

    function updateDilationVisibility() {
        var row = document.getElementById('dilationRow');
        if (!row) return;
        row.style.display = (currentFilter === 'dilated' || getSelectedCompareFilters().indexOf('dilated') !== -1) ? '' : 'none';
    }

    function clampByte(v) {
        return Math.max(0, Math.min(255, v));
    }

    function buildGray(src, w, h) {
        var gray = new Float32Array(w * h);
        for (var i = 0; i < w * h; i++) {
            gray[i] = src[i * 4] * 0.299 + src[i * 4 + 1] * 0.587 + src[i * 4 + 2] * 0.114;
        }
        return gray;
    }

    function getSampleCoord(x, y, kx, ky, half, dilation, filter) {
        var activeFilter = filter || currentFilter;
        var isDilated = dilation && dilation > 1 && activeFilter === 'dilated';
        return {
            x: isDilated ? x + (kx - half) * dilation : x + kx - half,
            y: isDilated ? y + (ky - half) * dilation : y + ky - half
        };
    }

    function applyGrayConvolution(src, w, h, kernel, dilation, filter) {
        var output = new Uint8ClampedArray(src.length);
        var gray = buildGray(src, w, h);
        var kSize = kernel.length;
        var half = Math.floor(kSize / 2);

        for (var y = 0; y < h; y++) {
            for (var x = 0; x < w; x++) {
                var sum = 0;
                for (var ky = 0; ky < kSize; ky++) {
                    for (var kx = 0; kx < kSize; kx++) {
                        var sample = getSampleCoord(x, y, kx, ky, half, dilation, filter);
                        var val = (sample.y >= 0 && sample.y < h && sample.x >= 0 && sample.x < w)
                            ? gray[sample.y * w + sample.x]
                            : 0;
                        sum += val * kernel[ky][kx];
                    }
                }
                var out = clampByte(sum);
                var idx = (y * w + x) * 4;
                output[idx] = out;
                output[idx + 1] = out;
                output[idx + 2] = out;
                output[idx + 3] = 255;
            }
        }
        return output;
    }

    function applyColorConvolution(src, w, h, kernel, dilation, filter) {
        var output = new Uint8ClampedArray(src.length);
        var kSize = kernel.length;
        var half = Math.floor(kSize / 2);

        for (var y = 0; y < h; y++) {
            for (var x = 0; x < w; x++) {
                var sums = [0, 0, 0];
                for (var ky = 0; ky < kSize; ky++) {
                    for (var kx = 0; kx < kSize; kx++) {
                        var sample = getSampleCoord(x, y, kx, ky, half, dilation, filter);
                        if (sample.y < 0 || sample.y >= h || sample.x < 0 || sample.x >= w) continue;
                        var sampleIdx = (sample.y * w + sample.x) * 4;
                        var weight = kernel[ky][kx];
                        sums[0] += src[sampleIdx] * weight;
                        sums[1] += src[sampleIdx + 1] * weight;
                        sums[2] += src[sampleIdx + 2] * weight;
                    }
                }
                var idx = (y * w + x) * 4;
                output[idx] = clampByte(sums[0]);
                output[idx + 1] = clampByte(sums[1]);
                output[idx + 2] = clampByte(sums[2]);
                output[idx + 3] = 255;
            }
        }
        return output;
    }

    function applyOverlayConvolution(src, w, h, kernel, dilation, filter) {
        var output = new Uint8ClampedArray(src);
        var gray = buildGray(src, w, h);
        var kSize = kernel.length;
        var half = Math.floor(kSize / 2);
        var threshold = 36;

        for (var y = 0; y < h; y++) {
            for (var x = 0; x < w; x++) {
                var sum = 0;
                for (var ky = 0; ky < kSize; ky++) {
                    for (var kx = 0; kx < kSize; kx++) {
                        var sample = getSampleCoord(x, y, kx, ky, half, dilation, filter);
                        var val = (sample.y >= 0 && sample.y < h && sample.x >= 0 && sample.x < w)
                            ? gray[sample.y * w + sample.x]
                            : 0;
                        sum += val * kernel[ky][kx];
                    }
                }
                var response = Math.min(255, Math.abs(sum));
                if (response <= threshold) continue;
                var alpha = Math.min(0.82, (response - threshold) / (255 - threshold));
                var idx = (y * w + x) * 4;
                output[idx] = src[idx] * (1 - alpha) + 255 * alpha;
                output[idx + 1] = src[idx + 1] * (1 - alpha) + 180 * alpha;
                output[idx + 2] = src[idx + 2] * (1 - alpha) + 30 * alpha;
                output[idx + 3] = 255;
            }
        }
        return output;
    }

    function applyConvolutionForMode(imageData, kernel, dilation, mode, filter) {
        var src = imageData.data;
        var w = imageData.width;
        var h = imageData.height;
        if (filter === 'identity') {
            return new ImageData(new Uint8ClampedArray(src), w, h);
        }
        if (mode === 'color') {
            return new ImageData(applyColorConvolution(src, w, h, kernel, dilation, filter), w, h);
        }
        if (mode === 'overlay') {
            return new ImageData(applyOverlayConvolution(src, w, h, kernel, dilation, filter), w, h);
        }
        return new ImageData(applyGrayConvolution(src, w, h, kernel, dilation, filter), w, h);
    }

    function applyConvolution(imageData, kernel, dilation) {
        return applyConvolutionForMode(imageData, kernel, dilation, currentProcessingMode, currentFilter);
    }

    function processFrame() {
        if (!processing || !stream) return;
        if (video.readyState >= 2) {
            sourceMode = 'camera';
            origCtx.drawImage(video, 0, 0, originalCanvas.width, originalCanvas.height);
            var imageData = origCtx.getImageData(0, 0, originalCanvas.width, originalCanvas.height);
            var result = applyConvolution(imageData, KERNELS[currentFilter], currentDilation);
            procCtx.putImageData(result, 0, 0);

            fpsFrames++;
            var now = performance.now();
            if (now - fpsTime >= 1000) {
                fpsCounter.textContent = 'FPS: ' + fpsFrames;
                fpsFrames = 0;
                fpsTime = now;
            }
        }
        requestAnimationFrame(processFrame);
    }

    function setCanvasDimensions(width, height) {
        originalCanvas.width = width;
        originalCanvas.height = height;
        processedCanvas.width = width;
        processedCanvas.height = height;
    }

    function setCanvasDisplayMode(isNativeSize) {
        originalCanvas.classList.toggle('fit-size', isNativeSize);
        processedCanvas.classList.toggle('fit-size', isNativeSize);
    }

    function resetCanvasToCameraSize() {
        setCanvasDimensions(DEFAULT_CANVAS_WIDTH, DEFAULT_CANVAS_HEIGHT);
        setCanvasDisplayMode(false);
    }

    function activateImageCanvasSize(width, height) {
        setCanvasDimensions(width, height);
        setCanvasDisplayMode(true);
    }

    function processUploadedImage() {
        if (!uploadedImage) return;
        sourceMode = 'image';
        var imageWidth = uploadedImage.naturalWidth || uploadedImage.width;
        var imageHeight = uploadedImage.naturalHeight || uploadedImage.height;
        if (!imageWidth || !imageHeight) return;
        activateImageCanvasSize(imageWidth, imageHeight);
        clearCanvas(originalCanvas);
        clearCanvas(processedCanvas);
        origCtx.drawImage(uploadedImage, 0, 0, imageWidth, imageHeight);
        var imageData = origCtx.getImageData(0, 0, originalCanvas.width, originalCanvas.height);
        var result = applyConvolution(imageData, KERNELS[currentFilter], currentDilation);
        procCtx.putImageData(result, 0, 0);
        refreshConv3DFromCanvas(originalCanvas);
        cameraStatus.textContent = '上传图片模式（原尺寸）';
        fpsCounter.textContent = imageWidth + ' × ' + imageHeight;
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function disposeObject(obj) {
        obj.traverse(function(child) {
            if (child.geometry) child.geometry.dispose();
            if (child.material) {
                var materials = Array.isArray(child.material) ? child.material : [child.material];
                materials.forEach(function(mat) {
                    if (mat.map) mat.map.dispose();
                    mat.dispose();
                });
            }
        });
    }

    function clearConv3DWorld() {
        if (!conv3d.world) return;
        while (conv3d.world.children.length) {
            var child = conv3d.world.children[0];
            conv3d.world.remove(child);
            disposeObject(child);
        }
        conv3d.frameGroup = null;
    }

    function setConv3DStatus(text) {
        if (conv3dStatus) conv3dStatus.textContent = text;
    }

    function updateConv3DCounter() {
        if (!conv3dCounter) return;
        conv3dCounter.textContent = conv3d.total ? (conv3d.step + 1) + ' / ' + conv3d.total : '0 / 0';
    }

    function addTextLabel(parent, text, x, y, z) {
        if (!window.THREE) return;
        var canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 104;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(255,255,255,0.94)';
        roundRect(ctx, 8, 8, canvas.width - 16, canvas.height - 16, 18);
        ctx.fill();
        ctx.strokeStyle = 'rgba(15,23,42,0.16)';
        ctx.lineWidth = 2;
        roundRect(ctx, 8, 8, canvas.width - 16, canvas.height - 16, 18);
        ctx.stroke();
        ctx.fillStyle = '#172033';
        ctx.font = '700 36px ui-sans-serif, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);

        var tex = new THREE.CanvasTexture(canvas);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.generateMipmaps = false;
        var sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
        sprite.scale.set(1.9, 0.39, 1);
        sprite.position.set(x, y, z);
        parent.add(sprite);
    }

    function makeChannelTexture(source, channelIndex) {
        var canvas = document.createElement('canvas');
        canvas.width = source.width;
        canvas.height = source.height;
        var ctx = canvas.getContext('2d');
        var image = ctx.createImageData(source.width, source.height);
        for (var y = 0; y < source.height; y++) {
            for (var x = 0; x < source.width; x++) {
                var idx = (y * source.width + x) * 4;
                image.data[idx] = channelIndex === 0 ? source.data[idx] : 0;
                image.data[idx + 1] = channelIndex === 1 ? source.data[idx + 1] : 0;
                image.data[idx + 2] = channelIndex === 2 ? source.data[idx + 2] : 0;
                image.data[idx + 3] = 255;
            }
        }
        ctx.putImageData(image, 0, 0);
        var tex = new THREE.CanvasTexture(canvas);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.generateMipmaps = false;
        return tex;
    }

    function makeOriginalTexture(source) {
        var canvas = document.createElement('canvas');
        canvas.width = source.width;
        canvas.height = source.height;
        var ctx = canvas.getContext('2d');
        var image = ctx.createImageData(source.width, source.height);
        image.data.set(source.data);
        ctx.putImageData(image, 0, 0);
        var tex = new THREE.CanvasTexture(canvas);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.generateMipmaps = false;
        return tex;
    }

    function makeOutputTexture(output, width, height) {
        var canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        var ctx = canvas.getContext('2d');
        var image = ctx.createImageData(width, height);
        image.data.set(output);
        ctx.putImageData(image, 0, 0);
        var tex = new THREE.CanvasTexture(canvas);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.generateMipmaps = false;
        return tex;
    }

    function addPlane(parent, texture, x, y, z, opacity, label) {
        var geo = new THREE.PlaneGeometry(conv3d.planeW, conv3d.planeH);
        var mat = new THREE.MeshBasicMaterial({
            map: texture,
            transparent: true,
            opacity: opacity,
            side: THREE.DoubleSide
        });
        var mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, y, z);
        parent.add(mesh);
        var frame = new THREE.LineSegments(
            new THREE.EdgesGeometry(new THREE.BoxGeometry(conv3d.planeW, conv3d.planeH, 0.04)),
            new THREE.LineBasicMaterial({ color: 0x334155, transparent: true, opacity: 0.62 })
        );
        frame.position.copy(mesh.position);
        parent.add(frame);
        addTextLabel(parent, label, x, y + conv3d.planeH / 2 + 0.36, z);
        return mesh;
    }

    function makeRectLine(color) {
        var geo = new THREE.BufferGeometry();
        var mat = new THREE.LineBasicMaterial({ color: color, linewidth: 2 });
        return new THREE.LineLoop(geo, mat);
    }

    function makeHighlightPlane(color) {
        var geo = new THREE.PlaneGeometry(1, 1);
        var mat = new THREE.MeshBasicMaterial({
            color: color,
            transparent: true,
            opacity: 0.22,
            side: THREE.DoubleSide,
            depthTest: false
        });
        return new THREE.Mesh(geo, mat);
    }

    function makeConnector(color) {
        var geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        var mat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.74 });
        return new THREE.Line(geo, mat);
    }

    function updateRectLine(line, center, width, height) {
        var z = center.z;
        var hw = width / 2;
        var hh = height / 2;
        var points = [
            new THREE.Vector3(center.x - hw, center.y - hh, z),
            new THREE.Vector3(center.x + hw, center.y - hh, z),
            new THREE.Vector3(center.x + hw, center.y + hh, z),
            new THREE.Vector3(center.x - hw, center.y + hh, z)
        ];
        line.geometry.setFromPoints(points);
    }

    function updateHighlightPlane(mesh, center, width, height) {
        mesh.position.copy(center);
        mesh.scale.set(width, height, 1);
    }

    function updateConnector(line, from, to) {
        line.geometry.setFromPoints([from, to]);
    }

    function getConv3DStepIncrement() {
        if (!conv3d.width || !conv3d.height) return 1;
        return Math.max(1, Math.floor(Math.max(conv3d.width, conv3d.height) / 80));
    }

    function advanceConv3DStep() {
        if (!conv3d.total) return;
        conv3d.step = (conv3d.step + getConv3DStepIncrement()) % conv3d.total;
        updateConv3DStep();
    }

    function getConv3DInputPlanes() {
        return [
            { x: -3.35, y: 1.35, z: -2.1 },
            { x: -3.35, y: 0.45, z: -0.7 },
            { x: -3.35, y: -0.45, z: 0.7 },
            { x: -3.35, y: -1.35, z: 2.1 }
        ];
    }

    function getSelectedCompareFilters() {
        var seen = {};
        var selected = [];
        conv3dCompareFilters.forEach(function(filter) {
            if (KERNELS[filter] && !seen[filter]) {
                seen[filter] = true;
                selected.push(filter);
            }
        });
        if (!selected.length) selected.push(currentFilter);
        return selected.slice(0, 4);
    }

    function renderCompareKernelButtons() {
        if (!compareKernelRow) return;
        var selected = getSelectedCompareFilters();
        compareKernelRow.querySelectorAll('.compare-btn').forEach(function(btn) {
            var active = selected.indexOf(btn.dataset.filter) !== -1;
            btn.classList.toggle('active', active);
            btn.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
    }

    function getConv3DOutputPlanes() {
        var filters = conv3d.compareFilters && conv3d.compareFilters.length ? conv3d.compareFilters : getSelectedCompareFilters();
        var total = filters.length || 1;
        var planes = [];
        for (var i = 0; i < total; i++) {
            planes.push({
                x: 3.55 + i * 0.08,
                y: 0.95 - i * 0.72,
                z: (i - (total - 1) / 2) * 0.9
            });
        }
        return planes;
    }

    function sampleCanvasFor3D(canvas) {
        var ctx = canvas.getContext('2d', { willReadFrequently: true });
        var image = ctx.getImageData(0, 0, canvas.width, canvas.height);
        return { width: canvas.width, height: canvas.height, data: new Uint8ClampedArray(image.data) };
    }

    function isConv3DResponseFilter(filter) {
        return filter === 'edge_detect' || filter === 'laplacian' || filter === 'dilated' || filter === 'emboss';
    }

    function getProcessingModeLabel() {
        var map = {
            grayscale: '灰度响应',
            color: '彩色通道卷积',
            overlay: '边缘叠加'
        };
        return map[currentProcessingMode] || currentProcessingMode;
    }

    function computeConv3DOutput(source, filter) {
        var kernel = KERNELS[filter] || KERNELS.identity;
        var w = source.width;
        var h = source.height;
        var src = source.data;
        var out = new Uint8ClampedArray(w * h * 4);
        var kSize = kernel.length;
        var half = Math.floor(kSize / 2);
        var responseMode = isConv3DResponseFilter(filter);

        if (filter === 'identity') {
            return new Uint8ClampedArray(src);
        }

        if (currentProcessingMode === 'overlay') {
            return applyOverlayConvolution(src, w, h, kernel, currentDilation, filter);
        }

        if (currentProcessingMode === 'grayscale') {
            var gray = buildGray(src, w, h);
            var values = new Float32Array(w * h);
            var maxGray = 0;
            for (var gy = 0; gy < h; gy++) {
                for (var gx = 0; gx < w; gx++) {
                    var sum = 0;
                    for (var gky = 0; gky < kSize; gky++) {
                        for (var gkx = 0; gkx < kSize; gkx++) {
                            var gSample = getSampleCoord(gx, gy, gkx, gky, half, currentDilation, filter);
                            var val = (gSample.y >= 0 && gSample.y < h && gSample.x >= 0 && gSample.x < w)
                                ? gray[gSample.y * w + gSample.x]
                                : 0;
                            sum += val * kernel[gky][gkx];
                        }
                    }
                    var gv = responseMode ? Math.abs(sum) : sum;
                    values[gy * w + gx] = gv;
                    if (responseMode) maxGray = Math.max(maxGray, gv);
                }
            }
            var grayScale = responseMode && maxGray > 0 ? 255 / maxGray : 1;
            for (var gi = 0; gi < w * h; gi++) {
                var outGray = clampByte(values[gi] * grayScale);
                var gIdx = gi * 4;
                out[gIdx] = outGray;
                out[gIdx + 1] = outGray;
                out[gIdx + 2] = outGray;
                out[gIdx + 3] = 255;
            }
            return out;
        }

        var valuesRgb = new Float32Array(w * h * 3);
        var maxRgb = 0;
        for (var y = 0; y < h; y++) {
            for (var x = 0; x < w; x++) {
                var sums = [0, 0, 0];
                for (var ky = 0; ky < kSize; ky++) {
                    for (var kx = 0; kx < kSize; kx++) {
                        var sample = getSampleCoord(x, y, kx, ky, half, currentDilation, filter);
                        if (sample.y < 0 || sample.y >= h || sample.x < 0 || sample.x >= w) continue;
                        var sampleIdx = (sample.y * w + sample.x) * 4;
                        var weight = kernel[ky][kx];
                        sums[0] += src[sampleIdx] * weight;
                        sums[1] += src[sampleIdx + 1] * weight;
                        sums[2] += src[sampleIdx + 2] * weight;
                    }
                }
                var v0 = responseMode ? Math.abs(sums[0]) : sums[0];
                var v1 = responseMode ? Math.abs(sums[1]) : sums[1];
                var v2 = responseMode ? Math.abs(sums[2]) : sums[2];
                var valueIdx = (y * w + x) * 3;
                valuesRgb[valueIdx] = v0;
                valuesRgb[valueIdx + 1] = v1;
                valuesRgb[valueIdx + 2] = v2;
                if (responseMode) maxRgb = Math.max(maxRgb, v0, v1, v2);
            }
        }
        var rgbScale = responseMode && maxRgb > 0 ? 255 / maxRgb : 1;
        for (var i = 0; i < w * h; i++) {
            var sourceIdx = i * 3;
            var outIdx = i * 4;
            out[outIdx] = clampByte(valuesRgb[sourceIdx] * rgbScale);
            out[outIdx + 1] = clampByte(valuesRgb[sourceIdx + 1] * rgbScale);
            out[outIdx + 2] = clampByte(valuesRgb[sourceIdx + 2] * rgbScale);
            out[outIdx + 3] = 255;
        }
        return out;
    }

    function conv3DPixelCenter(plane, col, row) {
        var cellW = conv3d.planeW / conv3d.width;
        var cellH = conv3d.planeH / conv3d.height;
        return new THREE.Vector3(
            plane.x - conv3d.planeW / 2 + (col + 0.5) * cellW,
            plane.y + conv3d.planeH / 2 - (row + 0.5) * cellH,
            plane.z + 0.08
        );
    }

    function updateConv3DStep() {
        if (!conv3d.frameGroup || !conv3d.total) {
            updateConv3DCounter();
            return;
        }
        var col = conv3d.step % conv3d.width;
        var row = Math.floor(conv3d.step / conv3d.width);
        var stepFilters = conv3d.compareFilters && conv3d.compareFilters.length ? conv3d.compareFilters : getSelectedCompareFilters();
        var span = stepFilters.length === 1 && stepFilters[0] === 'identity' ? 1 : 3;
        if (stepFilters.indexOf('dilated') !== -1 || currentFilter === 'dilated') {
            span = (3 - 1) * currentDilation + 1;
        }
        var rectW = Math.max(0.22, (conv3d.planeW / conv3d.width) * span);
        var rectH = Math.max(0.22, (conv3d.planeH / conv3d.height) * span);
        var outputPlanes = getConv3DOutputPlanes();
        var outCenters = outputPlanes.map(function(plane) {
            return conv3DPixelCenter(plane, col, row);
        });
        var primaryOutCenter = outCenters[0] || new THREE.Vector3(3.4, 0, 0);
        var inputPlanes = getConv3DInputPlanes();
        var midInputCenter = conv3DPixelCenter(inputPlanes[1], col, row);
        conv3d.frameGroup.rects.forEach(function(rect, i) {
            var center = conv3DPixelCenter(inputPlanes[i], col, row);
            updateRectLine(rect, center, rectW, rectH);
            updateHighlightPlane(conv3d.frameGroup.fills[i], center, rectW, rectH);
            updateConnector(conv3d.frameGroup.lines[i], center, primaryOutCenter);
        });
        var outCellW = Math.max(0.18, conv3d.planeW / conv3d.width);
        var outCellH = Math.max(0.18, conv3d.planeH / conv3d.height);
        (conv3d.frameGroup.outputRects || []).forEach(function(rect, i) {
            if (!outCenters[i]) return;
            updateRectLine(rect, outCenters[i], outCellW * 1.35, outCellH * 1.35);
        });
        (conv3d.frameGroup.outputLines || []).forEach(function(line, i) {
            if (!outCenters[i]) return;
            updateConnector(line, midInputCenter, outCenters[i]);
        });
        updateConv3DCounter();
    }

    function rebuildConv3DScene(source) {
        if (!conv3d.ready || !source) return;
        clearConv3DWorld();
        conv3d.source = source;
        conv3d.compareFilters = getSelectedCompareFilters();
        conv3d.outputs = conv3d.compareFilters.map(function(filter) {
            return computeConv3DOutput(source, filter);
        });
        conv3d.width = source.width;
        conv3d.height = source.height;
        conv3d.step = 0;
        conv3d.total = source.width * source.height;

        var group = new THREE.Group();
        conv3d.world.add(group);
        var inputPlanes = getConv3DInputPlanes();
        addPlane(group, makeChannelTexture(source, 0), inputPlanes[0].x, inputPlanes[0].y, inputPlanes[0].z, 1, 'R 分量');
        addPlane(group, makeChannelTexture(source, 1), inputPlanes[1].x, inputPlanes[1].y, inputPlanes[1].z, 1, 'G 分量');
        addPlane(group, makeChannelTexture(source, 2), inputPlanes[2].x, inputPlanes[2].y, inputPlanes[2].z, 1, 'B 分量');
        addPlane(group, makeOriginalTexture(source), inputPlanes[3].x, inputPlanes[3].y, inputPlanes[3].z, 0.9, '原图');
        var outputPlanes = getConv3DOutputPlanes();
        conv3d.outputs.forEach(function(output, index) {
            var plane = outputPlanes[index] || outputPlanes[0] || { x: 3.4, y: 0, z: 0 };
            var label = '输出 ' + (index + 1) + ': ' + (FILTER_SHORT_NAMES[conv3d.compareFilters[index]] || conv3d.compareFilters[index]);
            addPlane(group, makeOutputTexture(output, source.width, source.height), plane.x, plane.y, plane.z, 0.9, label);
        });
        addTextLabel(group, getProcessingModeLabel() + ' · ' + conv3d.compareFilters.length + ' 个核', 0.1, 2.45, 0);

        var frameGroup = new THREE.Group();
        frameGroup.rects = [makeRectLine(0xff3b30), makeRectLine(0x22c55e), makeRectLine(0x3b82f6)];
        frameGroup.fills = [makeHighlightPlane(0xff3b30), makeHighlightPlane(0x22c55e), makeHighlightPlane(0x3b82f6)];
        frameGroup.lines = [makeConnector(0xff3b30), makeConnector(0x22c55e), makeConnector(0x3b82f6)];
        frameGroup.outputRects = [];
        frameGroup.outputLines = [];
        conv3d.compareFilters.forEach(function(filter, index) {
            var color = CONV3D_OUTPUT_COLORS[index % CONV3D_OUTPUT_COLORS.length];
            frameGroup.outputRects.push(makeRectLine(color));
            frameGroup.outputLines.push(makeConnector(color));
        });
        frameGroup.fills.forEach(function(f) { frameGroup.add(f); });
        frameGroup.rects.forEach(function(r) { frameGroup.add(r); });
        frameGroup.lines.forEach(function(l) { frameGroup.add(l); });
        frameGroup.outputRects.forEach(function(r) { frameGroup.add(r); });
        frameGroup.outputLines.forEach(function(l) { frameGroup.add(l); });
        group.add(frameGroup);
        conv3d.frameGroup = frameGroup;
        updateConv3DStep();
        var filterText = conv3d.compareFilters.map(function(filter) {
            return FILTER_SHORT_NAMES[filter] || filter;
        }).join(' / ');
        setConv3DStatus('3D 快照：' + source.width + ' × ' + source.height + '，' + getProcessingModeLabel() + '；多核对比：' + filterText);
    }

    function refreshConv3DFromCanvas(canvas) {
        if (!conv3d.ready || !canvas || !canvas.width || !canvas.height) return;
        rebuildConv3DScene(sampleCanvasFor3D(canvas));
    }

    function clearConv3D() {
        conv3d.playing = false;
        if (conv3dPlayBtn) conv3dPlayBtn.textContent = '播放';
        conv3d.step = 0;
        conv3d.total = 0;
        conv3d.source = null;
        conv3d.outputs = [];
        conv3d.compareFilters = [];
        clearConv3DWorld();
        updateConv3DCounter();
        setConv3DStatus('上传图片或开启摄像头后生成 3D 快照');
    }

    function initConv3D() {
        if (!conv3dViewport) return;
        if (!window.THREE || !THREE.OrbitControls) {
            setConv3DStatus('3D 组件加载失败，请检查网络后刷新页面');
            return;
        }
        conv3d.scene = new THREE.Scene();
        conv3d.scene.background = new THREE.Color(0xedf4fb);
        conv3d.camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        conv3d.camera.position.set(4.8, 4.3, 8.8);
        conv3d.camera.lookAt(0, 0, 0);
        conv3d.renderer = new THREE.WebGLRenderer({ antialias: true });
        conv3d.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        conv3dViewport.appendChild(conv3d.renderer.domElement);
        conv3d.controls = new THREE.OrbitControls(conv3d.camera, conv3d.renderer.domElement);
        conv3d.controls.target.set(0, 0.15, 0);
        conv3d.controls.enableDamping = true;
        conv3d.controls.dampingFactor = 0.1;
        conv3d.controls.enablePan = true;
        conv3d.controls.minDistance = 4.5;
        conv3d.controls.maxDistance = 18;
        conv3d.scene.add(new THREE.AmbientLight(0xffffff, 0.82));
        var dir = new THREE.DirectionalLight(0xffffff, 0.58);
        dir.position.set(4, 6, 8);
        conv3d.scene.add(dir);
        var grid = new THREE.GridHelper(11, 11, 0xb7c3d0, 0xdbe5ef);
        grid.position.y = -2.4;
        conv3d.scene.add(grid);
        conv3d.world = new THREE.Group();
        conv3d.scene.add(conv3d.world);
        conv3d.ready = true;
        resizeConv3D();
        animateConv3D();
    }

    function resizeConv3D() {
        if (!conv3d.ready || !conv3dViewport) return;
        var width = conv3dViewport.clientWidth || 900;
        var height = conv3dViewport.clientHeight || 430;
        conv3d.renderer.setSize(width, height);
        conv3d.camera.aspect = width / height;
        conv3d.camera.updateProjectionMatrix();
    }

    function animateConv3D() {
        requestAnimationFrame(animateConv3D);
        if (!conv3d.ready) return;
        var now = performance.now();
        if (conv3d.playing && conv3d.total > 1 && now - conv3d.animationTime > 120) {
            advanceConv3DStep();
            conv3d.animationTime = now;
        }
        conv3d.controls.update();
        conv3d.renderer.render(conv3d.scene, conv3d.camera);
    }

    function resetUploadState() {
        uploadRequestId += 1;
        uploadedImage = null;
        uploadedImageName = '';
        imageUpload.value = '';
        uploadFileName.textContent = '未选择文件';
    }

    function clearUploadedImage() {
        resetUploadState();
        if (!stream) {
            sourceMode = 'camera';
            resetCanvasToCameraSize();
            clearCanvas(originalCanvas);
            clearCanvas(processedCanvas);
            clearConv3D();
            cameraStatus.textContent = '摄像头未开启';
            fpsCounter.textContent = '';
        }
    }

    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 320 }, height: { ideal: 240 } } })
            .then(function(s) {
                resetUploadState();
                sourceMode = 'camera';
                stream = s;
                video.srcObject = s;
                video.play();
                processing = true;
                resetCanvasToCameraSize();
                clearCanvas(originalCanvas);
                clearCanvas(processedCanvas);
                clearConv3D();
                document.getElementById('cameraToggle').textContent = '关闭摄像头';
                cameraStatus.textContent = '摄像头已开启';
                fpsFrames = 0;
                fpsTime = performance.now();
                requestAnimationFrame(processFrame);
            })
            .catch(function(err) {
                alert('无法访问摄像头: ' + (err.message || '权限被拒绝'));
            });
    }

    function clearCanvas(canvas) {
        var c = canvas.getContext('2d');
        c.fillStyle = '#1a1a2e';
        c.fillRect(0, 0, canvas.width, canvas.height);
    }

    function stopCamera() {
        processing = false;
        if (stream) {
            stream.getTracks().forEach(function(t) { t.stop(); });
            stream = null;
        }
        video.srcObject = null;
        resetCanvasToCameraSize();
        clearCanvas(originalCanvas);
        clearCanvas(processedCanvas);
        clearConv3D();
        document.getElementById('cameraToggle').textContent = '开启摄像头';
        cameraStatus.textContent = '摄像头未开启';
        fpsCounter.textContent = '';
    }

    document.getElementById('cameraToggle').addEventListener('click', function() {
        stream ? stopCamera() : startCamera();
    });

    document.getElementById('screenshotBtn').addEventListener('click', function() {
        if (!stream && !uploadedImage) return;
        var link = document.createElement('a');
        link.download = 'filter_' + currentFilter + '_' + Date.now() + '.png';
        link.href = processedCanvas.toDataURL('image/png');
        link.click();
    });

    imageUpload.addEventListener('change', function() {
        var file = this.files && this.files[0];
        if (!file) {
            clearUploadedImage();
            return;
        }
        if (!file.type || file.type.indexOf('image/') !== 0) {
            alert('请选择图片文件');
            clearUploadedImage();
            return;
        }

        if (stream) stopCamera();
        var img = new Image();
        var objectUrl = URL.createObjectURL(file);
        uploadRequestId += 1;
        var requestId = uploadRequestId;
        img.onload = function() {
            URL.revokeObjectURL(objectUrl);
            if (requestId !== uploadRequestId) return;
            uploadedImage = img;
            uploadedImageName = file.name;
            uploadFileName.textContent = file.name;
            processUploadedImage();
        };
        img.onerror = function() {
            URL.revokeObjectURL(objectUrl);
            if (requestId !== uploadRequestId) return;
            alert('图片加载失败，请重新选择');
            clearUploadedImage();
        };
        img.src = objectUrl;
    });

    document.getElementById('clearImageBtn').addEventListener('click', clearUploadedImage);

    conv3dPlayBtn.addEventListener('click', function() {
        if (!conv3d.total) return;
        conv3d.playing = !conv3d.playing;
        conv3d.animationTime = performance.now();
        this.textContent = conv3d.playing ? '暂停' : '播放';
    });

    conv3dStepBtn.addEventListener('click', function() {
        if (!conv3d.total) return;
        conv3d.playing = false;
        conv3dPlayBtn.textContent = '播放';
        advanceConv3DStep();
    });

    conv3dResetBtn.addEventListener('click', function() {
        conv3d.playing = false;
        conv3dPlayBtn.textContent = '播放';
        conv3d.step = 0;
        updateConv3DStep();
    });

    conv3dSnapshotBtn.addEventListener('click', function() {
        if (!stream && !uploadedImage) {
            setConv3DStatus('请先上传图片或开启摄像头');
            return;
        }
        refreshConv3DFromCanvas(originalCanvas);
    });

    document.querySelectorAll('.filter-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            document.getElementById('filterName').textContent = this.textContent;
            updateDilationVisibility();
            renderKernel();
            if (sourceMode === 'image') processUploadedImage();
            else if (conv3d.source) rebuildConv3DScene(conv3d.source);
        });
    });

    document.querySelectorAll('.mode-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            currentProcessingMode = this.dataset.mode;
            if (sourceMode === 'image') processUploadedImage();
            else if (conv3d.source) rebuildConv3DScene(conv3d.source);
        });
    });

    if (compareKernelRow) {
        compareKernelRow.querySelectorAll('.compare-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var filter = this.dataset.filter;
                var selected = getSelectedCompareFilters();
                var existing = selected.indexOf(filter);
                if (existing !== -1) {
                    if (selected.length <= 1) return;
                    selected.splice(existing, 1);
                } else {
                    if (selected.length >= 4) selected.shift();
                    selected.push(filter);
                }
                conv3dCompareFilters = selected;
                renderCompareKernelButtons();
                updateDilationVisibility();
                if (sourceMode === 'image') processUploadedImage();
                else if (conv3d.source) rebuildConv3DScene(conv3d.source);
            });
        });
    }

    document.getElementById('dilationRate').addEventListener('input', function() {
        currentDilation = parseInt(this.value, 10);
        document.getElementById('dilationLabel').textContent = this.value;
        renderDilationStructure();
        if (sourceMode === 'image') processUploadedImage();
        else if (conv3d.source) rebuildConv3DScene(conv3d.source);
    });

    clearCanvas(originalCanvas);
    clearCanvas(processedCanvas);
    renderKernel();
    renderCompareKernelButtons();
    updateDilationVisibility();
    initConv3D();
    window.addEventListener('resize', resizeConv3D);
})();
</script>
</body>
</html>
