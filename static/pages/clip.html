<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLIP - CV 通识教育</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <link rel="stylesheet" href="../css/model-demo-page.css">
  <script src="../js/theme-sync.js"></script>
  <script src="../js/page-utils.js"></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow">图文对齐 / 零样本识别</div>
      <h1 id="pageTitle">CLIP</h1>
      <p class="subtitle" id="subtitle"></p>
      <p class="intro" id="introText"></p>
      <div class="problem-statement" id="problemStatement"></div>
      <span class="status" id="statusPill"></span>
    </div>
    <aside class="panel controls">
      <h2>运行真实后端</h2>
      <input id="fileInput" type="file" accept="image/*" hidden>
      <div class="control-row">
        <button id="chooseBtn" type="button">选择图片</button>
        <button id="sampleBtn" type="button">使用示例</button>
        <button id="runBtn" class="primary" type="button">运行 CLIP</button>
      </div>
      <div class="file-line" id="fileName">未选择文件，将使用内置示例</div>
      <div id="paramsPanel" class="params"></div>
    </aside>
  </section>
  <section class="info-grid">
    <div class="panel"><h2>算法流程</h2><ul id="pipelineList"></ul></div>
    <div class="panel"><h2>应用场景</h2><ul id="applicationsList"></ul></div>
    <div class="panel"><h2>局限说明</h2><ul id="limitationsList"></ul></div>
  </section>
  <div id="loading" class="loading" hidden>后端正在运行 CLIP，首次运行可能需要下载权重...</div>
  <div id="errorBox" class="error" hidden></div>
  <section id="metricsGrid" class="metrics"></section>
  <section class="panel"><h2>后端步骤证据</h2><div id="stepsGrid" class="steps"></div></section>
</main>
<script>
window.ModelDemoConfig = {
  moduleId: 'clip',
  title: 'CLIP',
  subtitle: '让图片和文字彼此匹配，不必为每个新类别重新训练分类器。',
  intro: 'CLIP 适合解释以图搜文、以文搜图、开放词表识别这类应用：你给出候选描述，模型判断哪句话最像这张图。本页后端真实计算图像 embedding、文本 embedding、相似度和 Top-k 结果。',
  problemStatement: 'CLIP 解决的是“图片和自然语言如何对齐”的问题。它把图像和文字放进同一个语义空间，用距离判断二者是否匹配。',
  status: '真实后端推理或权重提示',
  params: [
    { name: 'custom_classes', label: '候选文本', type: 'text', value: 'dog, cat, bus, car, person, building, street, tree' }
  ],
  pipeline: ['选择一张图片', '输入候选文字描述', '把图片编码成语义向量', '把每句话编码成语义向量', '比较图文相似度', '选出最匹配的描述'],
  applications: ['零样本分类', '图文检索', '开放词表视觉理解', '多模态基础模型入门'],
  limitations: ['结果受候选文本写法影响', '首次运行可能需要下载权重', '相似度不是严格概率，只是匹配分数归一化']
};
</script>
<script src="../js/interactive-teaching-stage.js"></script>
<script src="../js/model-demo-page.js"></script>
</body>
</html>
