<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResNet + Grad-CAM - CV 通识教育</title>
  <link rel="stylesheet" href="../css/iframe-theme.css">
  <link rel="stylesheet" href="../css/model-demo-page.css">
  <script src="../js/theme-sync.js"></script>
  <script src="../js/page-utils.js"></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow">深度基石 / 可解释分类</div>
      <h1 id="pageTitle">ResNet + Grad-CAM</h1>
      <p class="subtitle" id="subtitle"></p>
      <p class="intro" id="introText"></p>
      <div class="problem-statement" id="problemStatement"></div>
      <span class="status" id="statusPill"></span>
    </div>
    <aside class="panel controls">
      <h2>运行真实后端</h2>
      <input id="fileInput" type="file" accept="image/*" hidden>
      <div class="control-row">
        <button id="chooseBtn" type="button">选择图片</button>
        <button id="sampleBtn" type="button">使用示例</button>
        <button id="runBtn" class="primary" type="button">运行 ResNet</button>
      </div>
      <div class="file-line" id="fileName">未选择文件，将使用内置示例</div>
      <div id="paramsPanel" class="params"></div>
    </aside>
  </section>
  <section class="info-grid">
    <div class="panel"><h2>算法流程</h2><ul id="pipelineList"></ul></div>
    <div class="panel"><h2>应用场景</h2><ul id="applicationsList"></ul></div>
    <div class="panel"><h2>局限说明</h2><ul id="limitationsList"></ul></div>
  </section>
  <div id="loading" class="loading" hidden>后端正在运行 ResNet-50 与 Grad-CAM...</div>
  <div id="errorBox" class="error" hidden></div>
  <section id="metricsGrid" class="metrics"></section>
  <section class="panel"><h2>后端步骤证据</h2><div id="stepsGrid" class="steps"></div></section>
</main>
<script>
window.ModelDemoConfig = {
  moduleId: 'resnet',
  title: 'ResNet + Grad-CAM',
  subtitle: '回答“这张照片里最像什么”，并把模型判断依据标回原图。',
  intro: '适合用来理解相册识别、商品分类、巡检图片初筛这类任务：系统先给出最可能的类别，再用 Grad-CAM 告诉你它主要看了哪些区域。后端会真实运行 torchvision ResNet-50 和反向传播解释。',
  problemStatement: 'ResNet + Grad-CAM 解决的是“图像分类结果能不能被检查”的问题：不仅要判断照片属于哪类，还要让人看到这个判断大致依赖了图中的什么位置。',
  status: '真实预训练推理',
  params: [
    { name: 'target_rank', label: '解释类别', type: 'range', min: 1, max: 5, step: 1, value: 1 }
  ],
  pipeline: ['选择一张待识别照片', '裁剪到模型熟悉的输入尺寸', '深层网络提取物体线索', '输出最可能的 5 个类别', '选择一个类别做反向解释', '把关注区域叠回原图'],
  applications: ['相册或图库自动分类', '商品/设备/动植物图片初筛', '检查模型是否看错地方', '教学演示深层网络为什么需要残差连接'],
  limitations: ['类别受 ImageNet 预训练数据限制', 'Grad-CAM 是解释线索，不是严格因果证明', '首次运行可能需要下载权重']
};
</script>
<script src="../js/interactive-teaching-stage.js"></script>
<script src="../js/model-demo-page.js"></script>
</body>
</html>
